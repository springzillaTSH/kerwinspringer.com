<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" width="280" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d4a3a"/>
    </linearGradient>
  </defs>
  <rect width="280" height="180" fill="url(#bg)"/>
  <!-- Vernier caliper body -->
  <rect x="30" y="60" width="220" height="28" rx="3" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Main scale ticks -->
  <line x1="50" y1="60" x2="50" y2="72" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
  <line x1="80" y1="60" x2="80" y2="72" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
  <line x1="110" y1="60" x2="110" y2="75" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
  <line x1="140" y1="60" x2="140" y2="72" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
  <line x1="170" y1="60" x2="170" y2="72" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
  <line x1="200" y1="60" x2="200" y2="75" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
  <!-- Scale numbers -->
  <text x="110" y="56" font-family="Poppins,sans-serif" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">1</text>
  <text x="200" y="56" font-family="Poppins,sans-serif" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">2</text>
  <!-- Sliding jaw -->
  <rect x="125" y="55" width="14" height="38" rx="2" fill="rgba(48,209,88,0.2)" stroke="#30d158" stroke-width="1"/>
  <!-- Reading display -->
  <rect x="85" y="110" width="110" height="36" rx="8" fill="rgba(48,209,88,0.1)" stroke="rgba(48,209,88,0.3)" stroke-width="1"/>
  <text x="140" y="127" font-family="Poppins,sans-serif" font-size="14" font-weight="700" fill="#30d158" text-anchor="middle">1.35</text>
  <text x="140" y="139" font-family="Poppins,sans-serif" font-size="7" fill="rgba(48,209,88,0.6)" text-anchor="middle">cm</text>
  <!-- Title -->
  <text x="140" y="28" font-family="Poppins,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">Read the Vernier Caliper</text>
  <text x="140" y="170" font-family="Poppins,sans-serif" font-size="5.5" font-weight="800" fill="rgba(255,255,255,0.1)" text-anchor="middle" letter-spacing="2">STUDENT HUB</text>
</svg>