<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" width="280" height="180">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2035"/>
      <stop offset="100%" stop-color="#2B4C7E"/>
    </linearGradient>
  </defs>
  <rect width="280" height="180" fill="url(#bg2)"/>
  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="0.5">
    <line x1="20" y1="20" x2="20" y2="160"/><line x1="52" y1="20" x2="52" y2="160"/>
    <line x1="84" y1="20" x2="84" y2="160"/><line x1="116" y1="20" x2="116" y2="160"/>
    <line x1="148" y1="20" x2="148" y2="160"/><line x1="180" y1="20" x2="180" y2="160"/>
    <line x1="212" y1="20" x2="212" y2="160"/><line x1="244" y1="20" x2="244" y2="160"/>
    <line x1="20" y1="26" x2="260" y2="26"/><line x1="20" y1="58" x2="260" y2="58"/>
    <line x1="20" y1="90" x2="260" y2="90"/><line x1="20" y1="122" x2="260" y2="122"/>
    <line x1="20" y1="154" x2="260" y2="154"/>
  </g>
  <!-- Axes -->
  <line x1="20" y1="90" x2="260" y2="90" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="140" y1="20" x2="140" y2="160" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Original triangle (blue) -->
  <polygon points="84,58 116,122 52,122" fill="rgba(59,130,246,0.2)" stroke="#3B82F6" stroke-width="1.5"/>
  <circle cx="84" cy="58" r="3" fill="#3B82F6"/>
  <circle cx="116" cy="122" r="3" fill="#3B82F6"/>
  <circle cx="52" cy="122" r="3" fill="#3B82F6"/>
  <!-- Transformed triangle (gold, reflected) -->
  <polygon points="196,58 228,122 164,122" fill="rgba(245,166,35,0.15)" stroke="#F5A623" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="196" cy="58" r="3" fill="#F5A623"/>
  <circle cx="228" cy="122" r="3" fill="#F5A623"/>
  <circle cx="164" cy="122" r="3" fill="#F5A623"/>
  <!-- Reflection line label -->
  <text x="140" y="16" font-family="Poppins,sans-serif" font-size="7" fill="rgba(255,255,255,0.4)" text-anchor="middle">x = 0</text>
  <!-- Labels -->
  <text x="68" y="140" font-family="Poppins,sans-serif" font-size="8" font-weight="600" fill="#3B82F6" text-anchor="middle">Original</text>
  <text x="196" y="140" font-family="Poppins,sans-serif" font-size="8" font-weight="600" fill="#F5A623" text-anchor="middle">Reflected</text>
  <!-- Watermark -->
  <text x="140" y="170" font-family="Poppins,sans-serif" font-size="5.5" font-weight="800" fill="rgba(255,255,255,0.1)" text-anchor="middle" letter-spacing="2">STUDENT HUB</text>
</svg>