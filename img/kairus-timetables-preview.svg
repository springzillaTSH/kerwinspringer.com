<svg xmlns="http://www.w3.org/2000/svg" width="280" height="180" viewBox="0 0 280 180">
  <defs>
    <linearGradient id="pSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="60%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <radialGradient id="pSun" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="pWing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="pGateGood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="pGateBad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#b91c1c" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="280" height="180" fill="url(#pSky)"/>
  <ellipse cx="55" cy="40" rx="100" ry="70" fill="url(#pSun)"/>

  <!-- Cloud streaks -->
  <g fill="#ffffff" opacity="0.22">
    <ellipse cx="40"  cy="120" rx="35" ry="3"/>
    <ellipse cx="220" cy="100" rx="40" ry="3"/>
    <ellipse cx="160" cy="155" rx="30" ry="2.5"/>
  </g>

  <!-- Background × symbols -->
  <g font-family="Poppins, system-ui, sans-serif" font-weight="800" fill="#ffffff">
    <text x="20"  y="40"  font-size="14" opacity="0.18">×</text>
    <text x="240" y="160" font-size="16" opacity="0.18">×</text>
    <text x="120" y="32"  font-size="11" opacity="0.14">×</text>
  </g>

  <!-- Answer gates (right side, approaching) -->
  <g>
    <!-- Gate 1 (closer, larger) — correct (green) -->
    <rect x="195" y="50" width="50" height="32" rx="6" fill="url(#pGateGood)"/>
    <text x="220" y="73" text-anchor="middle" font-family="Poppins, system-ui, sans-serif" font-weight="800" font-size="18" fill="#ffffff">56</text>

    <!-- Gate 2 (middle) — distractor (red) -->
    <rect x="200" y="92" width="46" height="28" rx="6" fill="url(#pGateBad)"/>
    <text x="223" y="113" text-anchor="middle" font-family="Poppins, system-ui, sans-serif" font-weight="800" font-size="16" fill="#ffffff">48</text>

    <!-- Gate 3 (farther, smaller) — distractor -->
    <rect x="205" y="128" width="40" height="24" rx="5" fill="url(#pGateBad)" opacity="0.85"/>
    <text x="225" y="146" text-anchor="middle" font-family="Poppins, system-ui, sans-serif" font-weight="800" font-size="14" fill="#ffffff">63</text>
  </g>

  <!-- Question chip (top center) -->
  <g>
    <rect x="100" y="14" width="80" height="22" rx="11" fill="#ffffff" opacity="0.92"/>
    <text x="140" y="29" text-anchor="middle" font-family="Poppins, system-ui, sans-serif" font-weight="800" font-size="13" fill="#1e3a8a">7 × 8 = ?</text>
  </g>

  <!-- Speed lines behind Kairu -->
  <g stroke="#ffffff" stroke-linecap="round" opacity="0.5">
    <line x1="20" y1="62" x2="65" y2="65" stroke-width="2"/>
    <line x1="10" y1="78" x2="55" y2="80" stroke-width="1.5"/>
    <line x1="22" y1="92" x2="60" y2="93" stroke-width="1.2"/>
  </g>

  <!-- KAIRU the hummingbird (left-center, flying right) -->
  <g transform="translate(95, 75)">
    <!-- Tail -->
    <path d="M22,7 L40,3 L40,15 L25,15 Z" fill="url(#pBody)" opacity="0.85"/>
    <!-- Body -->
    <ellipse cx="0" cy="6" rx="24" ry="13" fill="url(#pBody)"/>
    <ellipse cx="-2" cy="4" rx="20" ry="9" fill="#fbbf24" opacity="0.9"/>
    <!-- Throat -->
    <ellipse cx="-12" cy="8" rx="9" ry="5" fill="#dc2626" opacity="0.8"/>
    <!-- Head -->
    <circle cx="-21" cy="-4" r="12" fill="url(#pBody)"/>
    <circle cx="-22" cy="-5" r="10" fill="#fbbf24"/>
    <!-- Eye -->
    <circle cx="-25" cy="-7" r="2.6" fill="#1a2332"/>
    <circle cx="-24" cy="-8" r="0.9" fill="#ffffff"/>
    <!-- Beak -->
    <path d="M-33,-5 L-54,-7 L-33,-2 Z" fill="#1a2332"/>
    <!-- Upper wing -->
    <path d="M-4,-9 Q0,-38 28,-32 Q15,-20 2,-10 Z" fill="url(#pWing)"/>
    <path d="M-2,-9 Q2,-32 22,-27 Q12,-18 2,-10 Z" fill="#fde68a" opacity="0.55"/>
    <!-- Lower wing -->
    <path d="M-4,5 Q0,22 22,21 Q14,12 2,7 Z" fill="url(#pWing)" opacity="0.85"/>
  </g>

  <!-- Tier hint (bottom-left) -->
  <g>
    <rect x="10" y="160" width="78" height="14" rx="3" fill="#1e3a8a" opacity="0.55"/>
    <text x="49" y="170" text-anchor="middle" font-family="Poppins, system-ui, sans-serif" font-weight="700" font-size="8" fill="#fde68a" letter-spacing="1">FLEDGLING FLIGHT</text>
  </g>
</svg>
