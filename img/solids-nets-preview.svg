<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" width="280" height="180">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#35538f"/>
    </linearGradient>
  </defs>
  <rect width="280" height="180" fill="url(#bg3)"/>
  <!-- 3D Cube wireframe -->
  <!-- Front face -->
  <polygon points="85,55 135,55 135,115 85,115" fill="rgba(90,134,228,0.12)" stroke="rgba(90,134,228,0.6)" stroke-width="1"/>
  <!-- Top face -->
  <polygon points="85,55 135,55 160,35 110,35" fill="rgba(90,134,228,0.08)" stroke="rgba(90,134,228,0.5)" stroke-width="1"/>
  <!-- Right face -->
  <polygon points="135,55 160,35 160,95 135,115" fill="rgba(90,134,228,0.06)" stroke="rgba(90,134,228,0.4)" stroke-width="1"/>
  <!-- Vertices -->
  <circle cx="85" cy="55" r="2" fill="#F5A623"/>
  <circle cx="135" cy="55" r="2" fill="#F5A623"/>
  <circle cx="135" cy="115" r="2" fill="#F5A623"/>
  <circle cx="85" cy="115" r="2" fill="#F5A623"/>
  <circle cx="110" cy="35" r="2" fill="#F5A623"/>
  <circle cx="160" cy="35" r="2" fill="#F5A623"/>
  <circle cx="160" cy="95" r="2" fill="#F5A623"/>
  <!-- Arrow showing unfold -->
  <path d="M165 75 C175 75, 180 75, 190 75" stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none"/>
  <polygon points="189,72 194,75 189,78" fill="rgba(255,255,255,0.4)"/>
  <!-- Net (cross shape) -->
  <rect x="200" y="50" width="22" height="22" fill="none" stroke="#F5A623" stroke-width="1" rx="1"/>
  <rect x="200" y="72" width="22" height="22" fill="rgba(245,166,35,0.15)" stroke="#F5A623" stroke-width="1" rx="1"/>
  <rect x="200" y="94" width="22" height="22" fill="none" stroke="#F5A623" stroke-width="1" rx="1"/>
  <rect x="200" y="116" width="22" height="22" fill="none" stroke="#F5A623" stroke-width="1" rx="1"/>
  <rect x="178" y="72" width="22" height="22" fill="none" stroke="#F5A623" stroke-width="1" rx="1"/>
  <rect x="222" y="72" width="22" height="22" fill="none" stroke="#F5A623" stroke-width="1" rx="1"/>
  <!-- Info card -->
  <rect x="25" y="130" width="110" height="36" rx="8" fill="rgba(255,255,255,0.08)"/>
  <text x="35" y="146" font-family="Poppins,sans-serif" font-size="8" font-weight="600" fill="white">Cube</text>
  <text x="35" y="158" font-family="Poppins,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)">6 Faces  12 Edges  8 Vertices</text>
  <!-- Title -->
  <text x="110" y="25" font-family="Poppins,sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">Fold / Unfold</text>
  <!-- Watermark -->
  <text x="140" y="172" font-family="Poppins,sans-serif" font-size="5.5" font-weight="800" fill="rgba(255,255,255,0.1)" text-anchor="middle" letter-spacing="2">STUDENT HUB</text>
</svg>