<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" width="280" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2035"/>
      <stop offset="100%" stop-color="#2B4C7E"/>
    </linearGradient>
  </defs>
  <rect width="280" height="180" fill="url(#bg)"/>
  <!-- Matrix A bracket -->
  <path d="M32,42 L26,42 L26,138 L32,138" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <path d="M88,42 L94,42 L94,138 L88,138" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <!-- Matrix A values -->
  <text x="42" y="72" fill="#6ba3e8" font-family="JetBrains Mono,monospace" font-size="16" font-weight="500">2</text>
  <text x="70" y="72" fill="#6ba3e8" font-family="JetBrains Mono,monospace" font-size="16" font-weight="500">1</text>
  <text x="42" y="100" fill="#6ba3e8" font-family="JetBrains Mono,monospace" font-size="16" font-weight="500">3</text>
  <text x="70" y="100" fill="#6ba3e8" font-family="JetBrains Mono,monospace" font-size="16" font-weight="500">0</text>
  <text x="42" y="128" fill="#6ba3e8" font-family="JetBrains Mono,monospace" font-size="16" font-weight="500">1</text>
  <text x="70" y="128" fill="#6ba3e8" font-family="JetBrains Mono,monospace" font-size="16" font-weight="500">4</text>
  <!-- Multiply sign -->
  <text x="106" y="96" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="18">×</text>
  <!-- Matrix B bracket -->
  <path d="M124,52 L118,52 L118,128 L124,128" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <path d="M180,52 L186,52 L186,128 L180,128" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <!-- Matrix B values -->
  <text x="134" y="78" fill="#F5A623" font-family="JetBrains Mono,monospace" font-size="16" font-weight="500">5</text>
  <text x="162" y="78" fill="#F5A623" font-family="JetBrains Mono,monospace" font-size="16" font-weight="500">2</text>
  <text x="134" y="112" fill="#F5A623" font-family="JetBrains Mono,monospace" font-size="16" font-weight="500">1</text>
  <text x="162" y="112" fill="#F5A623" font-family="JetBrains Mono,monospace" font-size="16" font-weight="500">3</text>
  <!-- Equals sign -->
  <text x="198" y="96" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="18">=</text>
  <!-- Result bracket -->
  <path d="M216,42 L210,42 L210,138 L216,138" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <path d="M272,42 L278,42 L278,138 L272,138" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <!-- Result values with glow -->
  <text x="226" y="72" fill="#10B981" font-family="JetBrains Mono,monospace" font-size="16" font-weight="700">11</text>
  <text x="254" y="72" fill="#10B981" font-family="JetBrains Mono,monospace" font-size="16" font-weight="700">7</text>
  <text x="226" y="100" fill="#10B981" font-family="JetBrains Mono,monospace" font-size="16" font-weight="700">15</text>
  <text x="254" y="100" fill="#10B981" font-family="JetBrains Mono,monospace" font-size="16" font-weight="700">6</text>
  <text x="226" y="128" fill="#10B981" font-family="JetBrains Mono,monospace" font-size="16" font-weight="700">9</text>
  <text x="250" y="128" fill="#10B981" font-family="JetBrains Mono,monospace" font-size="16" font-weight="700">14</text>
  <!-- Highlight line showing row×col -->
  <line x1="36" y1="62" x2="82" y2="62" stroke="#6ba3e8" stroke-width="2" opacity="0.4"/>
  <line x1="134" y1="68" x2="134" y2="118" stroke="#F5A623" stroke-width="2" opacity="0.4"/>
</svg>