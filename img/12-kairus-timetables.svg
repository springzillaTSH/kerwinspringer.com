<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#76C5F2"/>
      <stop offset="55%" stop-color="#1F8FE0"/>
      <stop offset="100%" stop-color="#0E5DA0"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#76C5F2" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#76C5F2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F8FE0"/>
      <stop offset="100%" stop-color="#0E5DA0"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- Ambient × symbols (timetables hint) -->
  <g font-family="Poppins, system-ui, sans-serif" font-weight="800" fill="#ffffff">
    <text x="60"  y="120" font-size="40" opacity="0.16">×</text>
    <text x="430" y="80"  font-size="32" opacity="0.13">×</text>
    <text x="80"  y="430" font-size="46" opacity="0.18">×</text>
    <text x="400" y="430" font-size="36" opacity="0.14">×</text>
  </g>

  <!-- Subtle focus halo -->
  <circle cx="256" cy="256" r="170" fill="url(#halo)"/>

  <!-- KAIRU — sprite-accurate, centred -->
  <g transform="translate(256 256)">
    <!-- Forked tail (navy) -->
    <path d="M-110 0 L-160 -28 L-138 0 L-160 28 Z" fill="#1A4A8A"/>
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="92" ry="46" fill="url(#bodyBlue)"/>
    <!-- Belly highlight -->
    <ellipse cx="14" cy="14" rx="70" ry="28" fill="#76C5F2" opacity="0.35"/>
    <!-- Gorget (pink throat patch) -->
    <ellipse cx="48" cy="6" rx="28" ry="16" fill="rgba(220,50,90,0.55)"/>
    <!-- Wing motion blur -->
    <ellipse cx="-6" cy="-26" rx="50" ry="16" fill="#76C5F2" opacity="0.85"/>
    <ellipse cx="-12" cy="-22" rx="40" ry="10" fill="#ffffff" opacity="0.50"/>
    <!-- Head (cyan) -->
    <circle cx="80" cy="-12" r="34" fill="#2FA9F2"/>
    <!-- Beak (long thin black) -->
    <path d="M110 -8 L168 -4 L110 0 Z" fill="#1A1A1A"/>
    <!-- Eye -->
    <circle cx="78" cy="-18" r="5" fill="#1A1A1A"/>
    <circle cx="80" cy="-20" r="1.5" fill="#ffffff"/>
  </g>
</svg>
