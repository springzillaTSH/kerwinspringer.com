<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" width="280" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#4a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="280" height="180" fill="url(#bg)"/>
  <!-- Formula display -->
  <text x="140" y="36" font-family="Poppins,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">Mole Calculation</text>
  <!-- Big formula -->
  <text x="140" y="72" font-family="Poppins,sans-serif" font-size="18" font-weight="800" fill="#ff6961" text-anchor="middle">n = m / M</text>
  <!-- Divider -->
  <line x1="60" y1="85" x2="220" y2="85" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Values -->
  <rect x="30" y="95" width="68" height="34" rx="8" fill="rgba(255,105,97,0.1)" stroke="rgba(255,105,97,0.25)" stroke-width="1"/>
  <text x="64" y="110" font-family="Poppins,sans-serif" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">mass</text>
  <text x="64" y="123" font-family="Poppins,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">24 g</text>
  <rect x="106" y="95" width="68" height="34" rx="8" fill="rgba(255,105,97,0.1)" stroke="rgba(255,105,97,0.25)" stroke-width="1"/>
  <text x="140" y="110" font-family="Poppins,sans-serif" font-size="8" fill="rgba(255,255,255,0.5)" text-anchor="middle">molar mass</text>
  <text x="140" y="123" font-family="Poppins,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">12 g/mol</text>
  <rect x="182" y="95" width="68" height="34" rx="8" fill="rgba(48,209,88,0.1)" stroke="rgba(48,209,88,0.3)" stroke-width="1"/>
  <text x="216" y="110" font-family="Poppins,sans-serif" font-size="8" fill="rgba(48,209,88,0.6)" text-anchor="middle">answer</text>
  <text x="216" y="123" font-family="Poppins,sans-serif" font-size="12" font-weight="700" fill="#30d158" text-anchor="middle">2 mol</text>
  <!-- Progress dots -->
  <circle cx="120" cy="155" r="3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="132" cy="155" r="3" fill="#ff6961"/>
  <circle cx="144" cy="155" r="3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="156" cy="155" r="3" fill="rgba(255,255,255,0.15)"/>
  <text x="140" y="170" font-family="Poppins,sans-serif" font-size="5.5" font-weight="800" fill="rgba(255,255,255,0.1)" text-anchor="middle" letter-spacing="2">STUDENT HUB</text>
</svg>