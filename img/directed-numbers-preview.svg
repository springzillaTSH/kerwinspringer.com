<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" width="280" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#2B4C7E"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="280" height="180" rx="0" fill="url(#bg)"/>
  <!-- Number line -->
  <line x1="20" y1="105" x2="260" y2="105" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Tick marks and numbers -->
  <line x1="44" y1="100" x2="44" y2="110" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="44" y="123" font-family="Poppins,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">-3</text>
  <line x1="92" y1="100" x2="92" y2="110" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="92" y="123" font-family="Poppins,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">-2</text>
  <line x1="140" y1="98" x2="140" y2="112" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <text x="140" y="123" font-family="Poppins,sans-serif" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">0</text>
  <line x1="188" y1="100" x2="188" y2="110" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="188" y="123" font-family="Poppins,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">+2</text>
  <line x1="236" y1="100" x2="236" y2="110" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="236" y="123" font-family="Poppins,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">+4</text>
  <!-- Dot on number line -->
  <circle cx="92" cy="105" r="5" fill="#F5A623"/>
  <!-- Arrow showing movement -->
  <path d="M92 90 C110 75, 155 75, 188 90" stroke="#F5A623" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <polygon points="186,87 191,92 184,92" fill="#F5A623"/>
  <!-- Question text -->
  <text x="140" y="40" font-family="Poppins,sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">(-2) + (+4) = ?</text>
  <!-- Level badge -->
  <rect x="20" y="14" width="70" height="18" rx="9" fill="rgba(245,166,35,0.15)"/>
  <text x="55" y="26" font-family="Poppins,sans-serif" font-size="8" font-weight="600" fill="#F5A623" text-anchor="middle">Level 3</text>
  <!-- XP badge -->
  <rect x="195" y="14" width="65" height="18" rx="9" fill="rgba(16,185,129,0.15)"/>
  <text x="227" y="26" font-family="Poppins,sans-serif" font-size="8" font-weight="600" fill="#10B981" text-anchor="middle">+10 XP</text>
  <!-- Watermark -->
  <text x="140" y="170" font-family="Poppins,sans-serif" font-size="5.5" font-weight="800" fill="rgba(255,255,255,0.1)" text-anchor="middle" letter-spacing="2">STUDENT HUB</text>
</svg>