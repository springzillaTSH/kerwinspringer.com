<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" width="280" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#3a1515"/>
    </linearGradient>
  </defs>
  <rect width="280" height="180" fill="url(#bg)"/>
  <text x="140" y="30" font-family="Poppins,sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">Balance the Equation</text>
  <!-- Equation -->
  <text x="28" y="70" font-family="Poppins,sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">__</text>
  <rect x="22" y="57" width="22" height="18" rx="4" fill="rgba(255,105,97,0.15)" stroke="rgba(255,105,97,0.3)" stroke-width="1"/>
  <text x="33" y="70" font-family="Poppins,sans-serif" font-size="10" font-weight="700" fill="#ff6961" text-anchor="middle">2</text>
  <text x="65" y="70" font-family="Poppins,sans-serif" font-size="12" font-weight="600" fill="white">H₂</text>
  <text x="100" y="70" font-family="Poppins,sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">+</text>
  <rect x="115" y="57" width="22" height="18" rx="4" fill="rgba(255,105,97,0.15)" stroke="rgba(255,105,97,0.3)" stroke-width="1"/>
  <text x="126" y="70" font-family="Poppins,sans-serif" font-size="10" font-weight="700" fill="#ff6961" text-anchor="middle">1</text>
  <text x="155" y="70" font-family="Poppins,sans-serif" font-size="12" font-weight="600" fill="white">O₂</text>
  <text x="185" y="70" font-family="Poppins,sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">→</text>
  <rect x="198" y="57" width="22" height="18" rx="4" fill="rgba(48,209,88,0.15)" stroke="rgba(48,209,88,0.3)" stroke-width="1"/>
  <text x="209" y="70" font-family="Poppins,sans-serif" font-size="10" font-weight="700" fill="#30d158" text-anchor="middle">2</text>
  <text x="238" y="70" font-family="Poppins,sans-serif" font-size="12" font-weight="600" fill="white">H₂O</text>
  <!-- Atom count check -->
  <rect x="40" y="95" width="200" height="40" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="112" font-family="Poppins,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">H: 4</text>
  <text x="80" y="126" font-family="Poppins,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">O: 2</text>
  <text x="140" y="118" font-family="Poppins,sans-serif" font-size="14" fill="rgba(255,255,255,0.2)" text-anchor="middle">=</text>
  <text x="200" y="112" font-family="Poppins,sans-serif" font-size="9" fill="rgba(48,209,88,0.7)" text-anchor="middle">H: 4 ✓</text>
  <text x="200" y="126" font-family="Poppins,sans-serif" font-size="9" fill="rgba(48,209,88,0.7)" text-anchor="middle">O: 2 ✓</text>
  <!-- Balanced badge -->
  <rect x="95" y="145" width="90" height="22" rx="11" fill="rgba(48,209,88,0.15)"/>
  <text x="140" y="160" font-family="Poppins,sans-serif" font-size="9" font-weight="700" fill="#30d158" text-anchor="middle">Balanced ✓</text>
  <text x="140" y="176" font-family="Poppins,sans-serif" font-size="5.5" font-weight="800" fill="rgba(255,255,255,0.1)" text-anchor="middle" letter-spacing="2">STUDENT HUB</text>
</svg>