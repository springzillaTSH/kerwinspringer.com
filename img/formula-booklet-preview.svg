<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="#0f2035"/>
  <rect x="30" y="25" width="155" height="110" rx="8" fill="rgba(43,76,126,0.25)" stroke="rgba(107,138,173,0.4)" stroke-width="1"/>
  <text x="107" y="52" text-anchor="middle" fill="#F5A623" font-family="Georgia,serif" font-size="11" font-weight="700">QUADRATIC FORMULA</text>
  <text x="107" y="82" text-anchor="middle" fill="white" font-family="Georgia,serif" font-size="18" font-weight="700" font-style="italic">x = −b ± √(b²−4ac)</text>
  <line x1="60" y1="90" x2="154" y2="90" stroke="white" stroke-width="1.5"/>
  <text x="107" y="106" text-anchor="middle" fill="white" font-family="Georgia,serif" font-size="18" font-weight="700" font-style="italic">2a</text>
  <text x="107" y="125" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="8">Algebra</text>
  <rect x="215" y="25" width="155" height="110" rx="8" fill="rgba(43,76,126,0.25)" stroke="rgba(107,138,173,0.4)" stroke-width="1"/>
  <text x="292" y="52" text-anchor="middle" fill="#10B981" font-family="Georgia,serif" font-size="11" font-weight="700">AREA OF CIRCLE</text>
  <text x="292" y="85" text-anchor="middle" fill="white" font-family="Georgia,serif" font-size="24" font-weight="700" font-style="italic">A = πr²</text>
  <text x="292" y="125" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="8">Measurement</text>
  <rect x="30" y="150" width="155" height="110" rx="8" fill="rgba(43,76,126,0.25)" stroke="rgba(107,138,173,0.4)" stroke-width="1"/>
  <text x="107" y="177" text-anchor="middle" fill="#EF4444" font-family="Georgia,serif" font-size="11" font-weight="700">SIMPLE INTEREST</text>
  <text x="107" y="210" text-anchor="middle" fill="white" font-family="Georgia,serif" font-size="22" font-weight="700" font-style="italic">I = PRT/100</text>
  <text x="107" y="250" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="8">Consumer Arithmetic</text>
  <rect x="215" y="150" width="155" height="110" rx="8" fill="rgba(43,76,126,0.25)" stroke="rgba(107,138,173,0.4)" stroke-width="1"/>
  <text x="292" y="177" text-anchor="middle" fill="#F59E0B" font-family="Georgia,serif" font-size="11" font-weight="700">PYTHAGORAS</text>
  <text x="292" y="210" text-anchor="middle" fill="white" font-family="Georgia,serif" font-size="22" font-weight="700" font-style="italic">c² = a² + b²</text>
  <text x="292" y="250" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="8">Geometry</text>
</svg>