<svg xmlns="http://www.w3.org/2000/svg" width="280" height="180" viewBox="0 0 280 180">
  <defs>
    <linearGradient id="pbody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8A810"/>
      <stop offset="30%" stop-color="#FDD835"/>
      <stop offset="50%" stop-color="#FFE788"/>
      <stop offset="70%" stop-color="#FDD835"/>
      <stop offset="100%" stop-color="#E8A810"/>
    </linearGradient>
    <linearGradient id="perase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#E06090"/>
    </linearGradient>
    <linearGradient id="pband" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4AA50"/>
      <stop offset="100%" stop-color="#B8922E"/>
    </linearGradient>
    <linearGradient id="pwood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D2A679"/>
      <stop offset="100%" stop-color="#A67C52"/>
    </linearGradient>
  </defs>

  <!-- Whiteboard background -->
  <rect x="20" y="15" width="240" height="150" rx="8" fill="#fff" opacity="0.06"/>
  <rect x="20" y="15" width="240" height="150" rx="8" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>

  <!-- Faint ruled lines on whiteboard -->
  <g opacity="0.06" stroke="#fff" stroke-width="0.5">
    <line x1="30" y1="45" x2="250" y2="45"/>
    <line x1="30" y1="65" x2="250" y2="65"/>
    <line x1="30" y1="85" x2="250" y2="85"/>
    <line x1="30" y1="105" x2="250" y2="105"/>
    <line x1="30" y1="125" x2="250" y2="125"/>
    <line x1="30" y1="145" x2="250" y2="145"/>
  </g>

  <!-- Hand-drawn scribble strokes (faint, like student notes) -->
  <g opacity="0.15" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round">
    <path d="M 45 44 Q 80 38, 120 44 Q 150 48, 180 43"/>
    <path d="M 45 64 Q 100 58, 160 65 Q 200 68, 230 62"/>
    <path d="M 45 84 Q 70 80, 100 85 Q 130 88, 155 83"/>
    <path d="M 45 104 Q 90 98, 140 105 Q 180 108, 210 102"/>
    <path d="M 45 124 Q 80 118, 130 124"/>
  </g>

  <!-- Pencil writing on the page -->
  <g transform="translate(190 75) rotate(-35)">
    <rect x="-6" y="-44" width="12" height="8" rx="2" fill="url(#perase)"/>
    <rect x="-6" y="-36" width="12" height="4" fill="url(#pband)"/>
    <rect x="-6" y="-32" width="12" height="40" fill="url(#pbody)"/>
    <polygon points="-6,8 6,8 3,20 -3,20" fill="url(#pwood)"/>
    <polygon points="-3,20 3,20 0,26" fill="#444"/>
  </g>
</svg>