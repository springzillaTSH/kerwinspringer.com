<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 180" width="280" height="180">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3358"/>
      <stop offset="60%" stop-color="#1e3a62"/>
      <stop offset="100%" stop-color="#2B4C7E"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="40%" stop-color="rgba(255,255,255,0)" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.08)" />
      <stop offset="60%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
  </defs>
  <!-- Card background -->
  <rect x="10" y="10" width="260" height="160" rx="16" fill="url(#cardBg)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="10" y="10" width="260" height="160" rx="16" fill="url(#shine)"/>
  <!-- Section badge -->
  <rect x="170" y="20" width="90" height="20" rx="10" fill="rgba(255,255,255,0.15)"/>
  <text x="215" y="34" font-family="Poppins,sans-serif" font-size="8" font-weight="600" fill="rgba(255,255,255,0.8)" text-anchor="middle">Mechanics</text>
  <!-- Topic label -->
  <text x="140" y="65" font-family="Poppins,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="1">NEWTON'S SECOND LAW</text>
  <!-- Formula -->
  <text x="140" y="105" font-family="'Times New Roman',serif" font-size="32" font-weight="700" fill="white" text-anchor="middle" font-style="italic">F = ma</text>
  <!-- Watermark -->
  <text x="140" y="158" font-family="Poppins,sans-serif" font-size="6" font-weight="800" fill="rgba(255,255,255,0.12)" text-anchor="middle" letter-spacing="2">STUDENT HUB · KERWIN SPRINGER</text>
</svg>
