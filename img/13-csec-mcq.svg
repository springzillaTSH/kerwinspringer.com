<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="greenFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <g font-family="Poppins, system-ui, sans-serif" font-weight="800" fill="#ffffff" opacity="0.06">
    <text x="60" y="100" font-size="28">A</text>
    <text x="430" y="120" font-size="22">D</text>
    <text x="80" y="430" font-size="32">B</text>
    <text x="420" y="440" font-size="26">C</text>
  </g>

  <g transform="translate(106 110)">

    <g>
      <rect x="0" y="0" width="300" height="60" rx="30" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
      <circle cx="36" cy="30" r="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.45)" stroke-width="2"/>
      <text x="36" y="36" text-anchor="middle" font-family="Poppins, sans-serif" font-weight="800" font-size="14" fill="#ffffff">A</text>
      <rect x="64" y="22" width="180" height="6" rx="3" fill="rgba(255,255,255,0.25)"/>
      <rect x="64" y="34" width="120" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
    </g>

    <g transform="translate(0 75)">
      <rect x="0" y="0" width="300" height="60" rx="30" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
      <circle cx="36" cy="30" r="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.45)" stroke-width="2"/>
      <text x="36" y="36" text-anchor="middle" font-family="Poppins, sans-serif" font-weight="800" font-size="14" fill="#ffffff">B</text>
      <rect x="64" y="22" width="160" height="6" rx="3" fill="rgba(255,255,255,0.25)"/>
      <rect x="64" y="34" width="100" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
    </g>

    <g transform="translate(0 150)">
      <rect x="-2" y="-2" width="304" height="64" rx="32" fill="none" stroke="#34d399" stroke-width="3" opacity="0">
        <animate attributeName="opacity" values="0.7;0" dur="1.6s" repeatCount="indefinite"/>
        <animate attributeName="stroke-width" values="3;10" dur="1.6s" repeatCount="indefinite"/>
        <animate attributeName="x" values="-2;-12" dur="1.6s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-2;-12" dur="1.6s" repeatCount="indefinite"/>
        <animate attributeName="width" values="304;324" dur="1.6s" repeatCount="indefinite"/>
        <animate attributeName="height" values="64;84" dur="1.6s" repeatCount="indefinite"/>
      </rect>
      <rect x="0" y="0" width="300" height="60" rx="30" fill="url(#greenFill)" stroke="#10b981" stroke-width="2.5"/>
      <rect x="0" y="0" width="300" height="60" rx="30" fill="#34d399" opacity="0">
        <animate attributeName="opacity" values="0;0.35;0" dur="1.6s" repeatCount="indefinite"/>
      </rect>
      <circle cx="36" cy="30" r="16" fill="#ffffff"/>
      <text x="36" y="37" text-anchor="middle" font-family="Poppins, sans-serif" font-weight="800" font-size="16" fill="#059669">C</text>
      <rect x="64" y="22" width="190" height="6" rx="3" fill="rgba(255,255,255,0.85)"/>
      <rect x="64" y="34" width="140" height="6" rx="3" fill="rgba(255,255,255,0.65)"/>
    </g>

    <g transform="translate(0 225)">
      <rect x="0" y="0" width="300" height="60" rx="30" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
      <circle cx="36" cy="30" r="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.45)" stroke-width="2"/>
      <text x="36" y="36" text-anchor="middle" font-family="Poppins, sans-serif" font-weight="800" font-size="14" fill="#ffffff">D</text>
      <rect x="64" y="22" width="200" height="6" rx="3" fill="rgba(255,255,255,0.25)"/>
      <rect x="64" y="34" width="130" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
