<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="mercury" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.94"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- ambient sparkles / faint grid for measurement feel -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.06">
    <line x1="40"  y1="100" x2="120" y2="100"/>
    <line x1="40"  y1="180" x2="100" y2="180"/>
    <line x1="40"  y1="260" x2="120" y2="260"/>
    <line x1="40"  y1="340" x2="100" y2="340"/>
    <line x1="40"  y1="420" x2="120" y2="420"/>
  </g>

  <g transform="translate(196 76)">
    <!-- thermometer body (white) -->
    <rect x="0" y="0" width="58" height="280" rx="29" fill="url(#glass)" stroke="#1e3a8a" stroke-width="6"/>
    <!-- highlight -->
    <rect x="10" y="14" width="10" height="240" rx="5" fill="#ffffff" opacity="0.55"/>
    <!-- mercury column (gold) -->
    <rect x="14" y="118" width="30" height="170" rx="15" fill="url(#mercury)"/>
    <!-- bulb -->
    <circle cx="29" cy="320" r="46" fill="url(#mercury)" stroke="#1e3a8a" stroke-width="6"/>
    <!-- bulb highlight -->
    <ellipse cx="14" cy="306" rx="8" ry="14" fill="#ffffff" opacity="0.55"/>
  </g>

  <!-- °C label -->
  <g font-family="Poppins, system-ui, sans-serif" font-weight="800" fill="#ffffff">
    <text x="298" y="158" font-size="60">°C</text>
  </g>

  <!-- subtle scale ticks to the right -->
  <g stroke="#ffffff" stroke-linecap="round" opacity="0.55">
    <line x1="270" y1="210" x2="296" y2="210" stroke-width="3"/>
    <line x1="270" y1="240" x2="288" y2="240" stroke-width="2"/>
    <line x1="270" y1="270" x2="296" y2="270" stroke-width="3"/>
    <line x1="270" y1="300" x2="288" y2="300" stroke-width="2"/>
    <line x1="270" y1="330" x2="296" y2="330" stroke-width="3"/>
  </g>
</svg>
