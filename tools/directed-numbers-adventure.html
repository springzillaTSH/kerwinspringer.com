            function initOrderExercise() {
                let orderNumbers = [];
                let slotContents = [null, null, null, null];

                function generateOrderNumbers() {
                    const nums = new Set();
                    while (nums.size < 4) {
                        nums.add(Math.floor(Math.random() * 21) - 10);
                    }
                    return Array.from(nums);
                }

                function getChipClass(n) {
                    if (n > 0) return 'positive';
                    if (n < 0) return 'negative';
                    return 'zero';
                }

                function formatNum(n) {
                    if (n < 0) return '\u2212' + Math.abs(n);
                    if (n > 0) return '+' + n;
                    return '0';
                }

                function renderOrderExercise() {
                    orderNumbers = generateOrderNumbers();
                    slotContents = [null, null, null, null];
                    renderOrderState();
                }

                function renderOrderState() {
                    const pool = document.getElementById('orderPool');
                    const dropzone = document.getElementById('orderDropzone');
                    const resultDiv = document.getElementById('orderResult');
                    if (!pool || !dropzone) return;

                    resultDiv.innerHTML = '';

                    // Render pool chips (numbers not yet placed)
                    const poolNums = orderNumbers.filter((n, i) => !slotContents.includes(i));
                    pool.innerHTML = '';
                    poolNums.forEach((n) => {
                        const origIdx = orderNumbers.indexOf(n);
                        // Make sure we handle duplicates by finding unused index
                        let idx = orderNumbers.findIndex((val, i) => val === n && !slotContents.includes(i));
                        const chip = document.createElement('div');
                        chip.className = 'order-number-chip ' + getChipClass(n);
                        chip.textContent = formatNum(n);
                        chip.draggable = true;
                        chip.dataset.idx = idx;

                        chip.addEventListener('dragstart', (e) => {
                            e.dataTransfer.setData('text/plain', idx);
                            e.dataTransfer.setData('source', 'pool');
                            chip.classList.add('dragging');
                        });
                        chip.addEventListener('dragend', () => chip.classList.remove('dragging'));

                        // Touch support
                        chip.addEventListener('touchstart', (e) => {
                            chip._touchIdx = idx;
                            chip._touchSource = 'pool';
                            chip.classList.add('dragging');
                        });

                        pool.appendChild(chip);
                    });

                    // Render drop slots
                    dropzone.innerHTML = '<div class="order-dropzone-line"></div>';
                    for (let s = 0; s < 4; s++) {
                        const slot = document.createElement('div');
                        slot.className = 'order-slot' + (slotContents[s] !== null ? ' filled' : '');
                        slot.style.left = (15 + s * (70/3)) + '%';
                        slot.dataset.slot = s;

                        if (slotContents[s] !== null) {
                            const n = orderNumbers[slotContents[s]];
                            const chip = document.createElement('div');
                            chip.className = 'order-number-chip ' + getChipClass(n);
                            chip.textContent = formatNum(n);
                            chip.draggable = true;
                            chip.dataset.idx = slotContents[s];

                            chip.addEventListener('dragstart', (e) => {
                                e.dataTransfer.setData('text/plain', slotContents[s]);
                                e.dataTransfer.setData('source', 'slot-' + s);
                                chip.classList.add('dragging');
                            });
                            chip.addEventListener('dragend', () => chip.classList.remove('dragging'));

                            chip.addEventListener('touchstart', (e) => {
                                chip._touchIdx = slotContents[s];
                                chip._touchSource = 'slot-' + s;
                                chip.classList.add('dragging');
                            });

                            slot.appendChild(chip);
                        } else {
                            slot.textContent = (s + 1);
                        }

                        slot.addEventListener('dragover', (e) => { e.preventDefault(); slot.classList.add('drag-over'); });
                        slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
                        slot.addEventListener('drop', (e) => {
                            e.preventDefault();
                            slot.classList.remove('drag-over');
                            const idx = parseInt(e.dataTransfer.getData('text/plain'));
                            const source = e.dataTransfer.getData('source');

                            // Remove from old slot if dragged from another slot
                            if (source && source.startsWith('slot-')) {
                                const oldSlot = parseInt(source.split('-')[1]);
                                slotContents[oldSlot] = null;
                            }

                            // If this slot already has something, send it back
                            if (slotContents[s] !== null) {
                                // It goes back to pool automatically
                            }
                            slotContents[s] = idx;
                            playSound('drop');
                            renderOrderState();
                        });

                        // Touch drop support
                        slot.addEventListener('touchend', (e) => {
                            const dragging = document.querySelector('.order-number-chip.dragging');
                            if (dragging) {
                                const idx = parseInt(dragging.dataset.idx);
                                const source = dragging._touchSource;
                                if (source && source.startsWith('slot-')) {
                                    const oldSlot = parseInt(source.split('-')[1]);
                                    slotContents[oldSlot] = null;
                                }
                                slotContents[s] = idx;
                                dragging.classList.remove('dragging');
                                playSound('drop');
                                renderOrderState();
                            }
                        });

                        dropzone.appendChild(slot);
                    }
                }

                window.checkOrder = function() {
                    const resultDiv = document.getElementById('orderResult');
                    if (!resultDiv) return;

                    // Check if all slots are filled
                    if (slotContents.some(s => s === null)) {
                        resultDiv.innerHTML = '<div class="order-result incorrect">Place all 4 numbers on the line first!</div>';
                        return;
                    }

                    const placed = slotContents.map(i => orderNumbers[i]);
                    const sorted = [...orderNumbers].sort((a, b) => a - b);
                    const isCorrect = placed.every((v, i) => v === sorted[i]);

                    if (isCorrect) {
                        playSound('correct');
                        resultDiv.innerHTML = '<div class="order-result correct">Correct! ' + placed.map(n => formatNum(n)).join(' < ') + '</div>';
                    } else {
                        playSound('incorrect');
                        resultDiv.innerHTML = '<div class="order-result incorrect">Not quite — try again! Think: which number is the smallest?</div>';
                    }
                };

                window.resetOrder = function() {
                    playSound('click');
                    slotContents = [null, null, null, null];
                    document.getElementById('orderResult').innerHTML = '';
                    renderOrderState();
                };

                window.newOrderProblem = function() {
                    playSound('pop');
                    renderOrderExercise();
                };

                renderOrderExercise();
            }

                    { expr: '5 − 2m', vars: [{name: 'm', min: -5, max: 5}], evaluate: (v) => 5 - 2*v.m, steps: (v) => [`5 − 2(${v.m})`, `5 − (${2*v.m})`, `${5 - 2*v.m}`] },
                    { expr: 'pq', vars: [{name: 'p', min: -5, max: 5}, {name: 'q', min: -5, max: 5}], evaluate: (v) => v.p * v.q, steps: (v) => [`(${v.p})(${v.q})`, `${v.p * v.q}`] }

            function initDistributive() {
                const problems = [
                    { outside: 2, insideVar: 'x', insideCoeff: 1, op: '+', insideNum: 3 },
                    { outside: -2, insideVar: 'x', insideCoeff: 1, op: '+', insideNum: 3 },
                    { outside: 3, insideVar: 'x', insideCoeff: 1, op: '\u2212', insideNum: 2 },
                    { outside: -3, insideVar: 'x', insideCoeff: 1, op: '\u2212', insideNum: 2 },
                    { outside: 4, insideVar: 'x', insideCoeff: 1, op: '+', insideNum: 1 },
                    { outside: -1, insideVar: 'x', insideCoeff: 1, op: '+', insideNum: 5 },
                    { outside: -4, insideVar: 'x', insideCoeff: 2, op: '\u2212', insideNum: 1 },
                    { outside: 5, insideVar: 'x', insideCoeff: 1, op: '\u2212', insideNum: 3 }
                ];

                let prob = null;
                let step = 0;

                function fmt(n) {
                    if (n < 0) return '\u2212' + Math.abs(n);
                    return '' + n;
                }

                function fmtSigned(n) {
                    if (n < 0) return ' \u2212 ' + Math.abs(n);
                    return ' + ' + n;
                }

                function compute() {
                    const a = prob.outside;
                    const varCoeff = prob.insideCoeff;
                    const num = prob.insideNum;
                    const isPlus = prob.op === '+';

                    const term1Coeff = a * varCoeff;
                    const term2 = isPlus ? a * num : a * (-num);

                    return { term1Coeff, term2 };
                }

                function exprStr() {
                    const a = prob.outside;
                    const c = prob.insideCoeff;
                    const varPart = c === 1 ? prob.insideVar : (c + prob.insideVar);
                    return `${fmt(a)}(${varPart} ${prob.op} ${prob.insideNum})`;
                }

                function pick() {
                    prob = problems[Math.floor(Math.random() * problems.length)];
                    step = 0;
                    render();
                }

                function render() {
                    const area = document.getElementById('distWorkArea');
                    if (!area) return;

                    const { term1Coeff, term2 } = compute();
                    const a = prob.outside;
                    const c = prob.insideCoeff;
                    const varPart = c === 1 ? prob.insideVar : (c + prob.insideVar);
                    const isPlus = prob.op === '+';

                    // Term 1 result string
                    const t1Str = (term1Coeff === 1 ? '' : (term1Coeff === -1 ? '\u2212' : fmt(term1Coeff))) + prob.insideVar;
                    // Term 2 result with sign
                    const t2Str = fmtSigned(term2);
                    // Full result
                    const resultStr = t1Str + t2Str;

                    // Second term display for working
                    const term2Input = isPlus ? prob.insideNum : fmt(-prob.insideNum);
                    const term2Wrap = isPlus ? '' : '(';
                    const term2WrapEnd = isPlus ? '' : ')';

                    let html = '<div class="dist-work-grid">';

                    // Step 0: expression = ?
                    // Step 1: expression = t1 + ?        annotation: a × var = t1
                    // Step 2: expression = t1 + t2       annotation: a × num = t2
                    // (no step 3 — just 2 clicks to complete)

                    if (step === 0) {
                        html += `<div class="dist-work-line visible">
                            <div class="dist-math-grid"><span class="dist-lhs">${exprStr()}</span>
                            <span class="dist-eq">=</span>
                            <span class="dist-rhs" style="color: #6B8AAD;">?</span></div>
                        </div>`;
                    } else if (step === 1) {
                        html += `<div class="dist-work-line visible">
                            <div class="dist-math-grid"><span class="dist-lhs">${exprStr()}</span>
                            <span class="dist-eq">=</span>
                            <span class="dist-rhs"><span class="dist-highlight-blue">${t1Str}</span> <span style="color: #6B8AAD;">+ ?</span></span></div>
                            <span class="eq-annotation" style="opacity:1;"><span class="dist-highlight-blue">${fmt(a)} × ${varPart} = ${t1Str}</span></span>
                        </div>`;
                    } else {
                        html += `<div class="dist-work-line visible">
                            <div class="dist-math-grid"><span class="dist-lhs">${exprStr()}</span>
                            <span class="dist-eq">=</span>
                            <span class="dist-rhs"><span class="dist-highlight-blue">${t1Str}</span><span class="dist-highlight-red">${t2Str}</span></span></div>
                            <span class="eq-annotation" style="opacity:1;"><span class="dist-highlight-red">${fmt(a)} × ${term2Wrap}${term2Input}${term2WrapEnd} = ${fmt(term2)}</span></span>
                        </div>`;
                    }

                    html += '</div>';
                    area.innerHTML = html;
                }

                window.expandStep = function() {
                    if (step < 2) {
                        step++;
                        render();
                        if (step === 2) playSound('correct');
                        else playSound('reveal');
                    }
                };

                window.resetDist = function() {
                    playSound('click');
                    step = 0;
                    render();

                window.newDistProblem = function() { playSound('pop'); pick(); };
                pick();
            }

            function initEquations() {
                const equations = [
                    { left: [{coeff: 1, isVar: true}, {val: 3, op: '+'}], right: [{val: 7}], solution: 4 },
                    { left: [{coeff: 1, isVar: true}, {val: 2, op: '\u2212'}], right: [{val: -5}], solution: -3 },
                    { left: [{coeff: 2, isVar: true}], right: [{val: -8}], solution: -4 },
                    { left: [{coeff: 3, isVar: true}, {val: 1, op: '+'}], right: [{val: 10}], solution: 3 },
                    { left: [{coeff: 2, isVar: true}, {val: 5, op: '\u2212'}], right: [{val: 3}], solution: 4 },
                    { left: [{coeff: 1, isVar: true}, {val: 4, op: '+'}], right: [{val: -1}], solution: -5 },
                    { left: [{coeff: -3, isVar: true}], right: [{val: 9}], solution: -3 },
                    { left: [{coeff: 4, isVar: true}, {val: 10, op: '+'}], right: [{val: 2}], solution: -2 }
                ];

                let currentEq = null;
                let method = 'balance';

                // Balance method state
                let balanceSteps = [];
                let balanceStep = 0;

                // Transpose method state
                let transLines = [];
                let transStep = 0;

                function fmt(n) {
                    if (n < 0) return '\u2212' + Math.abs(n);
                    return '' + n;
                }

                function frac(numerator, denominator) {
                    return `<span class="eq-frac"><span class="eq-frac-num">${numerator}</span><span class="eq-frac-bar"></span><span class="eq-frac-den">${denominator}</span></span>`;
                }

                function fmtSigned(n) {
                    if (n > 0) return '+ ' + n;
                    if (n < 0) return '\u2212 ' + Math.abs(n);
                    return '+ 0';
                }

                function buildBalanceSteps(eq) {
                    const steps = [];
                    const hasConstant = eq.left.length > 1;
                    const coeff = eq.left[0].coeff;
                    const rhs = eq.right[0].val;

                    if (hasConstant) {
                        const constVal = eq.left[1].val;
                        const constOp = eq.left[1].op;
                        const isAdd = constOp === '+';
                        const inverseDesc = isAdd ? `Subtract ${constVal} from both sides` : `Add ${constVal} to both sides`;
                        const newRhs = isAdd ? rhs - constVal : rhs + constVal;
                        const coeffStr = coeff === 1 ? '' : (coeff === -1 ? '\u2212' : fmt(coeff));

                        steps.push({
                            desc: inverseDesc,
                            left: `${coeffStr}x ${constOp} ${constVal} ${isAdd ? '\u2212' : '+'} ${constVal}`,
                            right: `${fmt(rhs)} ${isAdd ? '\u2212' : '+'} ${constVal}`
                        });
                        steps.push({
                            desc: 'Simplify',
                            left: `${coeffStr}x`,
                            right: fmt(newRhs)
                        });

                        if (Math.abs(coeff) !== 1) {
                            const denomStr = coeff < 0 ? '(' + fmt(coeff) + ')' : '' + coeff;
                            steps.push({
                                desc: `Divide both sides by ${fmt(coeff)}`,
                                left: frac(coeffStr + 'x', denomStr),
                                right: frac(fmt(newRhs), denomStr)
                            });
                            steps.push({ desc: 'Simplify', left: 'x', right: fmt(newRhs / coeff) });
                        } else if (coeff === -1) {
                            steps.push({
                                desc: 'Divide both sides by \u22121',
                                left: frac('\u2212x', '(\u22121)'),
                                right: frac(fmt(newRhs), '(\u22121)')
                            });
                            steps.push({ desc: 'Simplify', left: 'x', right: fmt(-newRhs) });
                        }
                    } else {
                        if (Math.abs(coeff) !== 1) {
                            const coeffStr = coeff === -1 ? '\u2212' : fmt(coeff);
                            const denomStr = coeff < 0 ? '(' + fmt(coeff) + ')' : '' + coeff;
                            steps.push({
                                desc: `Divide both sides by ${fmt(coeff)}`,
                                left: frac(coeffStr + 'x', denomStr),
                                right: frac(fmt(rhs), denomStr)
                            });
                            steps.push({ desc: 'Simplify', left: 'x', right: fmt(rhs / coeff) });
                        } else if (coeff === -1) {
                            steps.push({
                                desc: 'Divide both sides by \u22121',
                                left: frac('\u2212x', '(\u22121)'),
                                right: frac(fmt(rhs), '(\u22121)')
                            });
                            steps.push({ desc: 'Simplify', left: 'x', right: fmt(-rhs) });
                        }
                    }
                    return steps;
                }

                function buildTransLines(eq) {
                    const lines = [];
                    const hasConstant = eq.left.length > 1;
                    const coeff = eq.left[0].coeff;
                    const rhs = eq.right[0].val;
                    const coeffStr = coeff === 1 ? '' : (coeff === -1 ? '\u2212' : fmt(coeff));

                    // Line 0: original
                    if (hasConstant) {
                        const constVal = eq.left[1].val;
                        const constOp = eq.left[1].op;
                        lines.push({ left: `${coeffStr}x ${constOp} ${constVal}`, right: fmt(rhs), movable: 'const', constVal, constOp });

                        // Line 1: constant moved across (sign changes)
                        const isAdd = constOp === '+';
                        const newRhs = isAdd ? rhs - constVal : rhs + constVal;
                        lines.push({
                            left: `${coeffStr}x`,
                            right: `${fmt(rhs)} ${isAdd ? '\u2212' : '+'} ${constVal}`,
                            annotation: `${isAdd ? '+' : '\u2212'}${constVal} crosses, becomes ${isAdd ? '\u2212' : '+'}${constVal}`
                        });

                        // Line 2: simplified
                        lines.push({ left: `${coeffStr}x`, right: fmt(newRhs), movable: Math.abs(coeff) > 1 ? 'coeff' : null });

                        if (Math.abs(coeff) !== 1) {
                            const denomStr = coeff < 0 ? '(' + fmt(coeff) + ')' : '' + coeff;
                            // Line 3: coefficient moved across
                            lines.push({
                                left: 'x',
                                right: frac(fmt(newRhs), denomStr),
                                annotation: `×${Math.abs(coeff)} crosses, becomes ÷${Math.abs(coeff)}`
                            });
                            // Line 4: solved
                            lines.push({ left: 'x', right: fmt(newRhs / coeff) });
                        } else if (coeff === -1) {
                            lines.push({
                                left: 'x',
                                right: frac(fmt(newRhs), '(\u22121)'),
                                annotation: '×(\u22121) crosses, becomes ÷(\u22121)'
                            });
                            lines.push({ left: 'x', right: fmt(-newRhs) });
                        }
                    } else {
                        lines.push({ left: `${coeffStr}x`, right: fmt(rhs), movable: 'coeff' });

                        if (Math.abs(coeff) !== 1) {
                            const denomStr = coeff < 0 ? '(' + fmt(coeff) + ')' : '' + coeff;
                            lines.push({
                                left: 'x',
                                right: frac(fmt(rhs), denomStr),
                                annotation: `×${Math.abs(coeff)} crosses, becomes ÷${Math.abs(coeff)}`
                            });
                            lines.push({ left: 'x', right: fmt(rhs / coeff) });
                        } else if (coeff === -1) {
                            lines.push({
                                left: 'x',
                                right: frac(fmt(rhs), '(\u22121)'),
                                annotation: '×(\u22121) crosses, becomes ÷(\u22121)'
                            });
                            lines.push({ left: 'x', right: fmt(-rhs) });
                        }
                    }
                    return lines;
                }

                function pickEquation() {
                    currentEq = equations[Math.floor(Math.random() * equations.length)];
                    balanceSteps = buildBalanceSteps(currentEq);
                    balanceStep = 0;
                    transLines = buildTransLines(currentEq);
                    transStep = 0;
                    render();
                }

                function render() {
                    if (method === 'balance') renderBalance();
                    else renderTranspose();
                }

                function eqLine(lhs, rhs, annotation) {
                    return `<div class="eq-work-line"><div class="eq-math-grid"><span class="eq-lhs">${lhs}</span><span class="eq-eq">=</span><span class="eq-rhs">${rhs}</span></div>${annotation ? `<span class="eq-annotation">${annotation}</span>` : ''}</div>`;
                }

                function renderBalance() {
                    const area = document.getElementById('eqMethodArea');
                    if (!area) return;

                    const hasConst = currentEq.left.length > 1;
                    const coeff = currentEq.left[0].coeff;
                    const rhs = currentEq.right[0].val;
                    const coeffStr = coeff === 1 ? '' : (coeff === -1 ? '\u2212' : fmt(coeff));
                    const origLeft = hasConst ? `${coeffStr}x ${currentEq.left[1].op} ${currentEq.left[1].val}` : `${coeffStr}x`;
                    const origRight = fmt(rhs);

                    let html = '<div class="eq-work-area">';
                    html += eqLine(origLeft, origRight, '');

                    for (let i = 0; i < balanceStep; i++) {
                        const s = balanceSteps[i];
                        html += eqLine(s.left, s.right, s.desc);
                    }

                    const isSolved = balanceStep >= balanceSteps.length;
                    if (isSolved) {
                        html += `<div class="eq-solved">Solution: x = ${fmt(currentEq.solution)}</div>`;
                    } else {
                        html += `<div class="eq-full-row" style="margin-top: 0.75rem;"><button class="eq-op-btn" onclick="window.eqNextStep()">${balanceSteps[balanceStep].desc}</button></div>`;
                    }

                    html += '</div>';
                    area.innerHTML = html;
                    if (isSolved) playSound('correct');
                }

                function renderTranspose() {
                    const area = document.getElementById('eqMethodArea');
                    if (!area) return;

                    let html = '<div class="eq-work-area">';

                    const showCount = Math.min(transStep + 1, transLines.length);
                    for (let i = 0; i < showCount; i++) {
                        const line = transLines[i];
                        const isCurrent = (i === transStep) && (transStep < transLines.length - 1);

                        if (isCurrent && line.movable) {
                            // Render the current line with clickable movable terms
                            let lhsHtml = line.left;
                            let rhsHtml = line.right;

                            if (line.movable === 'const') {
                                const constOp = line.constOp;
                                const constVal = line.constVal;
                                const termStr = `${constOp} ${constVal}`;
                                const coeffPart = lhsHtml.replace(` ${constOp} ${constVal}`, '');
                                lhsHtml = `${coeffPart} <span class="eq-trans-term movable" onclick="window.eqTransClickTerm()" title="Click to move across">${termStr}</span>`;
                            } else if (line.movable === 'coeff') {
                                const coeff = currentEq.left[0].coeff;
                                const coeffDisplay = coeff === -1 ? '\u22121' : fmt(coeff);
                                lhsHtml = `<span class="eq-trans-term movable" onclick="window.eqTransClickTerm()" title="Click to move across">${coeffDisplay}</span>x`;
                            }

                            html += `<div class="eq-work-line"><div class="eq-math-grid"><span class="eq-lhs">${lhsHtml}</span><span class="eq-eq">=</span><span class="eq-rhs">${rhsHtml}</span></div></div>`;
                        } else {
                            html += eqLine(line.left, line.right, line.annotation || '');
                        }
                    }

                    const isSolved = transStep >= transLines.length - 1;
                    if (isSolved) {
                        html += `<div class="eq-solved">Solution: x = ${fmt(currentEq.solution)}</div>`;
                    } else {
                        const nextLine = transLines[transStep + 1];
                        const isSimplify = nextLine && !nextLine.annotation;
                        if (isSimplify) {
                            html += `<div class="eq-full-row" style="margin-top: 0.5rem;"><button class="eq-op-btn" onclick="window.eqTransNext()">Simplify</button></div>`;
                        } else {
                            html += `<div class="eq-trans-hint">Click the <span style="color: #F5A623; font-weight: 600;">highlighted term</span> to move it across</div>`;
                        }
                    }

                    html += '</div>';
                    area.innerHTML = html;
                    if (isSolved) playSound('correct');
                }

                window.switchEqMethod = function(m) {
                    playSound('click');
                    method = m;
                    document.getElementById('eqTab1').className = 'eq-tab' + (m === 'balance' ? ' active' : '');
                    document.getElementById('eqTab2').className = 'eq-tab' + (m === 'transpose' ? ' active' : '');
                    balanceStep = 0;
                    transStep = 0;
                    render();
                };

                window.eqNextStep = function() {
                    if (balanceStep < balanceSteps.length) {
                        balanceStep++;
                        playSound('reveal');
                        render();
                    }
                };

                window.eqTransClickTerm = function() {
                    // Animate the movable term
                    const movable = document.querySelector('.eq-trans-term.movable');
                    if (movable) {
                        movable.classList.remove('movable');
                        movable.classList.add('moving-across');
                        playSound('whoosh');
                        setTimeout(() => {
                            transStep++;
                            render();
                        }, 450);
                    }
                };

                window.eqTransNext = function() {
                    if (transStep < transLines.length - 1) {
                        transStep++;
                        playSound('reveal');
                        render();
                    }
                };

                window.newEqProblem = function() {
                    playSound('pop');
                    pickEquation();
                };

                pickEquation();
            }

            function renderQuiz() {

                let html = `<div class="quiz-phase">
                    <div class="quiz-header">

                            <div class="quiz-progress-bar">

                                <div class="review-item-header">Question ${w.num}</div>
                                <div class="review-question">${w.question}</div>
                                <div class="review-answer-row">
                                    <div class="review-answer-icon wrong">✗</div>
                                    <span class="review-answer-label">Your answer:</span>
                                    <span class="review-answer-text wrong-text">${w.yourAnswer}</span>
                                </div>
                                <div class="review-answer-row">
                                    <div class="review-answer-icon right">✓</div>
                                    <span class="review-answer-label">Correct answer:</span>
                                    <span class="review-answer-text correct-text">${w.correctAnswer}</span>
                                </div>
                            </div>`).join('')}
                        </div>
                    </div>`;
                }

                if (passed) {
                    gameState.completedLevels.add(levelId);
                    awardXP(xpEarned);
                    saveState();

                        0: 'first-steps',
                        1: 'line-pro',
                        2: 'compare-champ',
                        3: 'addition-ace',
                        4: 'mult-master',
                        5: 'division-ace',
                        6: 'mixed-master',
                        7: 'sub-star',
                        8: 'dist-pro',
                        9: 'algebra-ready',
                        10: 'certified'
                    };

                    if (badgesToCheck[levelId]) {
                        if (unlockBadge(badgesToCheck[levelId])) {
                            const badge = badges.find(b => b.id === badgesToCheck[levelId]);
                            html += `<div class="badge-display">
                                <div class="badge-emoji">${badge.emoji}</div>
                                <div class="badge-name">${badge.name}</div>
                                <div class="badge-description">${badge.description}</div>
                            </div>`;
                        }
                    }

                    if (quizData.score === totalQ) {
                        unlockBadge('perfect-score');
                    }

                    createConfetti();
                    playSound('complete');

                    // Save final assessment result for persistent certificate access
                    if (isFinal && passed) {
                        gameState.finalAssessmentResult = { score: quizData.score, total: totalQ, pct, grade: pct >= 90 ? 'Distinction' : (pct >= 80 ? 'Merit' : 'Pass'), stars };
                        saveState();
                    }

                    if (isFinal && passed) {
                        // Certificate
                        const today = new Date();
                        const dateStr = today.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
                        const grade = pct >= 90 ? 'Distinction' : (pct >= 80 ? 'Merit' : 'Pass');
                        const badgeList = [...gameState.badges].map(id => {
                            const b = badges.find(x => x.id === id);
                            return b ? b.emoji + ' ' + b.name : '';
                        }).filter(Boolean).join(' · ');

                        html += `<div id="certificateArea" style="margin-top: 2rem;">
                            <canvas id="certCanvas" width="900" height="636" style="display:none;"></canvas>
                            <div id="certPreview" style="background: white; border: 3px solid #2B4C7E; border-radius: 12px; padding: 2.5rem; max-width: 600px; margin: 0 auto; text-align: center; box-shadow: 0 4px 20px rgba(43,76,126,0.15);">
                                <div style="border: 2px solid #F5A623; border-radius: 8px; padding: 2rem;">
                                    <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; color: #6B8AAD; margin-bottom: 0.5rem;">Certificate of Completion</div>
                                    <div style="font-size: 1.8rem; font-weight: 800; color: #2B4C7E; margin-bottom: 0.25rem;">Directed Numbers Mastery</div>

                                    ${gameState.studentName ? `<div style="font-size: 0.85rem; color: #6B8AAD; margin-bottom: 0.25rem;">This certifies that</div><div style="font-size: 1.5rem; font-weight: 700; color: #2B4C7E; margin-bottom: 0.5rem;">${gameState.studentName}</div><div style="font-size: 0.9rem; color: #4A6B94; margin-bottom: 0.5rem;">achieved</div>` : `<div style="font-size: 0.9rem; color: #4A6B94; margin-bottom: 0.5rem;">This certifies that the student achieved</div>`}
                                    <div style="font-size: 2rem; font-weight: 800; color: #F5A623; margin-bottom: 0.25rem;">${grade}</div>
                                    <div style="font-size: 1.3rem; font-weight: 700; color: #2B4C7E; margin-bottom: 1rem;">${quizData.score}/${totalQ} (${pct}%)</div>
                                    <div style="font-size: 0.8rem; color: #6B8AAD; margin-bottom: 0.5rem;">XP Earned: ${gameState.xp} · Stars: ${'⭐'.repeat(stars)}</div>

                                    <div style="font-size: 0.7rem; color: #9BB0C9; margin-top: 0.5rem; font-style: italic;">Produced by Kerwin Springer</div>

                            </div>
                        </div>`;
                    }

                    html += reviewHtml;

                    html += `<div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
                        <button class="btn btn-secondary" onclick="window.renderScreen('map')">← Back to Map</button>
                        ${!isFinal && levelId < 10 ? `<button class="btn" onclick="window.renderScreen('level-${levelId + 1}')">Next Level →</button>` : ''}
                    </div>`;
                } else {
                    updateStreak(false);

                    html += reviewHtml;

                    if (isFinal) {
                        html += `<div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
                            <button class="btn btn-secondary" onclick="window.renderScreen('map')">← Back to Map</button>
                            <button class="btn" onclick="window.showPhase('quiz')">Try Again</button>
                        </div>`;
                    } else {
                        html += `<div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
                            <button class="btn btn-secondary" onclick="window.showPhase('teaching')">← Review Teaching</button>
                            <button class="btn" onclick="window.showPhase('practice')">Try Practice Again</button>
                        </div>`;
                    }
                }

                html += `</div>`;
                document.getElementById('quizContent').innerHTML = html;

            window.selectQuizOption = function(idx) {
                quizData.selectedAnswers[quizData.currentQuestion] = idx;
                playSound('pop');
                renderQuizQuestion();
            };

            window.nextQuestion = function() {
                if (quizData.currentQuestion < level.quiz.length - 1) {
                    quizData.currentQuestion++;
                    playSound('click');
                    renderQuizQuestion();
                }
            };

                if (quizData.currentQuestion > 0) {
                    quizData.currentQuestion--;
                    playSound('click');
                    renderQuizQuestion();
                }
            };

            window.submitQuiz = function() {
                quizData.score = 0;
                level._shuffledQuiz.forEach((sq, idx) => {
                    if (quizData.selectedAnswers[idx] === sq.correct) {
                        quizData.score++;
                        updateStreak(true);
                    } else {
                        updateStreak(false);
                    }
                });

                quizData.submitted = true;
                const isFinal = level.quiz.length > 10;
                const passed = isFinal ? quizData.score >= 35 : quizData.score >= 3;
                playSound(passed ? 'correct' : 'incorrect');
                renderQuizQuestion();
            };

            window.downloadCertificate = function() {
                const canvas = document.getElementById('certCanvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const W = 900, H = 636;
                ctx.clearRect(0, 0, W, H);

                // Background
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, W, H);

                // Outer border
                ctx.strokeStyle = '#2B4C7E';
                ctx.lineWidth = 6;
                ctx.strokeRect(20, 20, W - 40, H - 40);

                // Inner gold border
                ctx.strokeStyle = '#F5A623';
                ctx.lineWidth = 2;
                ctx.strokeRect(35, 35, W - 70, H - 70);

                // Corner decorations
                const corners = [[45, 45], [W - 45, 45], [45, H - 45], [W - 45, H - 45]];
                corners.forEach(([cx, cy]) => {
                    ctx.beginPath();
                    ctx.arc(cx, cy, 8, 0, Math.PI * 2);
                    ctx.fillStyle = '#F5A623';
                    ctx.fill();
                });

                // Header
                ctx.textAlign = 'center';
                ctx.fillStyle = '#6B8AAD';
                ctx.font = '11px Poppins, sans-serif';
                ctx.letterSpacing = '3px';
                ctx.fillText('CERTIFICATE OF COMPLETION', W / 2, 90);

                // Title
                ctx.fillStyle = '#2B4C7E';
                ctx.font = 'bold 36px Poppins, sans-serif';
                ctx.fillText('Directed Numbers Mastery', W / 2, 140);

                // Subtitle
                ctx.fillStyle = '#6B8AAD';
                ctx.font = '14px Poppins, sans-serif';
                ctx.fillText('CSEC Mathematics — Student Hub', W / 2, 170);

                // Gold line
                ctx.strokeStyle = '#F5A623';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(W / 2 - 40, 195);
                ctx.lineTo(W / 2 + 40, 195);
                ctx.stroke();

                // Achievement text with optional student name
                let certY = 215;
                if (gameState.studentName) {
                    ctx.fillStyle = '#6B8AAD';
                    ctx.font = '13px Poppins, sans-serif';
                    ctx.fillText('This certifies that', W / 2, certY);
                    certY += 35;
                    ctx.fillStyle = '#2B4C7E';
                    ctx.font = 'bold 28px Poppins, sans-serif';
                    ctx.fillText(gameState.studentName, W / 2, certY);
                    certY += 30;
                    ctx.fillStyle = '#4A6B94';
                    ctx.font = '15px Poppins, sans-serif';
                    ctx.fillText('achieved', W / 2, certY);
                } else {
                    ctx.fillStyle = '#4A6B94';
                    ctx.font = '15px Poppins, sans-serif';
                    ctx.fillText('This certifies that the student achieved', W / 2, certY + 15);
                    certY += 15;
                }
                certY += 40;

                // Grade
                const totalQ = level.quiz.length;
                const pct = Math.round((quizData.score / totalQ) * 100);
                const grade = pct >= 90 ? 'Distinction' : (pct >= 80 ? 'Merit' : 'Pass');
                ctx.fillStyle = '#F5A623';
                ctx.font = 'bold 42px Poppins, sans-serif';
                ctx.fillText(grade, W / 2, certY);
                certY += 40;

                // Score
                ctx.fillStyle = '#2B4C7E';
                ctx.font = 'bold 24px Poppins, sans-serif';
                ctx.fillText(quizData.score + '/' + totalQ + ' (' + pct + '%)', W / 2, certY);
                certY += 35;

                // Stats line
                const stars = Math.min(3, Math.floor((quizData.score / totalQ) * 3) + 1);
                ctx.fillStyle = '#6B8AAD';
                ctx.font = '13px Poppins, sans-serif';
                ctx.fillText('XP Earned: ' + gameState.xp + '  |  Stars: ' + '⭐'.repeat(stars), W / 2, certY);
                certY += 30;

                // Badges
                const badgeList = [...gameState.badges].map(id => {
                    const b = badges.find(x => x.id === id);
                    return b ? b.emoji + ' ' + b.name : '';
                }).filter(Boolean);
                if (badgeList.length > 0) {
                    ctx.font = '12px Poppins, sans-serif';
                    ctx.fillStyle = '#6B8AAD';
                    const row1 = badgeList.slice(0, 5).join('  ·  ');
                    const row2 = badgeList.slice(5).join('  ·  ');
                    ctx.fillText(row1, W / 2, certY);
                    certY += 20;
                    if (row2) { ctx.fillText(row2, W / 2, certY); certY += 20; }
                }
                certY += 20;

                // Bottom gold line
                ctx.strokeStyle = '#F5A623';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(W / 2 - 40, certY);
                ctx.lineTo(W / 2 + 40, certY);
                ctx.stroke();
                certY += 35;

                // Date
                const today = new Date();
                const dateStr = today.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
                ctx.fillStyle = '#6B8AAD';
                ctx.font = '13px Poppins, sans-serif';
                ctx.fillText(dateStr, W / 2, certY);

                // Copyright & Producer at fixed bottom
                ctx.fillStyle = '#2B4C7E';
                ctx.font = 'bold 11px Poppins, sans-serif';
                ctx.fillText('© 2026 Student Hub', W / 2, H - 75);

                ctx.fillStyle = '#9BB0C9';
                ctx.font = 'italic 11px Poppins, sans-serif';
                ctx.fillText('Produced by Kerwin Springer', W / 2, H - 55);

                // Download
                const link = document.createElement('a');
                link.download = 'Directed-Numbers-Certificate.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                playSound('complete');
            };

            window.checkPracticeAnswer = function(lid, pidx, oidx) {
                const sh = level._shuffledPractice[pidx];
                practiceAnswered[pidx] = oidx;

                if (oidx === sh.correct) {
                    updateStreak(true);
                    playSound('correct');
                } else {
                    updateStreak(false);
                    playSound('incorrect');
                }

                renderPractice();
            };
        }

        window.renderScreen = function(screen) {
            playSound('navigate');
            if (screen === 'map') {
                document.getElementById('mainContent').innerHTML = `
                    <div id="mapScreen" class="screen active">
                        <div class="map-container" id="mapContainer"></div>
                    </div>
                `;
                renderMap();
            } else if (screen.startsWith('level-')) {
                const levelId = parseInt(screen.split('-')[1]);
                renderLevel(levelId);
            }
        };

        window.showBadgePanel = function() {
            playSound('pop');
            const overlay = document.createElement('div');
            overlay.className = 'badge-overlay';
            overlay.onclick = function(e) { if (e.target === overlay) { overlay.remove(); playSound('click'); } };

            let cardsHtml = badges.map(b => {
                const earned = gameState.badges.has(b.id);
                return `<div class="badge-card ${earned ? 'earned' : 'locked'}">
                    <span class="badge-card-emoji">${earned ? b.emoji : '🔒'}</span>
                    <div class="badge-card-info">
                        <div class="badge-card-name">${b.name}</div>
                        <div class="badge-card-desc">${earned ? b.description : b.condition}</div>
                    </div>
                </div>`;
            }).join('');

            overlay.innerHTML = `<div class="badge-panel">
                <div class="badge-panel-header">
                    <div class="badge-panel-title">Badges (${gameState.badges.size}/${badges.length})</div>
                    <button class="badge-panel-close" onclick="this.closest('.badge-overlay').remove(); playSound('click');">✕</button>
                </div>
                <div class="badge-grid">${cardsHtml}</div>
            </div>`;

            document.body.appendChild(overlay);
        };

        window.downloadCertificateSaved = function() {
            const canvas = document.getElementById('certCanvas');
            if (!canvas || !gameState.finalAssessmentResult) return;
            const ctx = canvas.getContext('2d');
            const W = 900, H = 636;
            const r = gameState.finalAssessmentResult;
            ctx.clearRect(0, 0, W, H);

            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, W, H);

            ctx.strokeStyle = '#2B4C7E';
            ctx.lineWidth = 6;
            ctx.strokeRect(20, 20, W - 40, H - 40);

            ctx.strokeStyle = '#F5A623';
            ctx.lineWidth = 2;
            ctx.strokeRect(35, 35, W - 70, H - 70);

            const corners = [[45, 45], [W - 45, 45], [45, H - 45], [W - 45, H - 45]];
            corners.forEach(([cx, cy]) => {
                ctx.beginPath();
                ctx.arc(cx, cy, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#F5A623';
                ctx.fill();
            });

            ctx.textAlign = 'center';
            ctx.fillStyle = '#6B8AAD';
            ctx.font = '11px Poppins, sans-serif';
            ctx.fillText('CERTIFICATE OF COMPLETION', W / 2, 90);

            ctx.fillStyle = '#2B4C7E';
            ctx.font = 'bold 36px Poppins, sans-serif';
            ctx.fillText('Directed Numbers Mastery', W / 2, 140);

            ctx.fillStyle = '#6B8AAD';
            ctx.font = '14px Poppins, sans-serif';
            ctx.fillText('CSEC Mathematics — Student Hub', W / 2, 170);

            ctx.strokeStyle = '#F5A623';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(W / 2 - 40, 195);
            ctx.lineTo(W / 2 + 40, 195);
            ctx.stroke();

            let certY = 215;
            if (gameState.studentName) {
                ctx.fillStyle = '#6B8AAD';
                ctx.font = '13px Poppins, sans-serif';
                ctx.fillText('This certifies that', W / 2, certY);
                certY += 35;
                ctx.fillStyle = '#2B4C7E';
                ctx.font = 'bold 28px Poppins, sans-serif';
                ctx.fillText(gameState.studentName, W / 2, certY);
                certY += 30;
                ctx.fillStyle = '#4A6B94';
                ctx.font = '15px Poppins, sans-serif';
                ctx.fillText('achieved', W / 2, certY);
            } else {
                ctx.fillStyle = '#4A6B94';
                ctx.font = '15px Poppins, sans-serif';
                ctx.fillText('This certifies that the student achieved', W / 2, certY + 15);
                certY += 15;
            }
            certY += 40;

            ctx.fillStyle = '#F5A623';
            ctx.font = 'bold 42px Poppins, sans-serif';
            ctx.fillText(r.grade, W / 2, certY);
            certY += 40;

            ctx.fillStyle = '#2B4C7E';
            ctx.font = 'bold 24px Poppins, sans-serif';
            ctx.fillText(r.score + '/' + r.total + ' (' + r.pct + '%)', W / 2, certY);
            certY += 35;

            ctx.fillStyle = '#6B8AAD';
            ctx.font = '13px Poppins, sans-serif';
            ctx.fillText('XP Earned: ' + gameState.xp + '  |  Stars: ' + '⭐'.repeat(r.stars), W / 2, certY);
            certY += 30;

            const badgeList = [...gameState.badges].map(id => {
                const b = badges.find(x => x.id === id);
                return b ? b.emoji + ' ' + b.name : '';
            }).filter(Boolean);
            if (badgeList.length > 0) {
                ctx.font = '12px Poppins, sans-serif';
                ctx.fillStyle = '#6B8AAD';
                const row1 = badgeList.slice(0, 5).join('  ·  ');
                const row2 = badgeList.slice(5).join('  ·  ');
                ctx.fillText(row1, W / 2, certY);
                certY += 20;
                if (row2) { ctx.fillText(row2, W / 2, certY); certY += 20; }
            }
            certY += 20;

            ctx.strokeStyle = '#F5A623';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(W / 2 - 40, certY);
            ctx.lineTo(W / 2 + 40, certY);
            ctx.stroke();
            certY += 35;

            const today = new Date();
            const dateStr = today.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
            ctx.fillStyle = '#6B8AAD';
            ctx.font = '13px Poppins, sans-serif';
            ctx.fillText(dateStr, W / 2, certY);

            ctx.fillStyle = '#2B4C7E';
            ctx.font = 'bold 11px Poppins, sans-serif';
            ctx.fillText('© 2026 Student Hub', W / 2, H - 75);

            ctx.fillStyle = '#9BB0C9';
            ctx.font = 'italic 11px Poppins, sans-serif';
            ctx.fillText('Produced by Kerwin Springer', W / 2, H - 55);

            const link = document.createElement('a');
            link.download = 'Directed-Numbers-Certificate.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            playSound('complete');
        };

        // ==================== SCRIBBLER ====================
        window.scribState = {
            tool: 'pen',         // pen | highlighter | eraser
            color: '#2B4C7E',
            lineWidth: 3,
            drawing: false,
            strokes: [],         // Array of stroke objects { points, color, width, tool }
            currentPoints: [],   // Points for the stroke currently being drawn
            open: false,
            expanded: false,     // Full-width scribbler mode
            eraserPrecision: false, // false = drag mode, true = precision (tap) mode
            dpr: window.devicePixelRatio || 1,
            erasedThisStroke: new Set()
        };

        function scribBg() {
            return document.body.classList.contains('dark-mode') ? '#232b3e' : '#ffffff';
        }

        window.toggleScribbler = function() {
            const panel = document.getElementById('scribblerPanel');
            const toggle = document.getElementById('scribblerToggle');
            scribState.open = !scribState.open;
            panel.classList.toggle('open', scribState.open);
            toggle.classList.toggle('panel-open', scribState.open);
            toggle.classList.toggle('panel-expanded', scribState.expanded);
            toggle.innerHTML = scribState.open ? '✕' : '✏️ Scribbler';
            playSound('click');
            if (scribState.open) setTimeout(scribResizeCanvas, 50);
        };

        // Expand / collapse scribbler to full width
        window.toggleScribblerExpand = function() {
            scribState.expanded = !scribState.expanded;
            const panel = document.getElementById('scribblerPanel');
            const toggle = document.getElementById('scribblerToggle');
            const btn = document.getElementById('scribExpandBtn');
            panel.classList.toggle('expanded', scribState.expanded);
            toggle.classList.toggle('panel-expanded', scribState.expanded);
            btn.textContent = scribState.expanded ? '⊏' : '⛶';
            btn.title = scribState.expanded ? 'Collapse' : 'Expand';
            playSound('click');
            setTimeout(scribResizeCanvas, 60);
        };

        // Toggle eraser mode: drag (default) vs precision (tap to remove)
        window.toggleEraserMode = function() {
            scribState.eraserPrecision = !scribState.eraserPrecision;
            const btn = document.getElementById('eraserModeBtn');
            btn.textContent = scribState.eraserPrecision ? 'Precision' : 'Drag';
            btn.classList.toggle('precision', scribState.eraserPrecision);
            const wrap = document.getElementById('scribblerCanvasWrap');
            wrap.className = 'scribbler-canvas-wrap' +
                (scribState.eraserPrecision ? ' precision-cursor' : ' eraser-cursor');
            playSound('click');
        };

        // Fullscreen for the whole app
        window.toggleFullscreen = function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(function() {});
                document.getElementById('fullscreenBtn').textContent = '⊠';
            } else {
                document.exitFullscreen();
                document.getElementById('fullscreenBtn').textContent = '⛶';
            }
            playSound('click');
        };
        document.addEventListener('fullscreenchange', function() {
            const btn = document.getElementById('fullscreenBtn');
            if (btn) btn.textContent = document.fullscreenElement ? '⊠' : '⛶';
        });

        function scribResizeCanvas() {
            const wrap = document.getElementById('scribblerCanvasWrap');
            const canvas = document.getElementById('scribblerCanvas');
            if (!wrap || !canvas) return;
            const dpr = window.devicePixelRatio || 1;
            scribState.dpr = dpr;
            const w = wrap.clientWidth;
            const h = wrap.clientHeight;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            scribRedraw();
        }

        // Redraw all strokes from scratch (enables stroke eraser + clean undo)
        function scribRedraw() {
            const canvas = document.getElementById('scribblerCanvas');
            const ctx = canvas.getContext('2d');
            const dpr = scribState.dpr;
            const w = canvas.width / dpr;
            const h = canvas.height / dpr;

            ctx.save();
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.fillStyle = scribBg();
            ctx.fillRect(0, 0, w, h);

            scribState.strokes.forEach(s => scribDrawStroke(ctx, s));
            ctx.restore();
        }

        function scribDrawStroke(ctx, s) {
            if (s.points.length < 2) return;
            ctx.save();
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (s.tool === 'highlighter') {
                // Classic yellow highlighter — single smooth pass
                ctx.globalCompositeOperation = 'multiply';
                ctx.strokeStyle = '#FAED27';
                ctx.lineWidth = s.width * 5;
                ctx.globalAlpha = 0.35;
            } else {
                // Pen — normal drawing
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = s.color;
                ctx.lineWidth = s.width;
                ctx.globalAlpha = 1;
            }

            ctx.beginPath();
            ctx.moveTo(s.points[0].x, s.points[0].y);
            for (let i = 1; i < s.points.length; i++) {
                ctx.lineTo(s.points[i].x, s.points[i].y);
            }
            ctx.stroke();
            ctx.restore();
        }

        window.addEventListener('resize', function() {
            if (scribState.open) scribResizeCanvas();
        });

        window.scribSetTool = function(tool) {
            scribState.tool = tool;
            document.getElementById('scribPen').classList.toggle('active', tool === 'pen');
            document.getElementById('scribHighlight').classList.toggle('active', tool === 'highlighter');
            document.getElementById('scribEraser').classList.toggle('active', tool === 'eraser');
            // Show/hide eraser mode toggle
            const modeBtn = document.getElementById('eraserModeBtn');
            modeBtn.style.display = tool === 'eraser' ? 'inline-block' : 'none';
            const wrap = document.getElementById('scribblerCanvasWrap');
            if (tool === 'eraser') {
                wrap.className = 'scribbler-canvas-wrap' +
                    (scribState.eraserPrecision ? ' precision-cursor' : ' eraser-cursor');
            } else {
                wrap.className = 'scribbler-canvas-wrap';
            }
        };

        window.scribSetColor = function(color, el) {
            scribState.color = color;
            // Switch back to pen (or stay on highlighter)
            if (scribState.tool === 'eraser') {
                scribState.tool = 'pen';
                window.scribSetTool('pen');
            }
            document.querySelectorAll('.scrib-color').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        };

        window.scribUndo = function() {
            if (scribState.strokes.length > 0) {
                scribState.strokes.pop();
                scribRedraw();
                playSound('pop');
            }
        };

        window.scribClear = function() {
            scribState.strokes = [];
            scribRedraw();
            playSound('whoosh');
        };

        // Stroke eraser: find the nearest stroke to a point
        function scribFindStroke(px, py) {
            const threshold = 12;
            // Search in reverse (top strokes first)
            for (let i = scribState.strokes.length - 1; i >= 0; i--) {
                const s = scribState.strokes[i];
                for (let j = 0; j < s.points.length; j++) {
                    const dx = s.points[j].x - px;
                    const dy = s.points[j].y - py;
                    if (dx * dx + dy * dy < threshold * threshold) return i;
                }
            }
            return -1;
        }

        // Canvas drawing events
        (function() {
            const canvas = document.getElementById('scribblerCanvas');
            const ctx = canvas.getContext('2d');

            function getPos(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            }

            // Eraser: erase any stroke the cursor passes over while dragging
            function eraseAtPos(pos) {
                const idx = scribFindStroke(pos.x, pos.y);
                if (idx >= 0 && !scribState.erasedThisStroke.has(idx)) {
                    scribState.erasedThisStroke.add(idx);
                    // Remove stroke — indices shift, so rebuild the set
                    scribState.strokes.splice(idx, 1);
                    const updated = new Set();
                    scribState.erasedThisStroke.forEach(v => { if (v < idx) updated.add(v); });
                    scribState.erasedThisStroke = updated;
                    scribRedraw();
                }
            }

            function startDraw(e) {
                e.preventDefault();
                const pos = getPos(e);

                // Eraser mode
                if (scribState.tool === 'eraser') {
                    if (scribState.eraserPrecision) {
                        // Precision: single tap removes one stroke
                        const idx = scribFindStroke(pos.x, pos.y);
                        if (idx >= 0) {
                            scribState.strokes.splice(idx, 1);
                            scribRedraw();
                            playSound('pop');
                        }
                        return;
                    }
                    // Drag mode: erase strokes as you drag across
                    scribState.drawing = true;
                    scribState.erasedThisStroke = new Set();
                    eraseAtPos(pos);
                    return;
                }

                scribState.drawing = true;
                scribState.currentPoints = [pos];

                // Live preview setup
                const dpr = scribState.dpr;
                ctx.save();
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                if (scribState.tool === 'highlighter') {
                    // Highlighter: draw incrementally then full redraw on end
                    ctx.globalCompositeOperation = 'multiply';
                    ctx.strokeStyle = '#FAED27';
                    ctx.lineWidth = scribState.lineWidth * 5;
                    ctx.globalAlpha = 0.35;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = scribState.color;
                    ctx.lineWidth = scribState.lineWidth;
                    ctx.globalAlpha = 1;
                }

                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            }

            function draw(e) {
                if (!scribState.drawing) return;
                e.preventDefault();
                const pos = getPos(e);

                // Eraser: continuously check under cursor
                if (scribState.tool === 'eraser') {
                    eraseAtPos(pos);
                    return;
                }

                scribState.currentPoints.push(pos);

                if (scribState.tool === 'highlighter') {
                    // Redraw entire current stroke each move for smooth appearance
                    scribRedraw();
                    const dpr = scribState.dpr;
                    ctx.save();
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.globalCompositeOperation = 'multiply';
                    ctx.strokeStyle = '#FAED27';
                    ctx.lineWidth = scribState.lineWidth * 5;
                    ctx.globalAlpha = 0.35;
                    ctx.beginPath();
                    ctx.moveTo(scribState.currentPoints[0].x, scribState.currentPoints[0].y);
                    for (let i = 1; i < scribState.currentPoints.length; i++) {
                        ctx.lineTo(scribState.currentPoints[i].x, scribState.currentPoints[i].y);
                    }
                    ctx.stroke();
                    ctx.restore();
                } else {
                    ctx.lineTo(pos.x, pos.y);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(pos.x, pos.y);
                }
            }

            function endDraw(e) {
                if (!scribState.drawing) return;
                if (e) e.preventDefault();
                scribState.drawing = false;

                // Eraser just finishes
                if (scribState.tool === 'eraser') {
                    scribState.erasedThisStroke = new Set();
                    return;
                }

                ctx.restore();

                if (scribState.currentPoints.length > 1) {
                    scribState.strokes.push({
                        points: scribState.currentPoints,
                        color: scribState.tool === 'highlighter' ? '#FAED27' : scribState.color,
                        width: scribState.lineWidth,
                        tool: scribState.tool
                    });
                    scribState.currentPoints = [];
                    if (scribState.strokes.length > 200) scribState.strokes.shift();
                    // Full redraw to finalize highlighter compositing
                    if (scribState.tool === 'highlighter') scribRedraw();
                }
            }

            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', endDraw);
            canvas.addEventListener('mouseleave', endDraw);
            canvas.addEventListener('touchstart', startDraw, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', endDraw);
            canvas.addEventListener('touchcancel', endDraw);
        })();

        // Load saved state then render
        loadState();
        renderMap();
        updateHeader();
    </script>
    <script>
    (function(){
      var ls=document.getElementById('loadingScreen');
      if(!ls)return;
      var key='tool_visited_'+location.pathname;
      if(sessionStorage.getItem(key)){ls.remove();return;}
      sessionStorage.setItem(key,'1');
      var start=Date.now();
      var appName=document.getElementById('loadAppName');
      setTimeout(function(){appName.style.color='rgba(233,236,243,0.35)';},100);
      function dismiss(){
        var remaining=Math.max(0,2500-(Date.now()-start));
        setTimeout(function(){
          ls.style.opacity='0';ls.style.transform='scale(1.02)';
          setTimeout(function(){ls.remove();},650);
        },remaining);
      }
      if(document.readyState==='complete')dismiss();
      else window.addEventListener('load',dismiss);
    })();
    </script>
</body>
