  function setColor(hex, idx){
    penColor = hex;
    colorBtns.forEach(function(b, i){ b.classList.toggle('active', i === idx); });
    if(tool === 'eraser' || tool === 'stroke-eraser') setTool('pen');
  }

  /* ---- Stroke eraser hit-test ---- */
  function findStrokeAt(x, y, threshold) {
    for (var i = strokes.length - 1; i >= 0; i--) {
      var s = strokes[i];
      for (var j = 0; j < s.points.length; j++) {
        var dx = s.points[j][0] - x;
        var dy = s.points[j][1] - y;
        if (dx*dx + dy*dy < threshold * threshold) return i;
      }
    }
    return -1;
  }

  function eraseStrokeAt(x, y) {
    var idx = findStrokeAt(x, y, 16);
    if (idx >= 0) {
      strokes.splice(idx, 1);
      saveStrokes();
      redrawAll();
    }
  }

  /* ---- Persistence ---- */
  function saveStrokes(){
    try { localStorage.setItem(LS_KEY, JSON.stringify(strokes)); } catch(e){}
  }
  function loadStrokes(){
    try {
      var d = localStorage.getItem(LS_KEY);
      if(d) strokes = JSON.parse(d);
    } catch(e){}
  }

  /* ---- Shape snap ---- */
  var SNAP_HOLD_MS = 420;
  var snapTimer = null;
  var snapLastPoint = null;

  function startSnapWatch() {
    stopSnapWatch();
    snapLastPoint = null;
    var check = function() {
      if (!isDrawing || !currentStroke || currentStroke.tool !== 'pen') return;
      var pts = currentStroke.points;
      if (pts.length < 8) { snapTimer = requestAnimationFrame(check); return; }
      var last = pts[pts.length - 1];
      if (!snapLastPoint) {
        snapLastPoint = { x: last[0], y: last[1], t: performance.now() };
      } else {
        var dx = last[0] - snapLastPoint.x, dy = last[1] - snapLastPoint.y;
        if (dx*dx + dy*dy > 36) {
          snapLastPoint = { x: last[0], y: last[1], t: performance.now() };
        } else if (performance.now() - snapLastPoint.t > SNAP_HOLD_MS) {
          trySnap();
          return;
        }
      }
      snapTimer = requestAnimationFrame(check);
    };
    snapTimer = requestAnimationFrame(check);
  }

  function stopSnapWatch() {
    if (snapTimer) cancelAnimationFrame(snapTimer);
    snapTimer = null;
    snapLastPoint = null;
  }

  function trySnap() {
    if (!currentStroke) return;
    var shape = detectShape(currentStroke.points);
    if (!shape) return;
    currentStroke.points = shapeToPoints(shape);
    strokes.push(currentStroke);
    currentStroke = null;
    isDrawing = false;
    redrawAll();
    saveStrokes();
  }

  function detectShape(points) {
    if (points.length < 8) return null;
    var minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    points.forEach(function(p) {
      if(p[0]<minX)minX=p[0]; if(p[0]>maxX)maxX=p[0];
      if(p[1]<minY)minY=p[1]; if(p[1]>maxY)maxY=p[1];
    });
    var w=maxX-minX, h=maxY-minY;
    if(w<25 && h<25) return null;
    var first=points[0], last=points[points.length-1];
    var closed = Math.hypot(last[0]-first[0], last[1]-first[1]) < Math.min(w,h)*0.25;
    if(closed) {
      var cx=(minX+maxX)/2, cy=(minY+maxY)/2;
      var radii=points.map(function(p){return Math.hypot(p[0]-cx,p[1]-cy);});
      var rMean=radii.reduce(function(s,r){return s+r;},0)/radii.length;
      var rVar=radii.reduce(function(s,r){return s+(r-rMean)*(r-rMean);},0)/radii.length;
      var circleness=Math.sqrt(rVar)/rMean;
      if(circleness<0.18 && Math.abs(w-h)/Math.max(w,h)<0.25) {
        return {kind:'circle',cx:cx,cy:cy,r:rMean};
      }
    }
    var lineLen=Math.hypot(last[0]-first[0],last[1]-first[1]);
    if(lineLen>40 && !closed) {
      var maxResid=0;
      points.forEach(function(p){
        var num=Math.abs((last[1]-first[1])*p[0]-(last[0]-first[0])*p[1]+last[0]*first[1]-last[1]*first[0]);
        var d=num/lineLen;
        if(d>maxResid) maxResid=d;
      });
      if(maxResid/lineLen<0.06) {
        return {kind:'line',x1:first[0],y1:first[1],x2:last[0],y2:last[1]};
      }
    }
    return null;
  }

  function shapeToPoints(shape) {
    var out=[];
    if(shape.kind==='circle') {
      for(var i=0;i<=48;i++) {
        var a=(i/48)*Math.PI*2;
        out.push([shape.cx+shape.r*Math.cos(a), shape.cy+shape.r*Math.sin(a)]);
      }
    } else if(shape.kind==='line') {
      out.push([shape.x1,shape.y1]);
      out.push([shape.x2,shape.y2]);
    }
    return out;
  }

  /* ---- Protractor (draggable, rotatable, resizable) ---- */
  var protractorImg = null;
  var protractorState = { active:false, x:0, y:0, w:260, h:140, angle:0, scale:1, dragging:null, dragStart:null };
  var protractorDrag = null;

  /* ---- Compass (adjustable radius via grip handle) ---- */
  var compass = {
    active: false,
    pivotX: 0, pivotY: 0,
    pencilX: 0, pencilY: 0,
    radius: 60,
    dragging: null, // 'pivot', 'grip' (resize), 'sweep'
    dragOff: null,
    sweepStart: 0,
    sweepPoints: []
  };

  function buildProtractorSVG() {
    var W=260,H=140,cx=130,cy=130,rOuter=125;
    var parts=[];
    parts.push('<path d="M '+(cx-rOuter)+' '+cy+' A '+rOuter+' '+rOuter+' 0 0 1 '+(cx+rOuter)+' '+cy+' Z" fill="rgba(255,244,215,0.4)" stroke="#2B4C7E" stroke-width="1.5"/>');
    for(var d=0;d<=180;d++) {
      var a=(180-d)*Math.PI/180;
      var sin=Math.sin(a),cos=Math.cos(a);
      var len=d%10===0?16:d%5===0?10:5;
      var sw=d%10===0?1.2:0.5;
      var r1=rOuter, r2=rOuter-len;
      parts.push('<line x1="'+(cx+r1*cos).toFixed(1)+'" y1="'+(cy-r1*sin).toFixed(1)+'" x2="'+(cx+r2*cos).toFixed(1)+'" y2="'+(cy-r2*sin).toFixed(1)+'" stroke="#2B4C7E" stroke-width="'+sw+'"/>');
      if(d%10===0) {
        var tx=cx+(rOuter-22)*cos, ty=cy-(rOuter-22)*sin+4;
        parts.push('<text x="'+tx.toFixed(1)+'" y="'+ty.toFixed(1)+'" text-anchor="middle" font-family="Poppins,sans-serif" font-weight="700" font-size="9" fill="#2B4C7E">'+d+'</text>');
      }
    }
    parts.push('<line x1="'+(cx-rOuter)+'" y1="'+cy+'" x2="'+(cx+rOuter)+'" y2="'+cy+'" stroke="#2B4C7E" stroke-width="1.5"/>');
    parts.push('<circle cx="'+cx+'" cy="'+cy+'" r="3" fill="none" stroke="#2B4C7E" stroke-width="1"/>');
    return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'">'+parts.join('')+'</svg>';
  }

  function placeProtractor() {
    if(protractorState.active) { removeProtractor(); return; }
    var svgStr = buildProtractorSVG();
    var url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
    var img = new Image();
    img.onload = function(){
      protractorImg = img;
      var rect = canvasWrap.getBoundingClientRect();
      protractorState.active = true;
      protractorState.x = (rect.width - 260) / 2;
      protractorState.y = (rect.height - 140) / 2;
      protractorState.w = 260;
      protractorState.h = 140;
      protractorState.angle = 0;
      protractorState.scale = 1;
      redrawAll();
    };
    img.onerror = function(){ console.error('Protractor image failed to load'); };
    img.src = url;
  }

  function removeProtractor() {
    protractorState.active = false;
    protractorImg = null;
    redrawAll();
  }

  function drawProtractor() {
    if(!protractorState.active || !protractorImg) return;
    var ps = protractorState;
    var cx = ps.x + ps.w * ps.scale / 2;
    var cy = ps.y + ps.h * ps.scale / 2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(ps.angle * Math.PI / 180);
    ctx.scale(ps.scale, ps.scale);
    ctx.drawImage(protractorImg, -ps.w / 2, -ps.h / 2, ps.w, ps.h);
    ctx.restore();
    // Draw rotate handle (top-center, small blue circle)
    var rHandleAngle = ps.angle * Math.PI / 180;
    var rDist = ps.h * ps.scale / 2 + 16;
    var rhx = cx - rDist * Math.sin(rHandleAngle);
    var rhy = cy - rDist * Math.cos(rHandleAngle);
    ctx.beginPath(); ctx.arc(rhx, rhy, 6, 0, Math.PI*2);
    ctx.fillStyle = '#3B82F6'; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    // Draw resize handle (bottom-right corner)
    var sAngle = ps.angle * Math.PI / 180;
    var sw2 = ps.w * ps.scale / 2, sh2 = ps.h * ps.scale / 2;
    var sx = cx + sw2 * Math.cos(sAngle) + sh2 * Math.sin(sAngle);
    var sy = cy + sw2 * Math.sin(sAngle) - sh2 * Math.cos(sAngle);
    // Actually for simplicity, put resize at bottom-right of bounding box
    sx = cx + sw2 * Math.cos(sAngle) - sh2 * Math.sin(sAngle);
    sy = cy + sw2 * Math.sin(sAngle) + sh2 * Math.cos(sAngle);
    ctx.beginPath(); ctx.arc(sx, sy, 6, 0, Math.PI*2);
    ctx.fillStyle = '#10B981'; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
  }

  function getProtractorHit(x, y) {
    if(!protractorState.active) return null;
    var ps = protractorState;
    var cx = ps.x + ps.w * ps.scale / 2;
    var cy = ps.y + ps.h * ps.scale / 2;
    // Check rotate handle
    var rDist = ps.h * ps.scale / 2 + 16;
    var rAngle = ps.angle * Math.PI / 180;
    var rhx = cx - rDist * Math.sin(rAngle);
    var rhy = cy - rDist * Math.cos(rAngle);
    if(Math.hypot(x - rhx, y - rhy) < 14) return 'rotate';
    // Check resize handle (bottom-right)
    var sw2 = ps.w * ps.scale / 2, sh2 = ps.h * ps.scale / 2;
    var sx = cx + sw2 * Math.cos(rAngle) - sh2 * Math.sin(rAngle);
    var sy = cy + sw2 * Math.sin(rAngle) + sh2 * Math.cos(rAngle);
    if(Math.hypot(x - sx, y - sy) < 14) return 'resize';
    // Check body (unrotated hit test)
    var cos = Math.cos(-rAngle), sin = Math.sin(-rAngle);
    var lx = cos * (x - cx) - sin * (y - cy);
    var ly = sin * (x - cx) + cos * (y - cy);
    if(Math.abs(lx) < sw2 && Math.abs(ly) < sh2) return 'drag';
    return null;
  }

  function isOnProtractor(x, y) {
    return getProtractorHit(x, y) !== null;
  }

  /* ---- Compass functions ---- */
  function toggleCompass() {
    compass.active = !compass.active;
    if (compass.active) {
      var rect = canvas.getBoundingClientRect();
      compass.pivotX = rect.width / 2;
      compass.pivotY = rect.height / 2;
      compass.pencilX = compass.pivotX + compass.radius;
      compass.pencilY = compass.pivotY;
    }
    redrawAll();
    var btn = document.getElementById('scribCompassBtn');
    if (btn) btn.classList.toggle('active', compass.active);
  }

  function drawCompass(ctx) {
    if (!compass.active) return;
    var px = compass.pivotX, py = compass.pivotY;
    var ex = compass.pencilX, ey = compass.pencilY;
    var r = Math.hypot(ex - px, ey - py);

    ctx.save();
    // Dashed radius line
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = '#2B4C7E';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(ex, ey);
    ctx.stroke();
    ctx.setLineDash([]);

    // Radius circle (dotted preview)
    ctx.setLineDash([3, 6]);
    ctx.strokeStyle = 'rgba(43,76,126,0.25)';
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Pivot point (red)
    ctx.fillStyle = '#EF4444';
    ctx.beginPath();
    ctx.arc(px, py, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Grip handle (midpoint — green, drag to resize)
    var gmx = (px + ex) / 2, gmy = (py + ey) / 2;
    ctx.fillStyle = '#10B981';
    ctx.beginPath();
    ctx.arc(gmx, gmy, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Pencil point (blue — drag to sweep arc)
    ctx.fillStyle = '#3B82F6';
    ctx.beginPath();
    ctx.arc(ex, ey, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Radius readout
    ctx.fillStyle = '#2B4C7E';
    ctx.font = '10px Poppins, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(Math.round(r) + 'px', gmx, gmy - 10);

    ctx.restore();
  }

  /* ---- Drawing ---- */
  function startDraw(x, y){
    // Check compass interactions first
    if (compass.active) {
      if (Math.hypot(x - compass.pivotX, y - compass.pivotY) < 15) {
        compass.dragging = 'pivot';
        compass.dragOff = { x: x - compass.pivotX, y: y - compass.pivotY };
        return;
      }
      // Grip handle: midpoint of pivot-pencil line — drag to change radius
      var gmx = (compass.pivotX + compass.pencilX) / 2;
      var gmy = (compass.pivotY + compass.pencilY) / 2;
      if (Math.hypot(x - gmx, y - gmy) < 15) {
        compass.dragging = 'grip';
        return;
      }
      if (Math.hypot(x - compass.pencilX, y - compass.pencilY) < 15) {
        compass.dragging = 'sweep';
        compass.sweepStart = Math.atan2(y - compass.pivotY, x - compass.pivotX);
        compass.sweepPoints = [[compass.pencilX, compass.pencilY]];
        return;
      }
    }
    // Check protractor interactions
    if(protractorState.active){
      var pHit = getProtractorHit(x, y);
      if(pHit) {
        protractorDrag = { mode: pHit, sx: x, sy: y, origX: protractorState.x, origY: protractorState.y, origAngle: protractorState.angle, origScale: protractorState.scale };
        return;
      }
    }
    if(tool === 'stroke-eraser'){
      isDrawing = true;
      eraseStrokeAt(x, y);
      return;
    }
    isDrawing = true;
    var w = tool === 'highlighter' ? 16 : tool === 'eraser' ? 14 : penWidth;
    var c = tool === 'eraser' ? '#FFFFFF' : penColor;
    var op = tool === 'highlighter' ? 0.38 : 1;
    currentStroke = { tool:tool, color:c, width:w, opacity:op, points:[[x,y]] };
    if(tool === 'pen') startSnapWatch();
  }

  function moveDraw(x, y){
    if (compass.dragging === 'pivot') {
      var dx = x - compass.dragOff.x - compass.pivotX;
      var dy = y - compass.dragOff.y - compass.pivotY;
      compass.pivotX += dx;
      compass.pivotY += dy;
      compass.pencilX += dx;
      compass.pencilY += dy;
      redrawAll();
      return;
    }
    if (compass.dragging === 'grip') {
      // Green grip: change radius AND rotate — pencil follows the drag point
      var newAngle = Math.atan2(y - compass.pivotY, x - compass.pivotX);
      var newR = Math.max(20, Math.hypot(x - compass.pivotX, y - compass.pivotY));
      compass.pencilX = compass.pivotX + newR * Math.cos(newAngle);
      compass.pencilY = compass.pivotY + newR * Math.sin(newAngle);
      compass.radius = newR;
      redrawAll();
      return;
    }
    if (compass.dragging === 'sweep') {
      var angle = Math.atan2(y - compass.pivotY, x - compass.pivotX);
      var r = Math.hypot(compass.pencilX - compass.pivotX, compass.pencilY - compass.pivotY);
      compass.pencilX = compass.pivotX + r * Math.cos(angle);
      compass.pencilY = compass.pivotY + r * Math.sin(angle);
      compass.sweepPoints.push([compass.pencilX, compass.pencilY]);
      redrawAll();
      if (compass.sweepPoints.length > 1) {
        ctx.save();
        ctx.strokeStyle = penColor;
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(compass.sweepPoints[0][0], compass.sweepPoints[0][1]);
        for (var i = 1; i < compass.sweepPoints.length; i++) {
          ctx.lineTo(compass.sweepPoints[i][0], compass.sweepPoints[i][1]);
        }
        ctx.stroke();
        ctx.restore();
      }
      return;
    }
    if(protractorDrag){
      var ps = protractorState;
      var pcx = ps.x + ps.w * ps.scale / 2;
      var pcy = ps.y + ps.h * ps.scale / 2;
      if(protractorDrag.mode === 'drag') {
        ps.x = protractorDrag.origX + (x - protractorDrag.sx);
        ps.y = protractorDrag.origY + (y - protractorDrag.sy);
      } else if(protractorDrag.mode === 'rotate') {
        var startAngle = Math.atan2(protractorDrag.sy - pcy, protractorDrag.sx - pcx);
        var curAngle2 = Math.atan2(y - pcy, x - pcx);
        ps.angle = protractorDrag.origAngle + (curAngle2 - startAngle) * 180 / Math.PI;
      } else if(protractorDrag.mode === 'resize') {
        var startDist = Math.hypot(protractorDrag.sx - pcx, protractorDrag.sy - pcy);
        var curDist = Math.hypot(x - pcx, y - pcy);
        ps.scale = Math.max(0.4, Math.min(3, protractorDrag.origScale * (curDist / startDist)));
      }
      redrawAll();
      return;
    }
    if(!isDrawing) return;
    if(tool === 'stroke-eraser'){
      eraseStrokeAt(x, y);
      return;
    }
    if(!currentStroke) return;
    currentStroke.points.push([x,y]);
    drawStrokeIncremental(currentStroke);
  }

  function endDraw(){
    if (compass.dragging === 'sweep' && compass.sweepPoints.length > 2) {
      strokes.push({
        tool: 'pen',
        color: penColor,
        width: 2,
        opacity: 1,
        points: compass.sweepPoints
      });
      saveStrokes();
    }
    if (compass.dragging) {
      compass.dragging = null;
      compass.sweepPoints = [];
      redrawAll();
      return;
    }
    if(protractorDrag){ protractorDrag = null; return; }
    stopSnapWatch();
    if(tool === 'stroke-eraser'){
      isDrawing = false;
      return;
    }
    if(currentStroke && currentStroke.points.length > 0){
      strokes.push(currentStroke);
      saveStrokes();
    }
    currentStroke = null;
    isDrawing = false;
    redrawAll();
  }

  function drawStrokeIncremental(s){
    var pts = s.points;
    if(pts.length < 2) return;
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = s.width;
    ctx.strokeStyle = s.color;
    ctx.globalAlpha = s.opacity;
    if(s.tool === 'highlighter') ctx.globalCompositeOperation = 'multiply';
    else if(s.tool === 'eraser') ctx.globalCompositeOperation = 'destination-out';
    else ctx.globalCompositeOperation = 'source-over';

    var i = pts.length - 1;
    ctx.beginPath();
    if(i === 1){
      ctx.moveTo(pts[0][0], pts[0][1]);
      ctx.lineTo(pts[1][0], pts[1][1]);
    } else {
      var prev = pts[i-1];
      var cur  = pts[i];
      var mx1 = (pts[i-2][0] + prev[0]) / 2;
      var my1 = (pts[i-2][1] + prev[1]) / 2;
      var mx2 = (prev[0] + cur[0]) / 2;
      var my2 = (prev[1] + cur[1]) / 2;
      ctx.moveTo(mx1, my1);
      ctx.quadraticCurveTo(prev[0], prev[1], mx2, my2);
    }
    ctx.stroke();
    ctx.restore();
  }

  function drawFullStroke(c2d, s){
    if(s.points.length < 2) return;
    c2d.save();
    c2d.lineCap = 'round';
    c2d.lineJoin = 'round';
    c2d.lineWidth = s.width;
    c2d.strokeStyle = s.color;
    c2d.globalAlpha = s.opacity;
    if(s.tool === 'highlighter') c2d.globalCompositeOperation = 'multiply';
    else if(s.tool === 'eraser') c2d.globalCompositeOperation = 'destination-out';
    else c2d.globalCompositeOperation = 'source-over';

    c2d.beginPath();
    c2d.moveTo(s.points[0][0], s.points[0][1]);
    for(var i = 1; i < s.points.length - 1; i++){
      var mx = (s.points[i][0] + s.points[i+1][0]) / 2;
      var my = (s.points[i][1] + s.points[i+1][1]) / 2;
      c2d.quadraticCurveTo(s.points[i][0], s.points[i][1], mx, my);
    }
    var last = s.points[s.points.length - 1];
    c2d.lineTo(last[0], last[1]);
    c2d.stroke();
    c2d.restore();
  }

  function redrawAll(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    strokes.forEach(function(s){ drawFullStroke(ctx, s); });
    drawProtractor();
    drawCompass(ctx);
  }

  function undoStroke(){
    if(strokes.length === 0) return;
    strokes.pop();
    saveStrokes();
    redrawAll();
  }

  function clearAll(){
    if(strokes.length === 0) return;
    if(!confirm('Clear all scribbles?')) return;
    strokes = [];
    saveStrokes();
    redrawAll();
  }

  /* ---- Canvas sizing ---- */
  function sizeCanvas(){
    var rect = canvasWrap.getBoundingClientRect();
    dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    redrawAll();
  }

  /* ---- Pointer events on canvas ---- */
  function canvasPos(e){
    var rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  canvas.addEventListener('pointerdown', function(e){
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    var p = canvasPos(e);
    startDraw(p.x, p.y);
  });
  canvas.addEventListener('pointermove', function(e){
    if(!isDrawing && !protractorDrag && !compass.dragging) return;
    e.preventDefault();
    var p = canvasPos(e);
    moveDraw(p.x, p.y);
  });
  canvas.addEventListener('pointerup', function(e){
    endDraw();
  });
  canvas.addEventListener('pointercancel', function(e){
    endDraw();
  });

  /* ---- FAB drag vs tap ---- */
  var fabDragState = null;
  fab.addEventListener('pointerdown', function(e){
    e.preventDefault();
    fab.setPointerCapture(e.pointerId);
    fabDragState = {
      sx: e.clientX, sy: e.clientY,
      ox: fab.getBoundingClientRect().left,
      oy: fab.getBoundingClientRect().top,
      moved: false
    };
  });
  fab.addEventListener('pointermove', function(e){
    if(!fabDragState) return;
    var dx = e.clientX - fabDragState.sx;
    var dy = e.clientY - fabDragState.sy;
    if(Math.abs(dx) > 5 || Math.abs(dy) > 5) fabDragState.moved = true;
    if(fabDragState.moved){
      fab.style.left = (fabDragState.ox + dx) + 'px';
      fab.style.top  = (fabDragState.oy + dy) + 'px';
      fab.style.right = 'auto';
      fab.style.bottom = 'auto';
    }
  });
  fab.addEventListener('pointerup', function(e){
    if(fabDragState && !fabDragState.moved){
      openPanel();
    }
    fabDragState = null;
  });

  /* ---- Panel open / close ---- */
  function openPanel(){
    loadStrokes();
    // Position panel centred-ish
    var pw = 380, ph = 480;
    var left = Math.max(10, (window.innerWidth - pw) / 2);
    var top  = Math.max(10, (window.innerHeight - ph) / 2);
    panel.style.width  = pw + 'px';
    panel.style.height = ph + 'px';
    panel.style.left   = left + 'px';
    panel.style.top    = top  + 'px';
    panel.classList.add('open');
    fab.classList.add('hidden');
    // Defer canvas sizing so panel layout is computed
    requestAnimationFrame(function(){ sizeCanvas(); });
    setTimeout(doWiggleLogo, 100);
  }

  function closePanel(){
    panel.classList.remove('open');
    fab.classList.remove('hidden');
  }

  closeBtn.addEventListener('click', closePanel);

  /* ---- Panel drag (title bar) ---- */
  var panelDrag = null;
  titlebar.addEventListener('pointerdown', function(e){
    if(e.target === closeBtn) return;
    e.preventDefault();
    titlebar.setPointerCapture(e.pointerId);
    panelDrag = {
      sx: e.clientX, sy: e.clientY,
      ox: panel.getBoundingClientRect().left,
      oy: panel.getBoundingClientRect().top
    };
  });
  titlebar.addEventListener('pointermove', function(e){
    if(!panelDrag) return;
    var nx = panelDrag.ox + (e.clientX - panelDrag.sx);
    var ny = panelDrag.oy + (e.clientY - panelDrag.sy);
    panel.style.left = nx + 'px';
    panel.style.top  = ny + 'px';
  });
  titlebar.addEventListener('pointerup', function(){ if(panelDrag) doWiggleLogo(); panelDrag = null; });
  titlebar.addEventListener('pointercancel', function(){ panelDrag = null; });

  /* ---- Panel resize (handle) ---- */
  var resizeDrag = null;
  resizeHandle.addEventListener('pointerdown', function(e){
    e.preventDefault();
    e.stopPropagation();
    resizeHandle.setPointerCapture(e.pointerId);
    var rect = panel.getBoundingClientRect();
    resizeDrag = { sx: e.clientX, sy: e.clientY, ow: rect.width, oh: rect.height };
  });
  resizeHandle.addEventListener('pointermove', function(e){
    if(!resizeDrag) return;
    var nw = Math.max(280, resizeDrag.ow + (e.clientX - resizeDrag.sx));
    var nh = Math.max(300, resizeDrag.oh + (e.clientY - resizeDrag.sy));
    panel.style.width  = nw + 'px';
    panel.style.height = nh + 'px';
    sizeCanvas();
  });
  resizeHandle.addEventListener('pointerup', function(){ resizeDrag = null; });
  resizeHandle.addEventListener('pointercancel', function(){ resizeDrag = null; });

  /* ---- Wiggle logo ---- */
  function doWiggleLogo() {
    var logo = document.querySelector('.scribbler-titlebar .logo-A');
    if (!logo) return;
    logo.classList.remove('wiggling');
    void logo.offsetWidth;
    logo.classList.add('wiggling');
    logo.addEventListener('animationend', function onEnd() {
      logo.classList.remove('wiggling');
      logo.removeEventListener('animationend', onEnd);
    });
  }
  window.wiggleLogo = doWiggleLogo;

  /* ---- ResizeObserver for canvas ---- */
  if(typeof ResizeObserver !== 'undefined'){
    var ro = new ResizeObserver(function(){ if(panel.classList.contains('open')) sizeCanvas(); });
    ro.observe(canvasWrap);
  }

})();
</script>
