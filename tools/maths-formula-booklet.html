  --navy:#2B4C7E;--gold:#F5A623;--sky:#6B8AAD;--light-bg:#E8F0FE;
  --red:#EF4444;--green:#10B981;--blue:#3B82F6;--purple:#8B5CF6;
  --brown:#92400E;--gray:#6B7280;--dark:#1a1a2e;--white:#ffffff;
  --radius:12px;--radius-lg:18px;--radius-sm:8px;
  --shadow:0 4px 20px rgba(43,76,126,0.12);
  --shadow-lg:0 8px 32px rgba(43,76,126,0.18);
  --transition:0.3s ease;
}
html{scroll-behavior:smooth}
body{
  font-family:'Poppins',sans-serif;background:var(--light-bg);
  color:#1a1a2e;min-height:100vh;overflow-x:hidden;
}
/* ========== TOP BAR ========== */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(43,76,126,0.95);backdrop-filter:blur(20px);
  padding:8px 16px;display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 20px rgba(0,0,0,0.15);
}
.top-bar .brand{
  font-weight:800;color:var(--gold);font-size:14px;white-space:nowrap;
  cursor:pointer;
}
.top-bar .brand span{color:var(--white);font-weight:600;font-size:12px;display:block;margin-top:-2px}
.mode-toggle{
  display:flex;background:rgba(255,255,255,0.15);border-radius:20px;
  overflow:hidden;flex-shrink:0;
}
.mode-btn{
  padding:6px 16px;border:none;background:none;color:rgba(255,255,255,0.7);
  font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;cursor:pointer;
  transition:var(--transition);white-space:nowrap;
}
.mode-btn.active{background:var(--gold);color:var(--navy);border-radius:20px}
.search-wrap{
  flex:1;max-width:400px;position:relative;
}
.search-wrap input{
  width:100%;padding:7px 14px 7px 36px;border:none;border-radius:20px;
  background:rgba(255,255,255,0.2);color:white;font-family:'Poppins',sans-serif;
  font-size:13px;outline:none;transition:var(--transition);
}
.search-wrap input::placeholder{color:rgba(255,255,255,0.5)}
.search-wrap input:focus{background:rgba(255,255,255,0.3)}
.search-wrap .search-icon{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:rgba(255,255,255,0.5);font-size:14px;pointer-events:none;
}
.search-clear{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;
  font-size:16px;display:none;padding:2px 6px;
}
.search-clear.visible{display:block}
.hamburger{
  display:none;background:none;border:none;color:white;font-size:22px;
  cursor:pointer;padding:4px;flex-shrink:0;
}
@media(max-width:768px){
  .hamburger{display:block}
  .search-wrap{max-width:none;order:10;width:100%}
  .top-bar{flex-wrap:wrap}
}

/* ========== SIDEBAR ========== */
.sidebar{
  position:fixed;top:56px;left:0;bottom:0;width:260px;z-index:900;
  background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);
  border-right:1px solid rgba(43,76,126,0.1);overflow-y:auto;
  padding:16px 0;transition:transform 0.3s ease;
}
.sidebar.hidden{transform:translateX(-100%)}
.sidebar-section{
  padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;
  transition:var(--transition);border-left:3px solid transparent;
  font-size:13px;font-weight:600;color:var(--navy);
}
.sidebar-section:hover{background:rgba(43,76,126,0.06)}
.sidebar-section.active{
  background:rgba(43,76,126,0.1);border-left-color:var(--gold);
}
.sidebar-section .sec-icon{font-size:18px;flex-shrink:0}
.sidebar-section .sec-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.sidebar-overlay{
  display:none;position:fixed;top:56px;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.3);z-index:899;
}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
}

/* ========== MAIN CONTENT ========== */
.main-content{
  margin-left:260px;margin-top:56px;padding:24px;
  min-height:calc(100vh - 56px);transition:margin-left 0.3s ease;
}
@media(max-width:768px){
  .main-content{margin-left:0;padding:16px}
}

/* ========== COVER ========== */
.cover-section{
  text-align:center;padding:48px 24px;margin-bottom:32px;
  background:linear-gradient(135deg,var(--navy) 0%,#1a365d 100%);
  border-radius:var(--radius-lg);color:white;position:relative;overflow:hidden;
}
.cover-section::before{
  content:'';position:absolute;top:-50%;right:-30%;width:400px;height:400px;
  background:radial-gradient(circle,rgba(245,166,35,0.15) 0%,transparent 70%);
  border-radius:50%;
}
.cover-logo{
  font-size:18px;font-weight:700;color:var(--gold);margin-bottom:4px;
}
.cover-logo-sub{font-size:12px;color:var(--sky);margin-bottom:24px}
.cover-title{
  font-size:clamp(28px,5vw,42px);font-weight:800;letter-spacing:-0.5px;
  line-height:1.1;margin-bottom:8px;
}
.cover-title span{color:var(--gold)}
.cover-subtitle{font-size:clamp(16px,3vw,20px);color:var(--sky);font-weight:600;margin-bottom:8px}
.cover-author{font-size:14px;color:rgba(255,255,255,0.7);font-weight:400}
.cover-stats{
  display:flex;justify-content:center;gap:24px;margin-top:24px;flex-wrap:wrap;
}
.cover-stat{
  background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);
  padding:12px 20px;border-radius:var(--radius);text-align:center;
}
.cover-stat-num{font-size:24px;font-weight:800;color:var(--gold)}
.cover-stat-label{font-size:11px;color:var(--sky)}

/* ========== SECTION BLOCKS ========== */
.section-block{
  margin-bottom:32px;scroll-margin-top:72px;
}
.section-header{
  position:sticky;top:56px;z-index:100;
  padding:12px 20px;border-radius:var(--radius) var(--radius) 0 0;
  display:flex;align-items:center;gap:12px;
  backdrop-filter:blur(20px);
}
.section-header .sec-icon{font-size:24px}
.section-header h2{font-size:18px;font-weight:700;color:white}
.section-header .sec-count{
  margin-left:auto;font-size:12px;font-weight:600;
  background:rgba(255,255,255,0.2);padding:3px 10px;border-radius:12px;color:white;
}
.subsection-title{
  font-size:14px;font-weight:700;color:var(--navy);
  padding:8px 16px 4px 20px;margin-top:20px;
  opacity:0.7;position:relative;padding-left:20px;
}
.subsection-title::before{
  content:'';position:absolute;left:0;top:50%;
  transform:translateY(-50%);width:4px;height:16px;
  border-radius:2px;background:currentColor;opacity:0.3;
}
.formula-card-book{
  background:white;padding:16px 20px;
  border-bottom:1px solid rgba(0,0,0,0.05);
  transition:var(--transition);display:flex;flex-wrap:wrap;align-items:center;gap:12px;
}
.formula-card-book:hover{background:rgba(43,76,126,0.03)}
.formula-card-book.hidden{display:none}
.formula-name{
  font-weight:600;font-size:13px;color:var(--navy);
  min-width:160px;flex-shrink:0;
}
.formula-latex{flex:1;min-width:200px;overflow-x:auto;text-align:center}
.formula-note{
  font-size:11px;color:var(--gray);width:100%;font-style:italic;
  margin-top:-4px;
}
.formula-diagram{
  width:100%;max-width:320px;margin:8px auto;
}
.section-body{
  background:white;border-radius:0 0 var(--radius) var(--radius);
  box-shadow:var(--shadow);overflow:hidden;
}

/* ========== SYMBOLS TABLE ========== */
.symbol-table{
  width:100%;border-collapse:collapse;
}
.symbol-table th{
  background:rgba(43,76,126,0.06);padding:10px 16px;text-align:left;
  font-size:13px;font-weight:700;color:var(--navy);
}
.symbol-table td{
  padding:10px 16px;border-bottom:1px solid rgba(0,0,0,0.05);
  font-size:13px;
}
.symbol-table td:first-child{font-weight:600;min-width:100px}
.symbol-table .katex{font-size:1.1em}

/* ========== CARD VIEW ========== */
.card-view{display:none}
.card-view.active{display:block}
.book-view.active{display:block}
.book-view{display:none}

/* Card view top bar */
.card-stats-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:rgba(255,255,255,0.9);backdrop-filter:blur(16px);
  border-radius:var(--radius);margin-bottom:16px;box-shadow:var(--shadow);
  flex-wrap:wrap;gap:8px;
}
.card-filter{
  padding:6px 12px;border:2px solid var(--navy);border-radius:20px;
  font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;
  background:white;color:var(--navy);cursor:pointer;
  max-width:200px;
}
.section-pills{
  display:flex;gap:6px;overflow-x:auto;padding:8px 16px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.section-pills::-webkit-scrollbar{display:none}
.sec-pill{
  flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid rgba(43,76,126,.15);
  background:#fff;color:var(--navy);font-family:'Poppins',sans-serif;font-size:11px;
  font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.sec-pill:hover{border-color:var(--sky)}
.sec-pill.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.stat-pill{
  display:flex;align-items:center;gap:6px;
  background:rgba(43,76,126,0.08);padding:6px 12px;border-radius:20px;
  font-size:12px;font-weight:600;color:var(--navy);
}
.stat-pill .stat-val{color:var(--gold);font-weight:800}

/* Deck layout */
.deck-layout{display:flex;align-items:center;gap:12px;width:100%;max-width:1100px;margin:0 auto;padding:0 12px}
.deck-restart-btn{background:none;border:none;color:var(--navy);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px;opacity:.6;transition:opacity .2s}
.deck-restart-btn:hover{opacity:1}
.deck-restart-btn .restart-icon{font-size:18px}
.deck-restart-btn .restart-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:700;font-family:'Poppins',sans-serif}

/* Pile CSS */
.pile{cursor:pointer;display:flex;flex-direction:column;align-items:center;min-width:50px;max-width:70px;flex-shrink:0;padding:4px;transition:transform .2s}
.pile:hover{transform:scale(1.05)}
.pile-cards{position:relative;width:48px;height:64px;margin-bottom:4px}
.pile-card{position:absolute;width:48px;height:64px;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.pile-card-up{background:linear-gradient(135deg,#E8F0FE 0%,#dbeafe 100%);border:1.5px solid rgba(43,76,126,.15)}
.pile-card-down{background:linear-gradient(135deg,#2B4C7E 0%,#1e3a5f 100%);border:1.5px solid rgba(43,76,126,.3)}
.pile-label{font-size:10px;font-weight:700;color:var(--navy);text-align:center;opacity:.7}
.pile-count{font-weight:800;margin-right:2px}

/* Active card area */
.active-card-area{flex:1;display:flex;justify-content:center;min-width:0;perspective:1200px}
.active-card{
  width:100%;aspect-ratio:3/2;max-width:900px;position:relative;
  transform-style:preserve-3d;transition:transform 0.5s ease;
  cursor:pointer;border-radius:14px;
}
.active-card.flipped{transform:rotateY(180deg)}
.card-face{
  position:absolute;top:0;left:0;right:0;bottom:0;
  border-radius:14px;padding:32px 24px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.12);
  overflow:hidden; /* clips the sheen to the card face bounds */
}
.card-face-front{
  /* Overlay baked into background — no z-index needed, preserves backface-visibility */
  background:
    radial-gradient(ellipse at center, rgba(0,0,0,0.62) 0%, rgba(0,0,0,0.38) 65%, rgba(0,0,0,0.28) 100%),
    var(--card-bg) center/cover no-repeat;
  color:white;
}
.card-face-front .fc-formula-name{color:var(--gold)}
.card-face-front .fc-tap-hint{color:rgba(255,255,255,0.6)}
.card-face-front .fc-counter{color:rgba(255,255,255,0.7)}
.card-face-front .fc-section-badge{color:white}
.card-face-back{
  transform:rotateY(180deg);
  background:#fff;
  overflow-y:auto;
}
.fc-section-badge{
  display:inline-block;padding:4px 12px;border-radius:12px;
  font-size:11px;font-weight:700;color:white;margin-bottom:16px;
}
.fc-formula-name{
  font-size:28px;font-weight:800;color:var(--navy);margin-bottom:20px;
  line-height:1.3;
}
.fc-subsection-hint{
  font-size:12px;font-weight:600;color:rgba(255,255,255,0.55);
  margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase;
}
.card-face-back .fc-subsection-hint{color:var(--sky);margin-bottom:4px}
.fc-tap-hint{font-size:15px;color:var(--gray);margin-top:20px;letter-spacing:.5px}
.fc-latex-area{
  margin:16px 0;width:100%;overflow-x:auto;
}
.fc-note{
  font-size:13px;color:var(--gray);font-style:italic;margin-top:12px;
  max-width:90%;
}
.fc-counter{
  font-size:12px;font-weight:600;color:var(--sky);margin-bottom:12px;
}
/* Sheen */
/* Sheen lives on the back face so it's clipped by the face's overflow:hidden */
.card-face-back::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.35) 50%,transparent 60%);
  z-index:10;pointer-events:none;border-radius:inherit;
  transform:translateX(-150%);
}
.active-card.flipped .card-face-back::before{
  animation:sheen 0.6s 0.15s ease-out forwards;
}
@keyframes sheen{to{transform:translateX(150%)}}

/* Watermark */
.card-face-back::after{
  content:'STUDENT HUB';position:absolute;bottom:12px;right:16px;
  font-size:10px;font-weight:800;color:rgba(43,76,126,0.08);
  letter-spacing:2px;pointer-events:none;
}

/* Slide animations */
.active-card.slide-in-right{animation:slideFromRight .32s cubic-bezier(.22,1,.36,1) both}
.active-card.slide-in-left{animation:slideFromLeft .32s cubic-bezier(.22,1,.36,1) both}
.active-card.slide-out-left{animation:slideToLeft .35s ease both}
.active-card.slide-out-right{animation:slideToRight .35s ease both}
@keyframes slideFromRight{0%{opacity:0;transform:translateX(36px)}100%{opacity:1;transform:translateX(0)}}
@keyframes slideToLeft{0%{opacity:1;transform:translateX(0) scale(1)}100%{opacity:0;transform:translateX(-80px) scale(.92)}}
@keyframes slideFromLeft{0%{opacity:0;transform:translateX(-36px)}100%{opacity:1;transform:translateX(0)}}
@keyframes slideToRight{0%{opacity:1;transform:translateX(0) scale(1)}100%{opacity:0;transform:translateX(80px) scale(.92)}}


/* Reset modal */
.modal-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);
  z-index:3000;align-items:center;justify-content:center;padding:24px;
}
.modal-overlay.open{display:flex}
.modal-box{
  background:white;border-radius:var(--radius-lg);padding:32px;
  max-width:360px;width:100%;text-align:center;
}
.modal-box h3{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:8px}
.modal-box p{font-size:13px;color:var(--gray);margin-bottom:20px}
.modal-btns{display:flex;gap:8px;justify-content:center}
.modal-btns button{
  padding:10px 20px;border:none;border-radius:20px;
  font-family:'Poppins',sans-serif;font-weight:700;font-size:13px;cursor:pointer;
}
.modal-cancel{background:#e5e7eb;color:#374151}
.modal-confirm{background:var(--red);color:white}

/* No results */
.no-results{
  text-align:center;padding:48px 24px;color:var(--gray);
}
.no-results .nr-icon{font-size:48px;margin-bottom:12px}
.no-results h3{font-size:18px;font-weight:700;color:var(--navy)}
.no-results p{font-size:13px;margin-top:8px}

/* Footer */
.app-footer{
  text-align:center;padding:32px 16px;color:var(--gray);font-size:12px;
}
.app-footer a{color:var(--navy);text-decoration:none;font-weight:600}

/* Responsive tweaks */
@media(max-width:640px){
  .deck-layout{
    display:grid!important;
    grid-template-columns:repeat(4,minmax(0,1fr));
    grid-template-rows:auto auto;
    grid-template-areas:"card card card card" "start prev next end";
    column-gap:6px;row-gap:14px;width:100%;max-width:none!important;padding:0 6px;
    align-items:center;justify-items:center;
  }
  .deck-layout>.active-card-area{grid-area:card!important;width:100%!important;max-width:340px!important;margin:0 auto!important;flex:none!important}
  .active-card{aspect-ratio:3/2;max-width:340px;margin:0 auto;width:100%}
  .deck-layout>#restartBtn{grid-area:start!important}
  .deck-layout>#donePile{grid-area:prev!important}
  .deck-layout>#remainPile{grid-area:next!important}
  .deck-layout>#endBtn{grid-area:end!important}
  .pile .pile-cards{width:32px!important;height:44px!important;margin:0 auto 2px!important}
  .pile .pile-cards .pile-card{width:32px!important;height:44px!important;border-radius:6px!important}
  .deck-layout>#restartBtn,.deck-layout>#donePile,.deck-layout>#remainPile,.deck-layout>#endBtn{
    width:100%!important;height:64px!important;max-width:none!important;padding:8px 4px!important;margin:0!important;
    display:flex!important;flex-direction:column!important;align-items:center!important;justify-content:center!important;gap:2px!important;
    border-radius:14px!important;border:none!important;background:rgba(43,76,126,.07)!important;
    color:var(--navy)!important;font-family:'Poppins',sans-serif!important;font-weight:700!important;
    cursor:pointer!important;transition:background .2s ease,transform .15s ease!important;
  }
  .deck-layout>#restartBtn:active,.deck-layout>#donePile:active,.deck-layout>#remainPile:active,.deck-layout>#endBtn:active{transform:scale(.96)!important;background:rgba(43,76,126,.16)!important}
  .deck-layout>#restartBtn .restart-icon,.deck-layout>#endBtn .restart-icon{font-size:20px;line-height:1}
  .deck-layout>#restartBtn .restart-label,.deck-layout>#endBtn .restart-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;opacity:.85}
  .pile-label{margin:2px 0 0!important;text-align:center;font-size:9px;letter-spacing:.5px;text-transform:uppercase;opacity:.85;line-height:1.2;font-weight:700}
  .pile-count{font-size:11px;font-weight:800;display:inline;min-width:0;margin-right:2px}
  .card-face-front,.card-face-back{padding:24px 16px;min-height:auto}
  .fc-formula-name{font-size:18px}
}
@media(max-width:600px){
  .formula-name{min-width:auto;width:100%}
  .formula-latex{min-width:auto;width:100%}
}

/* Zoom controls — removed for this utility app (breaks sticky headers) */

/* Print styles */
@media print{
  .top-bar,.sidebar,.sidebar-overlay,.zoom-controls,.card-view{display:none!important}
  .main-content{margin-left:0!important;margin-top:0!important}
  .section-header{position:static!important}
}
</style>

<body>
<div id="loadingScreen" style="position:fixed;inset:0;z-index:99999;background:#0a0f1a;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s ease,transform 0.6s ease"><div style="position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(43,76,126,0.12) 0%,transparent 70%);pointer-events:none"></div><div style="color:#e9ecf3;--sh-size:180px;position:relative;z-index:1"><div style="display:inline-flex;flex-direction:column;align-items:center;gap:10px;width:180px" role="status"><div style="font-family:Times New Roman,Georgia,serif;font-weight:700;font-size:50px;line-height:0.9;text-align:center"><span style="display:block;font-family:Helvetica Neue,sans-serif;font-weight:700;font-size:17px;letter-spacing:0.16em;margin-bottom:4px">STUDENT</span>HUB</div><div style="position:relative;width:100%;height:2px;background:rgba(255,255,255,0.18);overflow:hidden;border-radius:999px"><div style="position:absolute;inset:0;background:currentColor;animation:sh-trace 3s cubic-bezier(.34,1.2,.45,1) infinite;border-radius:inherit"></div></div><div style="font-family:Helvetica Neue,sans-serif;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;font-weight:600;opacity:0.6">Loading</div></div></div><div id="loadAppName" style="margin-top:28px;font-family:Helvetica Neue,sans-serif;font-size:11px;letter-spacing:0.35em;text-transform:uppercase;color:rgba(233,236,243,0);transition:color 1s ease 0.8s;font-weight:500">Maths Formula Booklet</div><div style="position:absolute;bottom:48px;width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(245,166,35,0.3),transparent)"></div><div style="position:absolute;bottom:24px;font-family:Helvetica Neue,sans-serif;font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.12)">Kerwin Springer</div></div>

  <button class="hamburger" id="hamburgerBtn" aria-label="Menu">&#9776;</button>

<script>
/* ============================================================
   DATA
   ============================================================ */
const SECTIONS = [
  { id: 'number-theory', name: 'Number Theory & Computation', icon: '#\uFE0F\u20E3', color: '#3B82F6' },
  { id: 'algebra', name: 'Algebra', icon: '\uD83D\uDD24', color: '#6366F1' },
  { id: 'consumer-arith', name: 'Consumer Arithmetic', icon: '\uD83D\uDCB0', color: '#EF4444' },
  { id: 'measurement', name: 'Measurement', icon: '\uD83D\uDCD0', color: '#10B981' },
  { id: 'geometry', name: 'Geometry', icon: '\uD83D\uDCCF', color: '#F59E0B' },
  { id: 'coord-geom', name: 'Coordinate Geometry', icon: '\uD83D\uDCCD', color: '#2B4C7E' },
  { id: 'trigonometry', name: 'Trigonometry', icon: '\uD83D\uDCD0', color: '#A67C00' },
  { id: 'statistics', name: 'Statistics & Probability', icon: '\uD83D\uDCCA', color: '#EC4899' },
  { id: 'relations-functions', name: 'Relations, Functions & Graphs', icon: '\uD83D\uDCC8', color: '#8B5CF6' },
  { id: 'vectors-matrices', name: 'Vectors & Matrices', icon: '\uD83D\uDD22', color: '#92400E' },
  { id: 'symbols-sheet', name: 'Symbols & Formula Sheet', icon: '\uD83D\uDCCB', color: '#6B7280' },
];

const FORMULAS = [
  // ===== 1. NUMBER THEORY & COMPUTATION =====
  { id: 'number-sets', section: 'number-theory', subsection: 'Number Theory', name: 'Number Set Hierarchy', latex: '\\mathbb{N} \\subset \\mathbb{W} \\subset \\mathbb{Z} \\subset \\mathbb{Q} \\subset \\mathbb{R}', note: '' },
  { id: 'natural-numbers', section: 'number-theory', subsection: 'Number Theory', name: 'Natural Numbers', latex: '\\mathbb{N} = \\{1, 2, 3, \\ldots\\}', note: 'Counting numbers' },
  { id: 'whole-numbers', section: 'number-theory', subsection: 'Number Theory', name: 'Whole Numbers', latex: '\\mathbb{W} = \\{0, 1, 2, 3, \\ldots\\}', note: 'Natural numbers + zero' },
  { id: 'integers', section: 'number-theory', subsection: 'Number Theory', name: 'Integers', latex: '\\mathbb{Z} = \\{\\ldots, -2, -1, 0, 1, 2, \\ldots\\}', note: 'Positive and negative whole numbers' },
  { id: 'rationals', section: 'number-theory', subsection: 'Number Theory', name: 'Rational Numbers', latex: '\\mathbb{Q} = \\left\\{\\dfrac{p}{q} \\;\\middle|\\; p, q \\in \\mathbb{Z},\\; q \\neq 0\\right\\}', note: 'Can be expressed as a fraction' },
  { id: 'bodmas', section: 'number-theory', subsection: 'Operations', name: 'BODMAS', latex: '\\textbf{B}rackets,\\; \\textbf{O}rder,\\; \\textbf{D}ivision,\\; \\textbf{M}ultiplication,\\; \\textbf{A}ddition,\\; \\textbf{S}ubtraction', note: 'Order of operations (Order = powers \\& roots)' },
  { id: 'index-multiply', section: 'number-theory', subsection: 'Indices / Exponents', name: 'Multiplying', latex: 'a^m \\times a^n = a^{m+n}', note: '' },
  { id: 'index-divide', section: 'number-theory', subsection: 'Indices / Exponents', name: 'Dividing', latex: '\\dfrac{a^m}{a^n} = a^{m-n}', note: '' },
  { id: 'index-power', section: 'number-theory', subsection: 'Indices / Exponents', name: 'Power of a power', latex: '(a^m)^n = a^{mn}', note: '' },
  { id: 'index-product', section: 'number-theory', subsection: 'Indices / Exponents', name: 'Power of a product', latex: '(ab)^n = a^n b^n', note: '' },
  { id: 'index-fraction', section: 'number-theory', subsection: 'Indices / Exponents', name: 'Power of a fraction', latex: '\\left(\\dfrac{a}{b}\\right)^n = \\dfrac{a^n}{b^n}', note: '' },
  { id: 'index-negative', section: 'number-theory', subsection: 'Indices / Exponents', name: 'Negative index', latex: 'a^{-n} = \\dfrac{1}{a^n}', note: '' },
  { id: 'index-fractional', section: 'number-theory', subsection: 'Indices / Exponents', name: 'Fractional index', latex: 'a^{\\frac{1}{n}} = \\sqrt[n]{a}', note: '' },
  { id: 'index-zero', section: 'number-theory', subsection: 'Indices / Exponents', name: 'Zero index', latex: 'a^0 = 1', note: 'Any non-zero number to the power 0 is 1' },
  { id: 'index-one', section: 'number-theory', subsection: 'Indices / Exponents', name: 'Index of one', latex: 'a^1 = a', note: '' },

  // ===== ALGEBRA =====
  // Distributive Law
  { id: 'distributive-law', section: 'algebra', subsection: 'Expanding', name: 'Distributive Law', latex: 'a(b + c) = ab + ac', note: '' },
  { id: 'double-bracket', section: 'algebra', subsection: 'Expanding', name: 'Double Brackets', latex: '(a+b)(c+d) = ac + ad + bc + bd', note: 'FOIL method' },
  // Factorisation
  { id: 'factor-hcf', section: 'algebra', subsection: 'Factorisation', name: 'Common Factor (HCF)', latex: 'ax + bx = x(a + b)', note: 'Take out the common factor' },
  { id: 'factor-diff-squares', section: 'algebra', subsection: 'Factorisation', name: 'Difference of Two Squares', latex: 'a^2 - b^2 = (a-b)(a+b)', note: '' },
  { id: 'factor-perfect-sq-plus', section: 'algebra', subsection: 'Factorisation', name: 'Perfect Square (+)', latex: 'a^2 + 2ab + b^2 = (a+b)^2', note: '' },
  { id: 'factor-perfect-sq-minus', section: 'algebra', subsection: 'Factorisation', name: 'Perfect Square (−)', latex: 'a^2 - 2ab + b^2 = (a-b)^2', note: '' },
  { id: 'factor-grouping', section: 'algebra', subsection: 'Factorisation', name: 'Grouping', latex: 'ax + ay + bx + by = a(x+y) + b(x+y) = (a+b)(x+y)', note: '' },
  // Simultaneous Equations
  { id: 'simul-elimination', section: 'algebra', subsection: 'Simultaneous Equations', name: 'Elimination Method', latex: '\\text{Make coefficients equal, then add or subtract}', note: 'Same sign → subtract. Different sign → add.' },
  // Quadratics
  { id: 'quadratic-general', section: 'algebra', subsection: 'Quadratics', name: 'General Quadratic', latex: 'ax^2 + bx + c = 0', note: '' },
  { id: 'quadratic-formula-alg', section: 'algebra', subsection: 'Quadratics', name: 'Quadratic Formula', latex: 'x = \\dfrac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}', note: '' },
  { id: 'completing-square', section: 'algebra', subsection: 'Quadratics', name: 'Completing the Square', latex: 'y = a(x + h)^2 + k', note: 'Vertex at (−h, k). Axis of symmetry: x = −h' },
  { id: 'completing-h', section: 'algebra', subsection: 'Quadratics', name: 'Finding h', latex: 'h = \\dfrac{b}{2a}', note: 'From ax² + bx + c' },
  { id: 'completing-k', section: 'algebra', subsection: 'Quadratics', name: 'Finding k', latex: 'k = c - \\dfrac{b^2}{4a}', note: 'k is the min/max value of the function' },
  { id: 'completing-k-alt', section: 'algebra', subsection: 'Quadratics', name: 'Finding k (alternative)', latex: 'k = \\dfrac{4ac - b^2}{4a}', note: 'Equivalent formula for k' },
  { id: 'discriminant-alg', section: 'algebra', subsection: 'Quadratics', name: 'Discriminant', latex: 'D = b^2 - 4ac', note: 'D > 0: two roots. D = 0: one root. D < 0: no real roots.' },
  { id: 'axis-symmetry', section: 'algebra', subsection: 'Quadratics', name: 'Axis of Symmetry', latex: 'x = -\\dfrac{b}{2a}', note: 'Or x = −h from completed square form' },
  // Variation
  { id: 'direct-variation', section: 'algebra', subsection: 'Variation', name: 'Direct Variation', latex: 'y \\propto x \\implies y = kx', note: 'k is the constant of variation' },
  { id: 'inverse-variation', section: 'algebra', subsection: 'Variation', name: 'Inverse Variation', latex: 'y \\propto \\dfrac{1}{x} \\implies y = \\dfrac{k}{x}', note: 'As x increases, y decreases' },
  // Properties
  { id: 'commutative-add', section: 'algebra', subsection: 'Properties of Operations', name: 'Commutative (Addition)', latex: 'a + b = b + a', note: 'Order does not matter' },
  { id: 'commutative-mult', section: 'algebra', subsection: 'Properties of Operations', name: 'Commutative (Multiplication)', latex: 'a \\times b = b \\times a', note: 'Order does not matter' },
  { id: 'associative-add', section: 'algebra', subsection: 'Properties of Operations', name: 'Associative (Addition)', latex: '(a + b) + c = a + (b + c)', note: 'Grouping does not matter' },
  { id: 'associative-mult', section: 'algebra', subsection: 'Properties of Operations', name: 'Associative (Multiplication)', latex: '(a \\times b) \\times c = a \\times (b \\times c)', note: 'Grouping does not matter' },
  { id: 'identity-add', section: 'algebra', subsection: 'Properties of Operations', name: 'Additive Identity', latex: 'a + 0 = a', note: '0 is the identity for addition' },
  { id: 'identity-mult', section: 'algebra', subsection: 'Properties of Operations', name: 'Multiplicative Identity', latex: 'a \\times 1 = a', note: '1 is the identity for multiplication' },
  { id: 'inverse-add', section: 'algebra', subsection: 'Properties of Operations', name: 'Additive Inverse', latex: 'a + (-a) = 0', note: '' },
  { id: 'inverse-mult-prop', section: 'algebra', subsection: 'Properties of Operations', name: 'Multiplicative Inverse', latex: 'a \\times \\dfrac{1}{a} = 1,\\quad a \\neq 0', note: '' },
  // Scientific Notation
  { id: 'scientific-notation', section: 'algebra', subsection: 'Scientific Notation', name: 'Standard Form', latex: 'a \\times 10^n,\\quad 1 \\leq a < 10', note: 'Large: n positive. Small: n negative.' },
  { id: 'sci-notation-large', section: 'algebra', subsection: 'Scientific Notation', name: 'Large Number Example', latex: '759000 = 7.59 \\times 10^5', note: 'Move decimal left → positive power' },
  { id: 'sci-notation-small', section: 'algebra', subsection: 'Scientific Notation', name: 'Small Number Example', latex: '0.00759 = 7.59 \\times 10^{-3}', note: 'Move decimal right → negative power' },

  // ===== 2. CONSUMER ARITHMETIC =====
  { id: 'discount', section: 'consumer-arith', subsection: 'Profit, Loss & Discount', name: 'Discount', latex: '\\text{Discount} = \\text{Marked Price} - \\text{Selling Price}', note: '' },
  { id: 'profit', section: 'consumer-arith', subsection: 'Profit, Loss & Discount', name: 'Profit', latex: '\\text{Profit} = \\text{Selling Price} - \\text{Cost Price}', note: 'When Selling Price > Cost Price' },
  { id: 'loss', section: 'consumer-arith', subsection: 'Profit, Loss & Discount', name: 'Loss', latex: '\\text{Loss} = \\text{Cost Price} - \\text{Selling Price}', note: 'When Selling Price < Cost Price' },
  { id: 'pct-profit', section: 'consumer-arith', subsection: 'Profit, Loss & Discount', name: 'Percentage Profit', latex: '\\text{\\% Profit} = \\dfrac{\\text{Profit}}{\\text{Cost Price}} \\times 100', note: '' },
  { id: 'pct-loss', section: 'consumer-arith', subsection: 'Profit, Loss & Discount', name: 'Percentage Loss', latex: '\\text{\\% Loss} = \\dfrac{\\text{Loss}}{\\text{Cost Price}} \\times 100', note: '' },
  { id: 'simple-interest', section: 'consumer-arith', subsection: 'Simple Interest', name: 'Simple Interest', latex: 'SI = \\dfrac{P \\times R \\times T}{100}', note: 'P = Principal, R = Rate (%), T = Time (years)' },
  { id: 'si-amount', section: 'consumer-arith', subsection: 'Simple Interest', name: 'Amount (SI)', latex: 'A = P + SI', note: '' },
  { id: 'si-principal', section: 'consumer-arith', subsection: 'Simple Interest', name: 'Find Principal', latex: 'P = \\dfrac{SI \\times 100}{R \\times T}', note: '' },
  { id: 'si-rate', section: 'consumer-arith', subsection: 'Simple Interest', name: 'Find Rate', latex: 'R = \\dfrac{SI \\times 100}{P \\times T}', note: '' },
  { id: 'si-time', section: 'consumer-arith', subsection: 'Simple Interest', name: 'Find Time', latex: 'T = \\dfrac{SI \\times 100}{P \\times R}', note: '' },
  { id: 'compound-interest', section: 'consumer-arith', subsection: 'Compound Interest', name: 'Compound Interest', latex: 'A = P\\left(1 + \\dfrac{R}{100}\\right)^n', note: 'P = Principal, R = Rate (%), n = years' },
  { id: 'depreciation', section: 'consumer-arith', subsection: 'Compound Interest', name: 'Depreciation', latex: 'A = P\\left(1 - \\dfrac{R}{100}\\right)^n', note: 'Use negative sign for depreciation' },
  { id: 'sales-tax', section: 'consumer-arith', subsection: 'Taxes & Charges', name: 'Sales Tax', latex: '\\text{Tax} = \\dfrac{\\text{Rate}}{100} \\times \\text{Price}', note: 'Total = Price + Tax' },
  { id: 'hire-purchase', section: 'consumer-arith', subsection: 'Taxes & Charges', name: 'Hire Purchase', latex: '\\text{HP Price} = \\text{Deposit} + (\\text{Monthly} \\times \\text{Months})', note: 'Extra paid = HP Price − Cash Price' },
  { id: 'currency-conversion', section: 'consumer-arith', subsection: 'Taxes & Charges', name: 'Currency Conversion', latex: '\\text{Foreign} = \\text{Local} \\times \\text{Exchange Rate}', note: 'Or Local = Foreign ÷ Rate' },
  { id: 'markup', section: 'consumer-arith', subsection: 'Taxes & Charges', name: 'Markup', latex: '\\text{Markup} = \\text{Selling Price} - \\text{Cost Price}', note: 'Same as profit. Often expressed as % of cost price.' },

  // ===== 3. MEASUREMENT =====
  { id: 'perimeter', section: 'measurement', subsection: 'Plane Shapes', name: 'Perimeter', latex: '\\text{Perimeter} = \\text{Sum of all sides}', note: '' },
  { id: 'area-triangle-bh', section: 'measurement', subsection: 'Area of Triangle', name: 'Area (base x height)', latex: 'A = \\dfrac{1}{2}bh', note: 'b = base, h = perpendicular height' },
  { id: 'area-triangle-sin', section: 'measurement', subsection: 'Area of Triangle', name: 'Area (two sides + angle)', latex: 'A = \\dfrac{1}{2}ab\\sin C', note: 'When you know two sides and the included angle' },
  { id: 'area-triangle-heron', section: 'measurement', subsection: 'Area of Triangle', name: "Heron's Formula", latex: 'A = \\sqrt{s(s-a)(s-b)(s-c)}', note: 'where s = (a+b+c)/2 (semi-perimeter)' },
  { id: 'area-parallelogram', section: 'measurement', subsection: 'Common Plane Shapes', name: 'Area of Parallelogram', latex: 'A = bh', note: '' },
  { id: 'area-square', section: 'measurement', subsection: 'Common Plane Shapes', name: 'Area of Square', latex: 'A = s^2', note: '' },
  { id: 'area-rectangle', section: 'measurement', subsection: 'Common Plane Shapes', name: 'Area of Rectangle', latex: 'A = l \\times w', note: '' },
  { id: 'area-trapezium', section: 'measurement', subsection: 'Common Plane Shapes', name: 'Area of Trapezium', latex: 'A = \\dfrac{1}{2}(a+b)h', note: 'Half the sum of parallel sides times height' },
  { id: 'area-circle', section: 'measurement', subsection: 'Common Plane Shapes', name: 'Area of Circle', latex: 'A = \\pi r^2', note: '' },
  { id: 'circumference', section: 'measurement', subsection: 'Common Plane Shapes', name: 'Circumference', latex: 'C = 2\\pi r = \\pi d', note: '' },
  { id: 'area-sector', section: 'measurement', subsection: 'Common Plane Shapes', name: 'Area of Sector', latex: 'A = \\dfrac{\\theta}{360} \\times \\pi r^2', note: 'Fraction of the circle area' },
  { id: 'arc-length', section: 'measurement', subsection: 'Common Plane Shapes', name: 'Arc Length', latex: 'l = \\dfrac{\\theta}{360} \\times 2\\pi r', note: 'Fraction of the circumference' },
  { id: 'vol-prism', section: 'measurement', subsection: 'Solids & Prisms', name: 'Volume of Prism', latex: 'V = A_\\text{cross} \\times l', note: 'Cross-sectional area times length' },
  { id: 'vol-cuboid', section: 'measurement', subsection: 'Solids & Prisms', name: 'Volume of Cuboid', latex: 'V = lwh', note: 'length times width times height' },
  { id: 'vol-cylinder', section: 'measurement', subsection: 'Solids & Prisms', name: 'Volume of Cylinder', latex: 'V = \\pi r^2 h', note: '' },
  { id: 'vol-sphere', section: 'measurement', subsection: 'Solids & Prisms', name: 'Volume of Sphere', latex: 'V = \\dfrac{4}{3}\\pi r^3', note: '' },
  { id: 'vol-cone', section: 'measurement', subsection: 'Solids & Prisms', name: 'Volume of Cone', latex: 'V = \\dfrac{1}{3}\\pi r^2 h', note: '' },
  { id: 'sa-cuboid', section: 'measurement', subsection: 'Surface Area', name: 'SA of Cuboid', latex: 'SA = 2lh + 2hw + 2lw', note: '' },
  { id: 'sa-cylinder', section: 'measurement', subsection: 'Surface Area', name: 'SA of Cylinder', latex: 'SA = 2\\pi rh + 2\\pi r^2 = 2\\pi r(h+r)', note: '' },
  { id: 'sa-sphere', section: 'measurement', subsection: 'Surface Area', name: 'SA of Sphere', latex: 'SA = 4\\pi r^2', note: '' },
  { id: 'sa-cone', section: 'measurement', subsection: 'Surface Area', name: 'SA of Cone', latex: 'SA = \\pi r^2 + \\pi rs', note: 's = slant height' },
  { id: 'speed-formula', section: 'measurement', subsection: 'Speed, Distance & Time', name: 'Speed', latex: 'S = \\dfrac{D}{T}', note: 'Speed = Distance ÷ Time' },
  { id: 'distance-formula-sdt', section: 'measurement', subsection: 'Speed, Distance & Time', name: 'Distance', latex: 'D = S \\times T', note: '' },
  { id: 'time-formula', section: 'measurement', subsection: 'Speed, Distance & Time', name: 'Time', latex: 'T = \\dfrac{D}{S}', note: '' },
  { id: 'average-speed', section: 'measurement', subsection: 'Speed, Distance & Time', name: 'Average Speed', latex: '\\text{Avg Speed} = \\dfrac{\\text{Total Distance}}{\\text{Total Time}}', note: 'NOT the average of two speeds' },
  { id: 'dt-gradient', section: 'measurement', subsection: 'Speed, Distance & Time', name: 'D-T Graph: Gradient = Speed', latex: '\\text{Gradient of D-T graph} = \\text{Speed}', note: 'Steeper line = faster speed. Flat line = stationary. Downward = returning.' },
  { id: 'st-gradient', section: 'measurement', subsection: 'Speed, Distance & Time', name: 'S-T Graph: Gradient = Acceleration', latex: '\\text{Gradient of S-T graph} = \\text{Acceleration}', note: 'Steeper = accelerating faster. Flat = constant speed. Downward = decelerating.' },
  { id: 'st-area', section: 'measurement', subsection: 'Speed, Distance & Time', name: 'S-T Graph: Area = Distance', latex: '\\text{Area under S-T graph} = \\text{Distance}', note: 'Use area of trapezium/triangle/rectangle to calculate' },
  { id: 'dt-graph-shapes', section: 'measurement', subsection: 'Speed, Distance & Time', name: 'D-T Graph Shapes', latex: '', note: 'Line going UP = moving away. FLAT line = stationary. Line going DOWN = returning.', hasDiagram: false },
  { id: 'st-graph-shapes', section: 'measurement', subsection: 'Speed, Distance & Time', name: 'S-T Graph Shapes', latex: '', note: 'Line going UP = accelerating. FLAT line = constant speed. Line going DOWN = decelerating.', hasDiagram: false },

  // ===== GEOMETRY =====
  // Basic Angle Facts
  { id: 'angles-straight-line', section: 'geometry', subsection: 'Basic Angle Facts', name: 'Angles on a Straight Line', latex: '\\text{Sum} = 180°', note: 'Supplementary angles' },
  { id: 'angles-at-point', section: 'geometry', subsection: 'Basic Angle Facts', name: 'Angles at a Point', latex: '\\text{Sum} = 360°', note: 'Full rotation' },
  { id: 'vertically-opposite', section: 'geometry', subsection: 'Basic Angle Facts', name: 'Vertically Opposite Angles', latex: '\\text{Are equal}', note: 'Formed by two intersecting lines' },
  { id: 'complementary', section: 'geometry', subsection: 'Basic Angle Facts', name: 'Complementary Angles', latex: 'a + b = 90°', note: 'Two angles that add to 90°' },
  { id: 'supplementary', section: 'geometry', subsection: 'Basic Angle Facts', name: 'Supplementary Angles', latex: 'a + b = 180°', note: 'Two angles that add to 180°' },
  // Triangle Facts
  { id: 'triangle-angle-sum', section: 'geometry', subsection: 'Triangles', name: 'Angle Sum of Triangle', latex: 'a + b + c = 180°', note: 'Interior angles of any triangle' },
  { id: 'exterior-angle-triangle', section: 'geometry', subsection: 'Triangles', name: 'Exterior Angle Theorem', latex: 'd = a + b', note: 'Exterior angle = sum of two interior opposite angles' },
  { id: 'isosceles-triangle', section: 'geometry', subsection: 'Triangles', name: 'Isosceles Triangle', latex: '\\text{Two equal sides} \\implies \\text{two equal base angles}', note: '' },
  { id: 'equilateral-triangle', section: 'geometry', subsection: 'Triangles', name: 'Equilateral Triangle', latex: '\\text{All sides equal, all angles} = 60°', note: '' },
  // Parallel Lines
  { id: 'alternate-angles', section: 'geometry', subsection: 'Parallel Lines', name: 'Alternate Angles', latex: '\\text{Are equal (Z-angles)}', note: 'Z-shape between parallel lines. The angles inside the Z are equal.' },
  { id: 'corresponding-angles', section: 'geometry', subsection: 'Parallel Lines', name: 'Corresponding Angles', latex: '\\text{Are equal (F-angles)}', note: 'F-shape between parallel lines. The angles at matching positions are equal.' },
  { id: 'co-interior-angles', section: 'geometry', subsection: 'Parallel Lines', name: 'Co-interior Angles', latex: 'a + b = 180°\\text{ (C-angles)}', note: 'C-shape (or U-shape) between parallel lines. The angles add to 180°.' },
  // Transformations
  { id: 'translation-desc', section: 'geometry', subsection: 'Transformations', name: 'Translation', latex: '\\text{Describe using column vector } \\begin{pmatrix} x \\\\ y \\end{pmatrix}', note: 'Shape, size, orientation preserved. No fixed points.' },
  { id: 'reflection-desc', section: 'geometry', subsection: 'Transformations', name: 'Reflection', latex: '\\text{Describe: mirror line (equation)}', note: 'Shape, size preserved. Orientation reversed. Mirror line is perpendicular bisector of object-image pairs.' },
  { id: 'rotation-desc', section: 'geometry', subsection: 'Transformations', name: 'Rotation', latex: '\\text{Describe: centre, angle, direction}', note: 'Shape, size preserved. Orientation preserved.' },
  { id: 'find-cor', section: 'geometry', subsection: 'Transformations', name: 'Finding Centre of Rotation', latex: '\\text{Perp. bisectors of } AA^{\\prime} \\text{ and } BB^{\\prime} \\text{ meet at centre}', note: 'Join object to image points, find perpendicular bisectors — they intersect at the centre' },
  { id: 'enlargement-desc', section: 'geometry', subsection: 'Transformations', name: 'Enlargement', latex: '\\text{Describe: centre, scale factor } k', note: 'k > 1: bigger. 0 < k < 1: smaller. k < 0: inverted.' },
  { id: 'scale-factor', section: 'geometry', subsection: 'Transformations', name: 'Scale Factor', latex: 'k = \\dfrac{\\text{image length}}{\\text{object length}}', note: '' },
  { id: 'find-coe', section: 'geometry', subsection: 'Transformations', name: 'Finding Centre of Enlargement', latex: '\\text{Lines through } A \\to A^{\\prime} \\text{ and } B \\to B^{\\prime} \\text{ meet at centre}', note: 'Draw lines through corresponding object-image points — they intersect at the centre' },
  { id: 'area-scale-factor', section: 'geometry', subsection: 'Transformations', name: 'Area Scale Factor', latex: '\\text{Area factor} = k^2', note: 'Area of image = k² × area of object' },
  // Similar Triangles
  { id: 'similar-triangles', section: 'geometry', subsection: 'Similar Figures', name: 'Similar Triangles', latex: '\\dfrac{a_1}{a_2} = \\dfrac{b_1}{b_2} = \\dfrac{c_1}{c_2}', note: 'Same shape, different size. All corresponding angles are equal and sides are in the same ratio.' },
  { id: 'similar-def', section: 'geometry', subsection: 'Similar Figures', name: 'Similar Figures Definition', latex: '\\text{Same shape, different size}', note: 'Corresponding angles equal. Corresponding sides in proportion (same ratio).' },
  // Congruence
  { id: 'congruent-def', section: 'geometry', subsection: 'Congruence', name: 'Congruent Figures Definition', latex: '\\text{Same shape AND same size}', note: 'All corresponding sides and angles are equal. One fits exactly on top of the other.' },
  { id: 'congruence-tests', section: 'geometry', subsection: 'Congruence', name: 'Congruence Tests', latex: '\\text{SSS, SAS, ASA, RHS}', note: 'SSS: 3 sides equal. SAS: 2 sides + included angle. ASA: 2 angles + included side. RHS: right angle + hypotenuse + side.' },

  // ===== 4. COORDINATE GEOMETRY =====
  { id: 'line-slope-intercept', section: 'coord-geom', subsection: 'Equation of Line', name: 'Slope-Intercept Form', latex: 'y = mx + c', note: 'm = gradient, c = y-intercept' },
  { id: 'line-point-slope', section: 'coord-geom', subsection: 'Equation of Line', name: 'Point-Slope Form', latex: 'y - y_1 = m(x - x_1)', note: 'When you know gradient and a point' },
  { id: 'distance', section: 'coord-geom', subsection: 'Distance, Midpoint & Gradient', name: 'Distance Formula', latex: 'd = \\sqrt{(x_2 - x_1)^2 + (y_2 - y_1)^2}', note: '' },
  { id: 'midpoint', section: 'coord-geom', subsection: 'Distance, Midpoint & Gradient', name: 'Midpoint Formula', latex: 'M = \\left(\\dfrac{x_1 + x_2}{2},\\; \\dfrac{y_1 + y_2}{2}\\right)', note: '' },
  { id: 'gradient', section: 'coord-geom', subsection: 'Distance, Midpoint & Gradient', name: 'Gradient Formula', latex: 'm = \\dfrac{y_2 - y_1}{x_2 - x_1}', note: '' },
  { id: 'parallel-gradients', section: 'coord-geom', subsection: 'Gradient Rules', name: 'Parallel Lines', latex: 'm_1 = m_2', note: 'Parallel lines have equal gradients' },
  { id: 'perpendicular-gradients', section: 'coord-geom', subsection: 'Gradient Rules', name: 'Perpendicular Lines', latex: 'm_2 = -\\dfrac{1}{m_1}', note: 'Product of gradients = -1' },
  { id: 'interior-angles-sum', section: 'coord-geom', subsection: 'Regular Polygons', name: 'Sum of Interior Angles', latex: 'S = 180(n-2)', note: 'n = number of sides' },
  { id: 'one-interior', section: 'coord-geom', subsection: 'Regular Polygons', name: 'One Interior Angle', latex: '\\text{Interior} = \\dfrac{180(n-2)}{n}', note: '' },
  { id: 'exterior-sum', section: 'coord-geom', subsection: 'Regular Polygons', name: 'Sum of Exterior Angles', latex: '\\text{Sum} = 360^\\circ', note: 'Always 360 degrees for any convex polygon' },
  { id: 'one-exterior', section: 'coord-geom', subsection: 'Regular Polygons', name: 'One Exterior Angle', latex: '\\text{Exterior} = \\dfrac{360}{n}', note: '' },
  { id: 'sets-formula', section: 'coord-geom', subsection: 'Sets', name: 'Sets Formula', latex: 'n(A \\cup B) = n(A) + n(B) - n(A \\cap B)', note: '' },

  // ===== 5. TRIGONOMETRY =====
  { id: 'pythagoras', section: 'trigonometry', subsection: 'Basic', name: 'Pythagoras Theorem', latex: 'c^2 = a^2 + b^2', note: 'c = hypotenuse; right-angle triangles only' },
  { id: 'sin-ratio', section: 'trigonometry', subsection: 'Trigonometric Ratios', name: 'Sine', latex: '\\sin\\theta = \\dfrac{\\text{opp}}{\\text{hyp}}', note: '' },
  { id: 'cos-ratio', section: 'trigonometry', subsection: 'Trigonometric Ratios', name: 'Cosine', latex: '\\cos\\theta = \\dfrac{\\text{adj}}{\\text{hyp}}', note: '' },
  { id: 'tan-ratio', section: 'trigonometry', subsection: 'Trigonometric Ratios', name: 'Tangent', latex: '\\tan\\theta = \\dfrac{\\text{opp}}{\\text{adj}}', note: '' },
  { id: 'cosine-rule', section: 'trigonometry', subsection: 'Advanced', name: 'Cosine Rule', latex: 'a^2 = b^2 + c^2 - 2bc\\cos A', note: 'For any triangle' },
  { id: 'sine-rule', section: 'trigonometry', subsection: 'Advanced', name: 'Sine Rule', latex: '\\dfrac{a}{\\sin A} = \\dfrac{b}{\\sin B} = \\dfrac{c}{\\sin C}', note: '' },
  { id: 'sine-rule-alt', section: 'trigonometry', subsection: 'Advanced', name: 'Sine Rule (alt)', latex: '\\dfrac{\\sin A}{a} = \\dfrac{\\sin B}{b} = \\dfrac{\\sin C}{c}', note: 'Use this form when finding an angle' },
  { id: 'ct-semicircle', section: 'trigonometry', subsection: 'Circle Theorems', name: 'Angle in Semi-circle', latex: '', note: 'The angle in a semi-circle is 90 degrees', hasDiagram: true },
  { id: 'ct-same-segment', section: 'trigonometry', subsection: 'Circle Theorems', name: 'Angles in Same Segment', latex: '', note: 'Angles from a common chord in the same segment are equal', hasDiagram: true },
  { id: 'ct-centre-circumference', section: 'trigonometry', subsection: 'Circle Theorems', name: 'Centre vs Circumference', latex: '', note: 'The angle at the centre is twice the angle at the circumference from the same chord', hasDiagram: true },
  { id: 'ct-cyclic-quad', section: 'trigonometry', subsection: 'Circle Theorems', name: 'Cyclic Quadrilateral', latex: '', note: 'Opposite angles in a cyclic quadrilateral are supplementary (add to 180 degrees)', hasDiagram: true },
  { id: 'ct-chord-bisect', section: 'trigonometry', subsection: 'Circle Theorems', name: 'Perpendicular from Centre', latex: '', note: 'A line from the centre perpendicular to a chord bisects the chord. Conversely, a line from the centre to the midpoint of a chord meets it at 90\u00B0.', hasDiagram: true },

/* ============================================================
   SVG HELPERS
   ============================================================ */
function ptOn(cx,cy,r,deg){const a=deg*Math.PI/180;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];}
function svgC(cx,cy,r,extra){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#2B4C7E" stroke-width="2" '+(extra||'')+'/>';}
function svgP(x,y,label,ox,oy,color){
  ox=ox||0;oy=oy||-12;color=color||'#2B4C7E';
  return '<circle cx="'+x+'" cy="'+y+'" r="4" fill="'+color+'"/><text x="'+(x+ox)+'" y="'+(y+oy)+'" fill="'+color+'" font-family="Poppins" font-size="13" font-weight="700" text-anchor="middle">'+label+'</text>';
}
function svgL(x1,y1,x2,y2,color,w,dash){
  color=color||'#2B4C7E';w=w||2;
  return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+color+'" stroke-width="'+w+'" '+(dash?'stroke-dasharray="'+dash+'"':'')+'/>';
}
function svgArc(cx,cy,r,startDeg,endDeg,color,w){
  color=color||'#F5A623';w=w||3;
  var s=ptOn(cx,cy,r,startDeg),e=ptOn(cx,cy,r,endDeg);
  var diff=endDeg-startDeg;if(diff<0)diff+=360;
  var large=diff>180?1:0;
  return '<path d="M'+s[0]+' '+s[1]+' A'+r+' '+r+' 0 '+large+' 1 '+e[0]+' '+e[1]+'" fill="none" stroke="'+color+'" stroke-width="'+w+'"/>';
}
function svgAngleArc(cx,cy,r,startDeg,endDeg,color){
  color=color||'#F5A623';
  return svgArc(cx,cy,r,startDeg,endDeg,color,2);
}
function svgAngleLabel(cx,cy,r,startDeg,endDeg,label,color){
  color=color||'#F5A623';
  var mid=(startDeg+endDeg)/2;
  var p=ptOn(cx,cy,r+12,mid);
  return '<text x="'+p[0]+'" y="'+p[1]+'" fill="'+color+'" font-family="Poppins" font-size="11" font-weight="700" text-anchor="middle" dominant-baseline="central">'+label+'</text>';
}
function svgRightAngle(x,y,size,angle,color){
  color=color||'#F5A623';size=size||12;
  var a=angle*Math.PI/180;
  var a2=(angle+90)*Math.PI/180;
  var p1=[x+size*Math.cos(a),y+size*Math.sin(a)];
  var p2=[p1[0]+size*Math.cos(a2),p1[1]+size*Math.sin(a2)];
  var p3=[x+size*Math.cos(a2),y+size*Math.sin(a2)];
  return '<path d="M'+p1[0]+' '+p1[1]+' L'+p2[0]+' '+p2[1]+' L'+p3[0]+' '+p3[1]+'" fill="none" stroke="'+color+'" stroke-width="2"/>';
}

function getCircleTheoremSVG(id){
  var w=280,h=240,cx=140,cy=115,r=75;
  var svg='<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto">';
  svg+=svgC(cx,cy,r);

  switch(id){
    case 'ct-semicircle':{
      // Diameter AB horizontal, P on top of circle
      var A=ptOn(cx,cy,r,180),B=ptOn(cx,cy,r,0),P=ptOn(cx,cy,r,110);
      svg+=svgL(A[0],A[1],B[0],B[1],'#2B4C7E',2);
      svg+=svgL(A[0],A[1],P[0],P[1],'#6B8AAD',2);
      svg+=svgL(B[0],B[1],P[0],P[1],'#6B8AAD',2);
      // Right angle at P — orient along PA direction so the square sits inside the angle
      var angPA=Math.atan2(A[1]-P[1],A[0]-P[0])*180/Math.PI;
      svg+=svgRightAngle(P[0],P[1],10,angPA);
      svg+=svgP(A[0],A[1],'A',-14,4);
      svg+=svgP(B[0],B[1],'B',14,4);
      svg+=svgP(P[0],P[1],'P',-12,-10);
      svg+=svgP(cx,cy,'O',0,14);
      svg+='<text x="'+cx+'" y="'+(h-6)+'" fill="#F5A623" font-family="Poppins" font-size="12" font-weight="700" text-anchor="middle">Angle APB = 90\u00B0</text>';
      break;
    }
    case 'ct-same-segment':{
      // Chord AB at top, P and Q in lower arc (same segment)
      var A=ptOn(cx,cy,r,150),B=ptOn(cx,cy,r,30);
      var P=ptOn(cx,cy,r,210),Q=ptOn(cx,cy,r,330);
      svg+=svgL(A[0],A[1],B[0],B[1],'#2B4C7E',2,'6,3');
      svg+=svgL(A[0],A[1],P[0],P[1],'#6B8AAD',2);
      svg+=svgL(B[0],B[1],P[0],P[1],'#6B8AAD',2);
      svg+=svgL(A[0],A[1],Q[0],Q[1],'#10B981',2);
      svg+=svgL(B[0],B[1],Q[0],Q[1],'#10B981',2);
      svg+=svgP(A[0],A[1],'A',-14,-6);
      svg+=svgP(B[0],B[1],'B',14,-6);
      svg+=svgP(P[0],P[1],'P',-14,6);
      svg+=svgP(Q[0],Q[1],'Q',14,6);
      svg+='<text x="'+cx+'" y="'+(h-6)+'" fill="#F5A623" font-family="Poppins" font-size="12" font-weight="700" text-anchor="middle">\u2220P = \u2220Q</text>';
      break;
    }
    case 'ct-centre-circumference':{
      // Chord AB at sides, O centre connected to both, P at bottom
      var A=ptOn(cx,cy,r,150),B=ptOn(cx,cy,r,30);
      var P=ptOn(cx,cy,r,250);
      svg+=svgL(A[0],A[1],cx,cy,'#EF4444',2);
      svg+=svgL(B[0],B[1],cx,cy,'#EF4444',2);
      svg+=svgL(A[0],A[1],P[0],P[1],'#6B8AAD',2);
      svg+=svgL(B[0],B[1],P[0],P[1],'#6B8AAD',2);
      // Angle arcs — MINOR angles (go the short way)
      // At O: from OB to OA going upward (short way through top)
      var angOA=Math.atan2(A[1]-cy,A[0]-cx)*180/Math.PI;
      var angOB=Math.atan2(B[1]-cy,B[0]-cx)*180/Math.PI;
      // angOA ~ 150, angOB ~ 30. Short arc goes from 30 to 150.
      svg+=svgAngleArc(cx,cy,18, angOB, angOA, '#EF4444');
      // At P: from PA to PB going upward (short way)
      var angPA=Math.atan2(A[1]-P[1],A[0]-P[0])*180/Math.PI;
      var angPB=Math.atan2(B[1]-P[1],B[0]-P[0])*180/Math.PI;
      // angPA ~ -40ish (up-left), angPB ~ -70ish (up-right). Need short arc.
      svg+=svgAngleArc(P[0],P[1],18, angPB, angPA, '#6B8AAD');
      svg+=svgP(A[0],A[1],'A',-14,-6);
      svg+=svgP(B[0],B[1],'B',14,-6);
      svg+=svgP(P[0],P[1],'P',0,16);
      svg+=svgP(cx,cy,'O',10,-10,'#EF4444');
      svg+='<text x="'+cx+'" y="'+(h-6)+'" fill="#F5A623" font-family="Poppins" font-size="11" font-weight="700" text-anchor="middle">\u2220AOB = 2 \u00D7 \u2220APB</text>';
      break;
    }
    case 'ct-cyclic-quad':{
      // Four points evenly spread
      var A=ptOn(cx,cy,r,120),B=ptOn(cx,cy,r,40),C=ptOn(cx,cy,r,320),D=ptOn(cx,cy,r,220);
      svg+=svgL(A[0],A[1],B[0],B[1],'#6B8AAD',2);
      svg+=svgL(B[0],B[1],C[0],C[1],'#6B8AAD',2);
      svg+=svgL(C[0],C[1],D[0],D[1],'#6B8AAD',2);
      svg+=svgL(D[0],D[1],A[0],A[1],'#6B8AAD',2);
      svg+=svgP(A[0],A[1],'A',-14,-4);
      svg+=svgP(B[0],B[1],'B',14,-4);
      svg+=svgP(C[0],C[1],'C',14,10);
      svg+=svgP(D[0],D[1],'D',-14,10);
      svg+='<text x="'+cx+'" y="'+(h-6)+'" fill="#F5A623" font-family="Poppins" font-size="11" font-weight="700" text-anchor="middle">A + C = 180\u00B0,  B + D = 180\u00B0</text>';
      break;
    }
    case 'ct-chord-bisect':{
      // Chord AB lower, O at centre, M is midpoint
      var A=ptOn(cx,cy,r,200),B=ptOn(cx,cy,r,340);
      var mx=(A[0]+B[0])/2,my=(A[1]+B[1])/2;
      svg+=svgL(A[0],A[1],B[0],B[1],'#6B8AAD',2);
      svg+=svgL(cx,cy,mx,my,'#EF4444',2);
      // Tick marks on AM and MB to show equal lengths
      var tickA=[(A[0]+mx)/2,(A[1]+my)/2];
      var tickB=[(B[0]+mx)/2,(B[1]+my)/2];
      var perpAng=Math.atan2(B[1]-A[1],B[0]-A[0])+Math.PI/2;
      var ts=5;
      svg+='<line x1="'+(tickA[0]-ts*Math.cos(perpAng))+'" y1="'+(tickA[1]-ts*Math.sin(perpAng))+'" x2="'+(tickA[0]+ts*Math.cos(perpAng))+'" y2="'+(tickA[1]+ts*Math.sin(perpAng))+'" stroke="#F5A623" stroke-width="2"/>';
      svg+='<line x1="'+(tickB[0]-ts*Math.cos(perpAng))+'" y1="'+(tickB[1]-ts*Math.sin(perpAng))+'" x2="'+(tickB[0]+ts*Math.cos(perpAng))+'" y2="'+(tickB[1]+ts*Math.sin(perpAng))+'" stroke="#F5A623" stroke-width="2"/>';
      svg+=svgP(A[0],A[1],'A',-14,4);
      svg+=svgP(B[0],B[1],'B',14,4);
      svg+=svgP(mx,my,'M',10,12);
      svg+=svgP(cx,cy,'O',0,-12,'#EF4444');
      svg+='<text x="'+cx+'" y="'+(h-6)+'" fill="#F5A623" font-family="Poppins" font-size="12" font-weight="700" text-anchor="middle">AM = MB</text>';
      break;
    }
    case 'ct-tangent-equal':{
      // External point P to the right, two tangents
      var px=cx+r+55,py=cy;
      var angle=Math.acos(r/(r+55))*180/Math.PI;
      var T1=ptOn(cx,cy,r,-angle),T2=ptOn(cx,cy,r,angle);
      svg+=svgL(px,py,T1[0],T1[1],'#10B981',2);
      svg+=svgL(px,py,T2[0],T2[1],'#10B981',2);
      svg+=svgL(cx,cy,T1[0],T1[1],'#EF4444',1.5,'4,3');
      svg+=svgL(cx,cy,T2[0],T2[1],'#EF4444',1.5,'4,3');
      // Tick marks on PT1 and PT2
      var t1m=[(px+T1[0])/2,(py+T1[1])/2];
      var t2m=[(px+T2[0])/2,(py+T2[1])/2];
      var pa1=Math.atan2(T1[1]-py,T1[0]-px)+Math.PI/2;
      var pa2=Math.atan2(T2[1]-py,T2[0]-px)+Math.PI/2;
      svg+='<line x1="'+(t1m[0]-4*Math.cos(pa1))+'" y1="'+(t1m[1]-4*Math.sin(pa1))+'" x2="'+(t1m[0]+4*Math.cos(pa1))+'" y2="'+(t1m[1]+4*Math.sin(pa1))+'" stroke="#F5A623" stroke-width="2"/>';
      svg+='<line x1="'+(t2m[0]-4*Math.cos(pa2))+'" y1="'+(t2m[1]-4*Math.sin(pa2))+'" x2="'+(t2m[0]+4*Math.cos(pa2))+'" y2="'+(t2m[1]+4*Math.sin(pa2))+'" stroke="#F5A623" stroke-width="2"/>';
      svg+=svgP(T1[0],T1[1],'T\u2081',-12,-8);
      svg+=svgP(T2[0],T2[1],'T\u2082',-12,14);
      svg+=svgP(px,py,'P',12,4,'#10B981');
      svg+=svgP(cx,cy,'O',-12,4);
      svg+='<text x="'+(cx-10)+'" y="'+(h-6)+'" fill="#F5A623" font-family="Poppins" font-size="12" font-weight="700" text-anchor="middle">PT\u2081 = PT\u2082</text>';
      break;
    }
    case 'ct-alternate-segment':{
      // Tangent at T (bottom), chord TB, angle in alternate segment at A
      var T=ptOn(cx,cy,r,250);
      // Tangent line through T, perpendicular to radius OT
      var radAng=Math.atan2(T[1]-cy,T[0]-cx);
      var tangAng=radAng+Math.PI/2;
      var tangStart=[T[0]-55*Math.cos(tangAng),T[1]-55*Math.sin(tangAng)];
      var tangEnd=[T[0]+55*Math.cos(tangAng),T[1]+55*Math.sin(tangAng)];
      var B=ptOn(cx,cy,r,350);
      var A=ptOn(cx,cy,r,80);
      svg+=svgL(tangStart[0],tangStart[1],tangEnd[0],tangEnd[1],'#10B981',2);
      svg+=svgL(T[0],T[1],B[0],B[1],'#6B8AAD',2);
      svg+=svgL(A[0],A[1],B[0],B[1],'#6B8AAD',2,'5,3');
      svg+=svgL(A[0],A[1],T[0],T[1],'#6B8AAD',2);
      // Angle arcs: angle between tangent and chord TB at T (on the side away from A)
      var angTangDeg=tangAng*180/Math.PI;
      var angTB=Math.atan2(B[1]-T[1],B[0]-T[0])*180/Math.PI;
      // Use the tangent direction on the side closer to B (away from A's segment)
      svg+=svgAngleArc(T[0],T[1],18,angTangDeg,angTB,'#F5A623');
      // Angle at A: angle TAB (in the alternate segment)
      var angAT=Math.atan2(T[1]-A[1],T[0]-A[0])*180/Math.PI;
      var angAB=Math.atan2(B[1]-A[1],B[0]-A[0])*180/Math.PI;
      svg+=svgAngleArc(A[0],A[1],18,angAT,angAB,'#F5A623');
      svg+=svgP(T[0],T[1],'T',-6,16);
      svg+=svgP(A[0],A[1],'A',-4,-14);
      svg+=svgP(B[0],B[1],'B',14,4);
      svg+='<text x="'+cx+'" y="'+(h-6)+'" fill="#F5A623" font-family="Poppins" font-size="11" font-weight="700" text-anchor="middle">\u2220BTtan = \u2220TAB</text>';
      break;
    }
    case 'ct-tangent-radius':{
      // Tangent at T (right side), radius OT
      var T=ptOn(cx,cy,r,350);
      // Tangent perpendicular to radius at T
      var radAng=Math.atan2(T[1]-cy,T[0]-cx);
      var tangAng=radAng+Math.PI/2;
      var te1=[T[0]-50*Math.cos(tangAng),T[1]-50*Math.sin(tangAng)];
      var te2=[T[0]+50*Math.cos(tangAng),T[1]+50*Math.sin(tangAng)];
      svg+=svgL(te1[0],te1[1],te2[0],te2[1],'#10B981',2);
      svg+=svgL(cx,cy,T[0],T[1],'#EF4444',2);
      // Right angle at T between radius and tangent
      svg+=svgRightAngle(T[0],T[1],9,tangAng*180/Math.PI);
      svg+=svgP(T[0],T[1],'T',14,-8);
      svg+=svgP(cx,cy,'O',-14,4,'#EF4444');
      svg+='<text x="'+cx+'" y="'+(h-6)+'" fill="#F5A623" font-family="Poppins" font-size="12" font-weight="700" text-anchor="middle">OT \u22A5 tangent (90\u00B0)</text>';
      break;
    }
    default:
      svg+='<text x="'+cx+'" y="'+cy+'" fill="#999" font-family="Poppins" font-size="14" text-anchor="middle">Diagram</text>';
  }
  svg+='</svg>';
  return svg;
}

/* ============================================================
   SOUND SYSTEM
   ============================================================ */
var audioCtx=null;
function getAudioCtx(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  return audioCtx;
}
function playSound(name){
  var ctx=getAudioCtx();if(!ctx)return;
  try{
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    var t=ctx.currentTime;
    switch(name){
      case 'click':o.frequency.value=800;g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);o.stop(t+0.08);break;
      case 'flip':o.frequency.value=600;o.type='triangle';g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.stop(t+0.15);break;
      case 'correct':o.frequency.value=523;o.type='sine';g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.frequency.setValueAtTime(659,t+0.1);o.frequency.setValueAtTime(784,t+0.2);o.stop(t+0.3);break;
      case 'wrong':o.frequency.value=200;o.type='sawtooth';g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);o.stop(t+0.25);break;
      case 'complete':o.frequency.value=523;o.type='sine';g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.5);o.frequency.setValueAtTime(659,t+0.1);o.frequency.setValueAtTime(784,t+0.2);o.frequency.setValueAtTime(1047,t+0.3);o.stop(t+0.5);break;
      case 'pop':o.frequency.value=1200;o.type='sine';g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.06);o.stop(t+0.06);break;
      default:o.frequency.value=600;g.gain.setValueAtTime(0.05,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);o.stop(t+0.1);
    }
    o.start(t);
  }catch(e){}
}

  filterBookView(q);

    buildCardDeck();
  }
});

  searchInput.value='';
  state.searchQuery='';
  searchClear.classList.remove('visible');
  filterBookView('');
  if(state.mode==='cards')buildCardDeck();

function filterBookView(q){
  document.querySelectorAll('.formula-card-book').forEach(function(card){
    if(!q){card.classList.remove('hidden');return;}
    var name=card.dataset.name||'';
    var note=card.dataset.note||'';
    var section=card.dataset.section||'';
    var subsection=card.dataset.subsection||'';
    var text=(name+' '+note+' '+section+' '+subsection).toLowerCase();
    card.classList.toggle('hidden',text.indexOf(q)===-1);
  });
  // Show/hide section blocks that have no visible formulas
  document.querySelectorAll('.section-block').forEach(function(block){
    var visible=block.querySelectorAll('.formula-card-book:not(.hidden)');
    block.style.display=visible.length===0&&q?'none':'';
  });
  // No results
  var existing=document.getElementById('noResultsBook');
  if(existing)existing.remove();
  if(q){
    var anyVisible=document.querySelectorAll('.formula-card-book:not(.hidden)');
    if(anyVisible.length===0){
      var div=document.createElement('div');
      div.id='noResultsBook';div.className='no-results';
      div.innerHTML='<div class="nr-icon">&#128270;</div><h3>No formulas found</h3><p>Try a different search term</p>';
      document.getElementById('bookView').appendChild(div);
    }
  }
}

function getCardFormulas(){
  var formulas=FORMULAS.filter(function(f){return f.section!=='symbols-sheet';});
  if(state.fcSection!=='all'){
    formulas=formulas.filter(function(f){return f.section===state.fcSection;});
  }
  if(state.searchQuery){
    var q=state.searchQuery.toLowerCase();
    formulas=formulas.filter(function(f){
      var text=(f.name+' '+(f.note||'')+' '+f.section+' '+(f.subsection||'')).toLowerCase();
      return text.indexOf(q)!==-1;
    });
  }
  return formulas;
}

function buildCardDeck(){
  var formulas=getCardFormulas();
  fcCards=formulas.slice();
  fcIndex=0;fcFlipped=false;fcAnimating=false;
  renderDeck();
}

function renderDeck(slideDir){
  var total=fcCards.length;
  if(total===0){
    var front=document.getElementById('cardFront');
    if(front)front.innerHTML='<div class="no-results"><div class="nr-icon">&#128270;</div><h3>No cards found</h3><p>Try a different section or search term</p></div>';
    var back=document.getElementById('cardBack');
    if(back)back.innerHTML='';
    renderPiles();
    return;
  }

  var f=fcCards[fcIndex];
  var sec=SECTIONS.find(function(s){return s.id===f.section;});
  var secColor=sec?sec.color:'#2B4C7E';
  var secName=sec?sec.name:'';

  // Front
  var front=document.getElementById('cardFront');
  if(front){
    var fhtml='';
    fhtml+='<div class="fc-counter">'+(fcIndex+1)+' / '+total+'</div>';
    fhtml+='<div class="fc-section-badge" style="background:'+secColor+'">'+secName+'</div>';
    if(f.subsection && f.subsection !== secName) {
      fhtml+='<div class="fc-subsection-hint">'+f.subsection+'</div>';
    }
    fhtml+='<div class="fc-formula-name">'+f.name+'</div>';
    fhtml+='<div class="fc-tap-hint">Tap to reveal</div>';
    front.innerHTML=fhtml;
  }

  // Back - populate immediately so it's ready when flipped
  var back=document.getElementById('cardBack');
  if(back){
    var bhtml='';
    bhtml+='<div class="fc-section-badge" style="background:'+secColor+'">'+secName+'</div>';
    bhtml+='<div class="fc-formula-name">'+f.name+'</div>';
    if(f.latex){
      bhtml+='<div class="fc-latex-area" id="fcLatex"></div>';
    }
    if(f.hasDiagram){
      bhtml+='<div class="formula-diagram" style="max-width:260px">'+getCircleTheoremSVG(f.id)+'</div>';
    }
    if(f.note){
      bhtml+='<div class="fc-note">'+f.note+'</div>';
    }
    back.innerHTML=bhtml;
    if(f.latex){
      requestAnimationFrame(function(){
        var el=document.getElementById('fcLatex');
        if(el)renderKatex(f.latex,el,true);
      });
    }
  }

  // Update card counter in stats bar
  var counterTop=document.getElementById('fcCounterTop');
  if(counterTop)counterTop.textContent=(fcIndex+1)+' / '+total;

  // Make sure card is not flipped
  var card=document.getElementById('activeCard');
  if(card){
    card.classList.remove('flipped');
    // Slide animation
    card.classList.remove('slide-in-right','slide-in-left','slide-out-left','slide-out-right');
    card.style.transition='none';
    card.style.transform='';
    void card.offsetWidth;
    card.style.transition='';
    if(slideDir==='right'||slideDir==='left'){
      var cls=slideDir==='right'?'slide-in-right':'slide-in-left';
      void card.offsetWidth;
      card.classList.add(cls);
      var onEnd=function(){card.classList.remove(cls);card.removeEventListener('animationend',onEnd);};
      card.addEventListener('animationend',onEnd);
    }
  }

  renderPiles();
}

function renderPiles(){
  var doneCount=fcIndex;
  var remainCount=fcCards.length-fcIndex-1;
  if(remainCount<0)remainCount=0;
  // Done pile
  var donePile=document.getElementById('donePileCards');
  if(donePile){
    var doneHTML='';
    var doneShow=Math.min(doneCount,3);
    for(var i=0;i<doneShow;i++){
      var offset=(doneShow-1-i)*3;
      doneHTML+='<div class="pile-card pile-card-up" style="top:'+offset+'px;left:'+offset+'px"></div>';
    }
    if(doneCount===0){
      doneHTML='<div class="pile-card" style="border:2px dashed rgba(43,76,126,.12);border-radius:10px;background:transparent;box-shadow:none"></div>';
    }
    donePile.innerHTML=doneHTML;
  }
  var doneEl=document.getElementById('doneCount');
  if(doneEl)doneEl.textContent=doneCount;
  // Remaining pile
  var remainPile=document.getElementById('remainPileCards');
  if(remainPile){
    var remainHTML='';
    var remShow=Math.min(remainCount,3);
    for(var i=0;i<remShow;i++){
      var offset=(remShow-1-i)*3;
      remainHTML+='<div class="pile-card pile-card-down" style="top:'+offset+'px;left:'+offset+'px"></div>';
    }
    if(remainCount===0){
      remainHTML='<div class="pile-card" style="border:2px dashed rgba(43,76,126,.12);border-radius:10px;background:transparent;box-shadow:none"></div>';
    }
    remainPile.innerHTML=remainHTML;
  }
  var remEl=document.getElementById('remainCount');
  if(remEl)remEl.textContent=Math.max(0,remainCount);
}

function flipCard(){
  if(fcAnimating)return;
  playSound('flip');
  var card=document.getElementById('activeCard');
  if(!card)return;
  fcFlipped=!fcFlipped;
  card.classList.toggle('flipped');
}

function advanceCard(){
  if(fcAnimating)return;
  if(fcIndex>=fcCards.length-1)return;
  fcAnimating=true;
  playSound('flip');
  var card=document.getElementById('activeCard');
  if(card){
    card.classList.remove('slide-in-right','slide-in-left','flipped');
    card.classList.add('slide-out-left');
  }
  setTimeout(function(){
    var back=document.getElementById('cardBack');
    if(back)back.innerHTML='';
    if(card)card.classList.remove('slide-out-left');
    fcIndex++;
    fcFlipped=false;
    fcAnimating=false;
    renderDeck('right');
  },260);
}

function prevCard(){
  if(fcAnimating)return;
  if(fcIndex<=0)return;
  fcAnimating=true;
  playSound('flip');
  var card=document.getElementById('activeCard');
  if(card){
    card.classList.remove('slide-in-right','slide-in-left','flipped');
    card.classList.add('slide-out-right');
  }
  setTimeout(function(){
    var back=document.getElementById('cardBack');
    if(back)back.innerHTML='';
    if(card)card.classList.remove('slide-out-right');
    fcIndex--;
    fcFlipped=false;
    fcAnimating=false;
    renderDeck('left');
  },260);
}

function restartDeck(){
  if(fcAnimating)return;
  if(fcIndex===0)return;
  playSound('flip');
  fcAnimating=true;
  var card=document.getElementById('activeCard');
  if(card){
    card.classList.remove('slide-in-right','slide-in-left','flipped','slide-out-left');
    card.style.opacity='0';
  }
  setTimeout(function(){
    fcIndex=0;
    fcFlipped=false;
    if(card)card.style.opacity='';
    fcAnimating=false;
    renderDeck('left');
  },200);
}

function jumpToEnd(){
  if(fcAnimating)return;
  if(!fcCards||fcCards.length===0)return;
  if(fcIndex>=fcCards.length-1)return;
  playSound('flip');
  fcAnimating=true;
  var card=document.getElementById('activeCard');
  if(card){
    card.classList.remove('slide-in-right','slide-in-left','flipped','slide-out-left');
    card.style.opacity='0';
  }
  setTimeout(function(){
    fcIndex=fcCards.length-1;
    fcFlipped=false;
    if(card)card.style.opacity='';
    fcAnimating=false;
    renderDeck('right');
  },200);
}

function changeCardSection(val){
  state.fcSection=val;
  saveState();
  buildCardDeck();
  playSound('click');
}

function filterSection(val){
  state.fcSection=val;
  saveState();
  // Update active pill
  var pills=document.querySelectorAll('#sectionPills .sec-pill');
  pills.forEach(function(p){p.classList.toggle('active',p.getAttribute('data-section')===val);});
  buildCardDeck();
  playSound('click');
}

var scrollSpyTimeout;
window.addEventListener('scroll',function(){
  if(state.mode!=='book')return;
  clearTimeout(scrollSpyTimeout);
  scrollSpyTimeout=setTimeout(function(){
    var best=null,bestDist=Infinity;
    SECTIONS.forEach(function(sec){
      var el=document.getElementById('section-'+sec.id);
      if(!el)return;
      var rect=el.getBoundingClientRect();
      var dist=Math.abs(rect.top-72);
      if(rect.top<window.innerHeight&&dist<bestDist){bestDist=dist;best=sec.id;}
    });
    if(best){
      document.querySelectorAll('.sidebar-section').forEach(function(s){
        s.classList.toggle('active',s.dataset.section===best);
      });
    }
  },100);
});
