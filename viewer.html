<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Past Paper Viewer — Kerwin Springer</title>

<meta property="og:title" content="Past Paper Solutions — Kerwin Springer">
<meta property="og:description" content="Free worked solutions for CSEC and SEA past papers by Kerwin Springer.">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#525659;color:#e0e6ed;overflow:hidden;height:100vh;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}

.toolbar{display:flex;align-items:center;height:40px;padding:0 8px;background:#323639;flex-shrink:0;z-index:10;gap:2px}
.tb-back{display:flex;align-items:center;gap:4px;color:#e8eaed;text-decoration:none;font-size:13px;font-weight:500;padding:0 10px;height:28px;border-radius:4px;transition:background .15s;white-space:nowrap}
.tb-back:hover{background:rgba(255,255,255,0.1)}
.tb-back svg{width:16px;height:16px;flex-shrink:0}
.tb-sep{width:1px;height:20px;background:rgba(255,255,255,0.12);margin:0 4px;flex-shrink:0}
.tb-title{flex:1;font-size:12px;font-weight:500;color:#c4c7cc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px;min-width:0}
.tb-group{display:flex;align-items:center;gap:2px;flex-shrink:0}
.tb-btn{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border:none;background:none;color:#e8eaed;border-radius:4px;cursor:pointer;transition:background .15s}
.tb-btn:hover{background:rgba(255,255,255,0.1)}
.tb-btn:disabled{opacity:.3;cursor:default}
.tb-btn:disabled:hover{background:none}
.tb-btn svg{width:16px;height:16px}
.tb-page-input{width:36px;height:24px;background:#1f2124;border:1px solid rgba(255,255,255,0.15);border-radius:3px;color:#e8eaed;font-family:'Poppins',sans-serif;font-size:12px;text-align:center;outline:none;-moz-appearance:textfield}
.tb-page-input::-webkit-inner-spin-button,.tb-page-input::-webkit-outer-spin-button{-webkit-appearance:none}
.tb-page-input:focus{border-color:rgba(138,180,248,0.6)}
.tb-label{font-size:12px;color:#9aa0a6;padding:0 4px;white-space:nowrap}
.tb-zoom-pct{font-size:12px;color:#9aa0a6;min-width:40px;text-align:center;white-space:nowrap}

.pdf-scroll{flex:1;overflow:auto;background:#525659}
.pdf-container{display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:8px}
.page-canvas{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.3);display:block}

.loading-overlay{position:fixed;inset:0;background:#323639;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:16px}
.loading-spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.15);border-top-color:#8ab4f8;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:#9aa0a6}

.error-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px}
.error-state h2{font-size:18px;color:#e0e6ed;font-weight:600}
.error-state p{font-size:13px;color:#9aa0a6;text-align:center;max-width:380px}

@media(max-width:600px){
  .toolbar{padding:0 4px}
  .tb-title{font-size:11px}
  .tb-back span{display:none}
  .hide-mobile{display:none}
}
canvas{-webkit-touch-callout:none}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading paper...</div>
</div>

<div class="toolbar" id="toolbar" style="display:none">
  <a href="papers.html" class="tb-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    <span>Papers</span>
  </a>
  <div class="tb-sep"></div>
  <div class="tb-group">
    <button class="tb-btn" id="prevBtn" title="Previous page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
    </button>
    <button class="tb-btn" id="nextBtn" title="Next page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <input type="number" class="tb-page-input" id="pageInput" min="1" value="1">
    <span class="tb-label" id="pageTotal">/ 0</span>
  </div>
  <div class="tb-sep hide-mobile"></div>
  <div class="tb-group">
    <button class="tb-btn" id="zoomOutBtn" title="Zoom out (Ctrl -)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <span class="tb-zoom-pct" id="zoomPct">Fit</span>
    <button class="tb-btn" id="zoomInBtn" title="Zoom in (Ctrl +)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="tb-btn" id="fitBtn" title="Fit to width (Ctrl 0)" style="font-size:11px;width:auto;padding:0 8px">Fit</button>
  </div>
  <div class="tb-sep hide-mobile"></div>
  <div class="tb-title" id="paperTitle"></div>
</div>

<div class="pdf-scroll" id="pdfScroll" style="display:none">
  <div class="pdf-container" id="pdfContainer"></div>
</div>

<div class="error-state" id="errorState" style="display:none">
  <h2>Paper not found</h2>
  <p id="errorMsg">The requested past paper could not be loaded.</p>
  <a href="papers.html" style="color:#8ab4f8;font-weight:500;text-decoration:none;font-size:13px">Back to Papers</a>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var params=new URLSearchParams(window.location.search);
var pdfFile=params.get('file');
var paperName=params.get('name')||'Past Paper';

document.getElementById('paperTitle').textContent=paperName;
document.title=paperName+' — Kerwin Springer';

var pdfDoc=null,totalPages=0,currentPage=1;
var fitWidth=1;
var zoomLevel=1;
var fitMode=true;
var dpr=window.devicePixelRatio||1;
var pageMeta=[];

var scrollEl=document.getElementById('pdfScroll');
var container=document.getElementById('pdfContainer');

function showError(msg){
  document.getElementById('loadingOverlay').style.display='none';
  document.getElementById('toolbar').style.display='none';
  scrollEl.style.display='none';
  document.getElementById('errorState').style.display='flex';
  if(msg)document.getElementById('errorMsg').textContent=msg;
}

function updateUI(){
  document.getElementById('pageInput').value=currentPage;
  document.getElementById('pageTotal').textContent='/ '+totalPages;
  document.getElementById('prevBtn').disabled=currentPage<=1;
  document.getElementById('nextBtn').disabled=currentPage>=totalPages;
  if(fitMode){
    document.getElementById('zoomPct').textContent='Fit';
  }else{
    document.getElementById('zoomPct').textContent=Math.round(zoomLevel*100)+'%';
  }
}

function applyZoom(){
  var availW=scrollEl.clientWidth-32;
  for(var i=0;i<pageMeta.length;i++){
    var m=pageMeta[i];
    var displayScale=fitMode?(availW/m.natW):zoomLevel;
    var w=Math.round(m.natW*displayScale);
    var h=Math.round(m.natH*displayScale);
    m.canvas.style.width=w+'px';
    m.canvas.style.height=h+'px';
  }
  updateUI();
}

function trackPage(){
  var mid=scrollEl.scrollTop+scrollEl.clientHeight*0.35;
  var canvases=container.querySelectorAll('canvas');
  var best=1;
  for(var i=0;i<canvases.length;i++){
    if(canvases[i].offsetTop<=mid)best=i+1;
  }
  if(best!==currentPage){currentPage=best;updateUI();}
}

function scrollToPage(n){
  var canvases=container.querySelectorAll('canvas');
  if(canvases[n-1])canvases[n-1].scrollIntoView({behavior:'smooth',block:'start'});
}

function doZoom(newLevel){
  fitMode=false;
  zoomLevel=Math.min(Math.max(newLevel,0.5),3);
  var scrollRatio=0;
  var maxScroll=scrollEl.scrollHeight-scrollEl.clientHeight;
  if(maxScroll>0)scrollRatio=scrollEl.scrollTop/maxScroll;
  applyZoom();
  var newMax=scrollEl.scrollHeight-scrollEl.clientHeight;
  if(newMax>0)scrollEl.scrollTop=scrollRatio*newMax;
}

function doFit(){
  fitMode=true;
  applyZoom();
}

async function renderAllOnce(){
  if(!pdfDoc)return;
  container.innerHTML='';
  pageMeta=[];

  var availW=scrollEl.clientWidth-32;
  var renderZoom=2;

  for(var i=1;i<=totalPages;i++){
    var page=await pdfDoc.getPage(i);
    var unscaled=page.getViewport({scale:1});
    var baseScale=availW/unscaled.width;
    var renderScale=baseScale*renderZoom*dpr;
    var vp=page.getViewport({scale:renderScale});

    var natW=Math.round(vp.width/(renderZoom*dpr))*renderZoom;
    var natH=Math.round(vp.height/(renderZoom*dpr))*renderZoom;
    var cssW=Math.round(natW/renderZoom);
    var cssH=Math.round(natH/renderZoom);

    var canvas=document.createElement('canvas');
    canvas.className='page-canvas';
    canvas.width=Math.round(vp.width);
    canvas.height=Math.round(vp.height);
    canvas.style.width=cssW+'px';
    canvas.style.height=cssH+'px';
    canvas.dataset.page=i;
    container.appendChild(canvas);

    pageMeta.push({canvas:canvas,natW:cssW,natH:cssH,renderW:Math.round(vp.width),renderH:Math.round(vp.height)});

    var ctx=canvas.getContext('2d');
    page.render({canvasContext:ctx,viewport:vp});
  }
}

async function loadPDF(){
  if(!pdfFile){showError('No paper file specified.');return;}
  try{
    var loadingTask;
    if(window.location.protocol==='file:'){
      var data=await new Promise(function(res,rej){
        var xhr=new XMLHttpRequest();
        xhr.open('GET',pdfFile,true);
        xhr.responseType='arraybuffer';
        xhr.onload=function(){if(xhr.status===0||xhr.status===200)res(new Uint8Array(xhr.response));else rej(new Error('HTTP '+xhr.status));};
        xhr.onerror=function(){rej(new Error('Network error'));};
        xhr.send();
      });
      loadingTask=pdfjsLib.getDocument({data:data});
    }else{
      loadingTask=pdfjsLib.getDocument({url:pdfFile,disableAutoFetch:false,disableStream:false});
    }
    pdfDoc=await loadingTask.promise;
    totalPages=pdfDoc.numPages;
    currentPage=1;
    fitMode=true;
    zoomLevel=1;

    document.getElementById('loadingOverlay').style.display='none';
    document.getElementById('toolbar').style.display='flex';
    scrollEl.style.display='block';
    document.getElementById('pageInput').max=totalPages;

    await renderAllOnce();
    updateUI();
  }catch(err){
    console.error(err);
    if(window.location.protocol==='file:')
      showError('To view locally, run: python3 -m http.server 8000 in site-mockup folder');
    else
      showError('Could not load this paper.');
  }
}

scrollEl.addEventListener('scroll',trackPage);

document.getElementById('prevBtn').addEventListener('click',function(){
  if(currentPage>1){currentPage--;scrollToPage(currentPage);updateUI();}
});
document.getElementById('nextBtn').addEventListener('click',function(){
  if(currentPage<totalPages){currentPage++;scrollToPage(currentPage);updateUI();}
});
document.getElementById('pageInput').addEventListener('change',function(){
  var n=parseInt(this.value);
  if(n>=1&&n<=totalPages){currentPage=n;scrollToPage(n);updateUI();}
  else this.value=currentPage;
});
document.getElementById('pageInput').addEventListener('keydown',function(e){if(e.key==='Enter')this.blur();});

document.getElementById('zoomInBtn').addEventListener('click',function(){
  var cur=fitMode?1:zoomLevel;
  doZoom(cur+0.25);
});
document.getElementById('zoomOutBtn').addEventListener('click',function(){
  var cur=fitMode?1:zoomLevel;
  doZoom(cur-0.25);
});
document.getElementById('fitBtn').addEventListener('click',doFit);

document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT')return;
  if(e.key==='ArrowUp'||e.key==='PageUp'){document.getElementById('prevBtn').click();e.preventDefault();}
  if(e.key==='ArrowDown'||e.key==='PageDown'){document.getElementById('nextBtn').click();e.preventDefault();}
  if((e.key==='+'||e.key==='=')&&(e.ctrlKey||e.metaKey)){document.getElementById('zoomInBtn').click();e.preventDefault();}
  if(e.key==='-'&&(e.ctrlKey||e.metaKey)){document.getElementById('zoomOutBtn').click();e.preventDefault();}
  if(e.key==='0'&&(e.ctrlKey||e.metaKey)){doFit();e.preventDefault();}
});

scrollEl.addEventListener('wheel',function(e){
  if(e.ctrlKey||e.metaKey){
    e.preventDefault();
    var cur=fitMode?1:zoomLevel;
    var step=e.deltaY>0?-0.05:0.05;
    doZoom(cur+step);
  }
},{passive:false});

document.addEventListener('contextmenu',function(e){if(e.target.tagName==='CANVAS')e.preventDefault();});
document.addEventListener('dragstart',function(e){if(e.target.tagName==='CANVAS')e.preventDefault();});

var resizeTimer;
window.addEventListener('resize',function(){
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(function(){if(fitMode)applyZoom();},200);
});

loadPDF();
</script>
</body>
</html>
