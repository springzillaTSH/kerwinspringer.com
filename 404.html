<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
<title>Page Not Found — Kerwin Springer</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#0a1628,#1a3a6e);font-family:'Poppins',sans-serif;color:#fff;padding:24px;text-align:center}
.box{max-width:480px}
h1{font-size:clamp(48px,10vw,72px);font-weight:800;color:#F5A623;line-height:1}
h2{font-size:clamp(18px,3vw,24px);font-weight:600;margin:12px 0 20px;color:rgba(255,255,255,.85)}
p{font-size:15px;color:rgba(255,255,255,.55);margin-bottom:28px;line-height:1.6}
a.btn{display:inline-block;padding:12px 32px;background:#F5A623;color:#0a1628;font-weight:700;text-decoration:none;border-radius:10px;font-size:15px;transition:background .2s}
a.btn:hover{background:#f8c05c}
</style>
</head>
<body>
<div class="box">
<h1>404</h1>
<h2>Page not found</h2>
<p>This page may have moved when we updated the site. Head back to the homepage to find what you're looking for.</p>
<a href="/" class="btn">Go to Homepage</a>
</div>
</body>
</html>
