<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<title>Free Learning Tools — Kerwin Springer</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#2b4c7e;--navy-dark:#1a2d4a;--gold:#d4912a;--gold-light:#f5a623;
  --bg:#fafbfd;--white:#ffffff;--text-dark:#1a2332;--text-mid:#5a6a7a;--text-light:#8899aa;
  --card-shadow:0 2px 12px rgba(0,0,0,0.06);--card-hover:0 8px 32px rgba(0,0,0,0.10);
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text-dark);-webkit-font-smoothing:antialiased}

/* ── Top Nav ── */
.top-nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,0.06);padding:0 24px}
.top-nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;height:56px;gap:16px}
.back-link{display:flex;align-items:center;gap:6px;text-decoration:none;color:var(--navy);font-weight:600;font-size:14px;transition:color .2s}
.back-link:hover{color:var(--gold)}
.back-link svg{width:18px;height:18px}
.nav-title{font-size:15px;font-weight:700;color:var(--text-dark)}
.nav-count{margin-left:auto;font-size:12px;color:var(--text-light);font-weight:500}

/* ── Hero Banner ── */
.lib-hero{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy) 60%,#3a6ba5 100%);padding:48px 24px 56px;position:relative;overflow:hidden}
.lib-hero::before{content:'';position:absolute;top:-50%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(245,166,35,0.12) 0%,transparent 65%);pointer-events:none}
.lib-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 10%,rgba(245,166,35,0.3) 50%,transparent 90%)}
.lib-hero-inner{max-width:1200px;margin:0 auto;position:relative;z-index:1}
.lib-hero h1{font-size:clamp(24px,4vw,36px);font-weight:800;color:#fff;margin-bottom:6px;letter-spacing:-0.5px}
.lib-hero p{font-size:14px;color:rgba(255,255,255,0.5);font-weight:300;max-width:560px;line-height:1.6}
.lib-hero-stats{display:flex;gap:28px;margin-top:20px}
.lib-stat{text-align:center}
.lib-stat strong{display:block;font-size:24px;font-weight:800;color:var(--gold-light);line-height:1}
.lib-stat small{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.5px;font-weight:500}

/* ── Category Shelf ── */
.shelf{max-width:1200px;margin:-32px auto 0;padding:0 24px;position:relative;z-index:2}
.shelf-scroll{display:flex;gap:14px;overflow-x:auto;padding-bottom:12px;scroll-snap-type:x mandatory;scrollbar-width:none;-ms-overflow-style:none}
.shelf-scroll::-webkit-scrollbar{display:none}

.cat-card{flex:0 0 auto;width:180px;scroll-snap-align:start;background:var(--white);border-radius:var(--radius);padding:20px 18px;cursor:pointer;border:2px solid transparent;transition:all .25s ease;box-shadow:var(--card-shadow);position:relative;overflow:hidden}
.cat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--radius) var(--radius) 0 0;background:var(--cat-color,var(--navy));opacity:0;transition:opacity .25s}
.cat-card:hover{transform:translateY(-3px);box-shadow:var(--card-hover)}
.cat-card:hover::before{opacity:1}
.cat-card.active{border-color:var(--cat-color,var(--navy));box-shadow:var(--card-hover)}
.cat-card.active::before{opacity:1}
.cat-icon{font-size:28px;margin-bottom:10px;display:block}
.cat-name{font-size:13px;font-weight:700;color:var(--text-dark);margin-bottom:2px}
.cat-count{font-size:11px;color:var(--text-light);font-weight:400}
.cat-badge{position:absolute;top:12px;right:12px;background:var(--cat-color,var(--navy));color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;opacity:0.85}

/* ── Tools Grid ── */
.tools-area{max-width:1200px;margin:32px auto 60px;padding:0 24px}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-light);margin-bottom:8px;display:block}
.section-title{font-size:20px;font-weight:800;color:var(--text-dark);margin-bottom:4px}
.section-sub{font-size:13px;color:var(--text-mid);font-weight:300;margin-bottom:24px}

.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:8px}

.tool-card{background:var(--white);border-radius:var(--radius);overflow:hidden;border:1px solid #eef1f5;cursor:pointer;text-decoration:none;color:inherit;transition:all .25s ease;display:flex;flex-direction:column}
.tool-card:hover{transform:translateY(-3px);box-shadow:var(--card-hover)}
.tool-preview{width:100%;height:160px;background:#0f2035;display:flex;align-items:center;justify-content:center;overflow:hidden}
.tool-preview img{width:100%;height:100%;object-fit:cover}
.tool-body{padding:18px 20px 20px}
.tool-tag{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.3px}
.tool-tag.math{background:rgba(43,76,126,.08);color:#2b4c7e}
.tool-tag.physics{background:rgba(16,185,129,.08);color:#0d9668}
.tool-tag.sea{background:rgba(245,166,35,.1);color:#d4912a}
.tool-tag.geometry{background:rgba(139,92,246,.08);color:#7c3aed}
.tool-title{font-size:15px;font-weight:700;color:var(--text-dark);margin-bottom:6px}
.tool-desc{font-size:12.5px;color:var(--text-mid);line-height:1.6;font-weight:300;margin-bottom:14px}
.tool-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-light);font-weight:500}
.tool-dot{width:6px;height:6px;border-radius:50%;background:#2ecc71;display:inline-block}

/* ── Empty state ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-light)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.empty-state h3{font-size:16px;color:var(--text-mid);font-weight:600}

/* ── Responsive ── */
@media(max-width:768px){
  .lib-hero{padding:32px 20px 44px}
  .lib-hero-stats{gap:20px}
  .shelf{margin-top:-24px;padding:0 16px}
  .cat-card{width:150px;padding:16px 14px}
  .tools-area{padding:0 16px}
  .tool-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
}
@media(max-width:480px){
  .tool-grid{grid-template-columns:1fr;gap:12px}
}

/* Loading screen trace loader */
.sh-loader-trace{--sh-size:200px;--sh-speed:3s;--sh-muted:color-mix(in srgb,currentColor 18%,transparent);display:inline-flex;flex-direction:column;align-items:center;gap:calc(var(--sh-size)*0.06);width:var(--sh-size);color:inherit}
.sh-loader-trace .sh-mark{font-family:"Times New Roman",Georgia,serif;font-weight:700;font-size:calc(var(--sh-size)*0.28);line-height:0.9;letter-spacing:0.01em;text-align:center;color:currentColor}
.sh-loader-trace .sh-mark .sh-s{display:block;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:700;font-size:calc(var(--sh-size)*0.095);letter-spacing:0.16em;margin-bottom:calc(var(--sh-size)*0.02)}
.sh-loader-trace .sh-track{position:relative;width:100%;height:max(2px,calc(var(--sh-size)*0.012));background:var(--sh-muted);overflow:hidden;border-radius:999px}
.sh-loader-trace .sh-track::after{content:"";position:absolute;inset:0;background:currentColor;transform-origin:left center;transform:scaleX(0);animation:sh-trace var(--sh-speed) cubic-bezier(.34,1.2,.45,1) infinite;border-radius:inherit}
@keyframes sh-trace{0%{transform:scaleX(0);transform-origin:left}45%{transform:scaleX(1);transform-origin:left}50%{transform:scaleX(1);transform-origin:right}95%{transform:scaleX(0);transform-origin:right}100%{transform:scaleX(0);transform-origin:right}}
.sh-loader-trace .sh-caption{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:calc(var(--sh-size)*0.055);letter-spacing:0.3em;text-transform:uppercase;font-weight:600;opacity:0.6;color:currentColor}
@media(prefers-reduced-motion:reduce){.sh-loader-trace .sh-track::after{animation:none;transform:scaleX(0.6);transform-origin:left}}
</style>
</head>
<body>

<!-- ===== BRANDED LOADING SCREEN ===== -->
<div id="loadingScreen" style="position:fixed;inset:0;z-index:99999;background:#0a0f1a;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s ease,transform 0.6s ease">
  <div style="position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(43,76,126,0.12) 0%,transparent 70%);pointer-events:none"></div>
  <div style="color:#e9ecf3;--sh-size:180px;position:relative;z-index:1">
    <div class="sh-loader-trace" role="status" aria-label="Loading">
      <div class="sh-mark"><span class="sh-s">STUDENT</span>HUB</div>
      <div class="sh-track" aria-hidden="true"></div>
      <div class="sh-caption" id="loadCaption">Loading</div>
    </div>
  </div>
  <div id="loadAppName" style="margin-top:28px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:0.35em;text-transform:uppercase;color:rgba(233,236,243,0);transition:color 1s ease 0.8s;font-weight:500">Learning Tools Library</div>
  <div style="position:absolute;bottom:48px;width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(245,166,35,0.3),transparent)"></div>
  <div style="position:absolute;bottom:24px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.12)">Kerwin Springer</div>
</div>

<!-- Top Nav -->
<nav class="top-nav">
  <div class="top-nav-inner">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Home
    </a>
    <span class="nav-title">Learning Tools</span>
    <span class="nav-count" id="totalCount"></span>
  </div>
</nav>

<!-- Hero Banner -->
<section class="lib-hero">
  <div class="lib-hero-inner">
    <h1>Free Learning Tools</h1>
    <p>Interactive apps for CSEC Maths, Physics, Geometry, and SEA. Pick a category, launch a tool, and start practising.</p>
    <div class="lib-hero-stats">
      <div class="lib-stat"><strong id="statTools">0</strong><small>Tools</small></div>
      <div class="lib-stat"><strong id="statCategories">0</strong><small>Categories</small></div>
      <div class="lib-stat"><strong>100%</strong><small>Free</small></div>
    </div>
  </div>
</section>

<!-- Category Shelf -->
<div class="shelf">
  <div class="shelf-scroll" id="categoryShelf"></div>
</div>

<!-- Tools Area -->
<div class="tools-area" id="toolsArea">
  <div class="empty-state" id="emptyState">
    <div class="icon">👆</div>
    <h3>Pick a category above to browse tools</h3>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// TOOL DATA — Add new tools here
// ═══════════════════════════════════════════════════════
const categories = [
  {
    id: 'all',
    name: 'All Tools',
    icon: '🧰',
    color: '#2b4c7e'
  },
  {
    id: 'csec-math',
    name: 'CSEC Maths',
    icon: '📐',
    color: '#2b4c7e'
  },
  {
    id: 'csec-physics',
    name: 'CSEC Physics',
    icon: '⚡',
    color: '#0d9668'
  },
  {
    id: 'geometry',
    name: 'Geometry',
    icon: '📦',
    color: '#7c3aed'
  },
  {
    id: 'sea',
    name: 'SEA / Primary',
    icon: '🎒',
    color: '#d4912a'
  }
];

const tools = [
  {
    id: 'physics-formula-mastery',
    category: 'csec-physics',
    tag: 'physics',
    tagLabel: 'CSEC Physics',
    title: 'Physics Formula Mastery',
    desc: 'Flashcards, formula recall, unit analysis with spaced repetition built in.',
    meta: 'Live · Spaced Rep',
    preview: 'img/physics-app-preview.svg',
    file: 'tools/physics-formula-mastery.html'
  },
  {
    id: 'directed-numbers',
    category: 'csec-math',
    tag: 'math',
    tagLabel: 'CSEC Maths',
    title: 'Directed Numbers Adventure',
    desc: '10 levels from basics to equations. Master operations with positive and negative numbers.',
    meta: 'Live · 10 Levels',
    preview: 'img/directed-numbers-preview.svg',
    file: 'tools/directed-numbers-adventure.html'
  },
  {
    id: 'transformation-tool',
    category: 'csec-math',
    tag: 'math',
    tagLabel: 'CSEC Maths',
    title: 'Transformation Tool',
    desc: 'Interactive translation, reflection, rotation and enlargement on a coordinate grid.',
    meta: 'Live · Interactive',
    preview: 'img/transformation-preview.svg',
    file: 'tools/transformation-tool.html'
  },
  {
    id: 'solids-and-nets',
    category: 'geometry',
    tag: 'geometry',
    tagLabel: 'CSEC Geometry',
    title: 'Solids & Nets',
    desc: '3D solids with fold/unfold animations. Visualise nets, faces, edges and vertices.',
    meta: 'Live · 3D Interactive',
    preview: 'img/solids-nets-preview.svg',
    file: 'tools/solids-and-nets.html'
  },
  {
    id: 'std3-quiz',
    category: 'sea',
    tag: 'sea',
    tagLabel: 'SEA / Std 3',
    title: 'Standard 3 Ultimate Quiz',
    desc: '100 questions across 10 levels. Maths, English, and mixed review with certificates.',
    meta: 'Live · Certificate',
    preview: 'img/std3-quiz-preview.svg',
    file: 'tools/standard-3-ultimate-quiz.html'
  }
];

// ═══════════════════════════════════════════════════════
// RENDER LOGIC
// ═══════════════════════════════════════════════════════
const shelf = document.getElementById('categoryShelf');
const area = document.getElementById('toolsArea');
const empty = document.getElementById('emptyState');
let activeCategory = null;

// Stats
document.getElementById('statTools').textContent = tools.length;
document.getElementById('statCategories').textContent = categories.length - 1; // exclude "all"
document.getElementById('totalCount').textContent = tools.length + ' free tools';

// Build category shelf
categories.forEach(c => {
  const count = c.id === 'all' ? tools.length : tools.filter(t => t.category === c.id).length;
  const card = document.createElement('div');
  card.className = 'cat-card';
  card.style.setProperty('--cat-color', c.color);
  card.dataset.id = c.id;
  card.innerHTML = `
    <span class="cat-icon">${c.icon}</span>
    <div class="cat-name">${c.name}</div>
    <div class="cat-count">${count} tool${count !== 1 ? 's' : ''}</div>
    <span class="cat-badge">${count}</span>
  `;
  card.addEventListener('click', () => selectCategory(c.id));
  shelf.appendChild(card);
});

function selectCategory(id) {
  activeCategory = id;
  sessionStorage.setItem('tools_lastCategory', id);

  // Highlight card
  document.querySelectorAll('.cat-card').forEach(c => {
    c.classList.toggle('active', c.dataset.id === id);
  });

  const cat = categories.find(c => c.id === id);
  const filtered = id === 'all' ? tools : tools.filter(t => t.category === id);

  area.innerHTML = '';
  empty.style.display = 'none';

  // Section header
  const header = document.createElement('div');
  header.innerHTML = `
    <div class="section-label">${cat.icon} ${cat.name}</div>
    <div class="section-title">${cat.name}</div>
    <div class="section-sub">${filtered.length} free interactive tool${filtered.length !== 1 ? 's' : ''} available</div>
  `;
  area.appendChild(header);

  // Tool cards grid
  const grid = document.createElement('div');
  grid.className = 'tool-grid';

  filtered.forEach(t => {
    const card = document.createElement('a');
    card.className = 'tool-card';
    card.href = t.file;
    card.target = '_blank';
    card.innerHTML = `
      <div class="tool-preview"><img src="${t.preview}" alt="${t.title} preview" draggable="false"></div>
      <div class="tool-body">
        <div class="tool-tag ${t.tag}">${t.tagLabel}</div>
        <div class="tool-title">${t.title}</div>
        <div class="tool-desc">${t.desc}</div>
        <div class="tool-meta"><span class="tool-dot"></span> ${t.meta}</div>
      </div>
    `;
    grid.appendChild(card);
  });

  area.appendChild(grid);

  // Smooth scroll to tools area
  area.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Auto-select last viewed category, or "all" as default
const lastCat = sessionStorage.getItem('tools_lastCategory');
selectCategory(lastCat && categories.find(c => c.id === lastCat) ? lastCat : 'all');
</script>

<!-- Loading screen dismiss (skip on return visits) -->
<script>
(function(){
  const ls = document.getElementById('loadingScreen');
  if(sessionStorage.getItem('tools_visited')){
    ls.remove();
    return;
  }
  sessionStorage.setItem('tools_visited','1');
  const MIN_SHOW = 3000;
  const start = Date.now();
  const appName = document.getElementById('loadAppName');
  setTimeout(()=>{ appName.style.color = 'rgba(233,236,243,0.35)'; }, 100);
  function dismiss(){
    const elapsed = Date.now() - start;
    const remaining = Math.max(0, MIN_SHOW - elapsed);
    setTimeout(()=>{
      ls.style.opacity = '0';
      ls.style.transform = 'scale(1.02)';
      setTimeout(()=>{ ls.remove(); }, 650);
    }, remaining);
  }
  if(document.readyState === 'complete') dismiss();
  else window.addEventListener('load', dismiss);
})();
</script>
</body>
</html>
