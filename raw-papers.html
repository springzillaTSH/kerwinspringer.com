<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2B4C7E">
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<title id="pageTitle">Raw Past Papers — Kerwin Springer</title>
<meta name="description" content="Direct PDF downloads of CSEC raw past papers. Quick list view, no clutter — just the paper.">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="js/papers-data.js?v=20260502-1639"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#2b4c7e;--navy-dark:#1a2d4a;--gold:#d4912a;
  --bg:#f5f7fa;--white:#ffffff;
  --text-dark:#1a2332;--text-mid:#3d4a5d;--text-light:#6b7a8f;
  --border:#e2e7ee;
  --radius:14px;
  --shadow-sm:0 2px 8px rgba(43,76,126,0.06);
  --shadow-md:0 8px 28px rgba(43,76,126,0.12);
}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text-dark);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}

.top-nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,0.06);padding:0 24px}
.top-nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;height:56px;gap:16px}
.back-link{display:flex;align-items:center;gap:6px;text-decoration:none;color:var(--navy);font-weight:600;font-size:14px;transition:color .2s}
.back-link:hover{color:var(--gold)}
.back-link svg{width:16px;height:16px;transition:transform .2s}
.back-link:hover svg{transform:translateX(-3px)}
.nav-title{font-size:15px;font-weight:700;color:var(--text-dark)}
.nav-count{margin-left:auto;font-size:12px;color:var(--text-light);font-weight:500}

.hero{max-width:1100px;margin:0 auto;padding:42px 24px 24px;text-align:center}
.hero-eyebrow{font-size:11px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-light);margin-bottom:10px}
.hero h1{font-size:clamp(28px,4vw,40px);font-weight:800;letter-spacing:-0.6px;line-height:1.15;margin-bottom:16px}
.quote{max-width:680px;margin:0 auto;padding:18px 22px;background:linear-gradient(135deg, var(--subj-color, var(--navy))12, var(--subj-color, var(--navy))06);border-left:4px solid var(--subj-color, var(--navy));border-radius:0 12px 12px 0;text-align:left;font-style:italic;font-size:16px;font-weight:500;color:var(--text-mid);line-height:1.55}

main{max-width:1100px;margin:32px auto 80px;padding:0 24px}

.group-section{margin-bottom:36px}
.group-section h2{font-size:14px;font-weight:700;color:var(--text-mid);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.group-section h2 .dot{width:9px;height:9px;border-radius:50%;background:var(--subj-color, var(--navy))}
.group-section h2 .count{margin-left:auto;font-size:11px;font-weight:500;color:var(--text-light);text-transform:none;letter-spacing:0}

.dl-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.dl-row{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--white);border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--text-dark);transition:all .2s}
.dl-row:hover{border-color:var(--subj-color, var(--navy));transform:translateY(-1px);box-shadow:var(--shadow-md);color:var(--text-dark)}
.dl-row .icon{width:36px;height:36px;flex-shrink:0;border-radius:8px;background:var(--subj-color, var(--navy));display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;letter-spacing:0.5px}
.dl-row .meta{flex:1;min-width:0}
.dl-row .meta .yr{font-size:14px;font-weight:700;color:var(--text-dark)}
.dl-row .meta .ttl{font-size:12px;color:var(--text-light);margin-top:1px}
.dl-row .arrow{color:var(--text-light);transition:transform .2s, color .2s}
.dl-row:hover .arrow{transform:translateX(2px);color:var(--subj-color, var(--navy))}
.dl-row .arrow svg{width:18px;height:18px}

.empty{text-align:center;padding:60px 24px;color:var(--text-light)}
.empty h3{font-size:18px;font-weight:700;color:var(--text-mid);margin-bottom:8px}

@media (max-width:600px){
  .hero{padding:28px 20px 16px}
  .quote{font-size:15px}
  .dl-list{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav class="top-nav">
  <div class="top-nav-inner">
    <a href="papers.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Solutions &amp; Answer Keys
    </a>
    <span class="nav-title" id="navTitle">Raw Past Papers</span>
    <span class="nav-count" id="navCount"></span>
  </div>
</nav>

<section class="hero" id="hero">
  <div class="hero-eyebrow">Raw past papers · quick download list</div>
  <h1 id="heroTitle">Raw Past Papers</h1>
  <div class="quote" id="quote">Pick a subject from the past papers page — this view is for downloads only.</div>
</section>

<main id="content"></main>

<script>
(function(){
  const params = new URLSearchParams(location.search);
  const subjectId = params.get('subject');
  const data = window.PAPERS_DATA;

  if (!subjectId || !data) {
    document.getElementById('content').innerHTML = '<div class="empty"><h3>No subject selected</h3><p>Go back to <a href="papers.html" style="color:var(--navy);font-weight:600">past papers</a> and click "View raw papers" on a subject.</p></div>';
    return;
  }

  const subj = data.subjects.find(s => s.id === subjectId);
  if (!subj) {
    document.getElementById('content').innerHTML = '<div class="empty"><h3>Subject not found</h3></div>';
    return;
  }

  document.body.style.setProperty('--subj-color', subj.color);

  const rawGroups = (data.rawGroupsBySubject[subjectId] || []);
  const subjectPapers = data.papers.filter(p => p.subject === subjectId && rawGroups.indexOf(p.group) !== -1);

  // Hero
  document.getElementById('pageTitle').textContent = subj.name + ' — Raw Past Papers — Kerwin Springer';
  document.getElementById('heroTitle').textContent = subj.icon + ' ' + subj.name + ' — Raw Past Papers';
  document.getElementById('navTitle').textContent = subj.name + ' — Raw';
  document.getElementById('navCount').textContent = subjectPapers.length + ' papers';
  const quote = data.quotes[subjectId] || 'Past papers, fresh and ready.';
  document.getElementById('quote').textContent = quote;

  if (subjectPapers.length === 0) {
    document.getElementById('content').innerHTML = '<div class="empty"><h3>No raw papers yet</h3><p>This subject doesn\'t have raw paper downloads available yet.</p></div>';
    return;
  }

  // Group label lookup
  const groupLabels = {};
  subj.groups.forEach(g => { groupLabels[g.key] = g.label; });
  // Manual fallback for raw-group keys not in subj.groups
  const groupLabelDefaults = {
    'january': 'January Sitting',
    'june': 'May/June Sitting',
    'paper3': 'Paper 3 (SBA)',
    'paper3-raw': 'Paper 3 (Raw)',
    'past-papers': 'Past Papers',
  };

  // Render: one section per raw group
  const content = document.getElementById('content');
  rawGroups.forEach(groupKey => {
    const groupPapers = subjectPapers.filter(p => p.group === groupKey);
    if (groupPapers.length === 0) return;
    // Sort by year desc
    groupPapers.sort((a,b) => (b.year || 0) - (a.year || 0));

    const section = document.createElement('section');
    section.className = 'group-section';
    const label = groupLabels[groupKey] || groupLabelDefaults[groupKey] || groupKey;
    section.innerHTML = '<h2><span class="dot"></span>' + label + '<span class="count">' + groupPapers.length + ' papers</span></h2>';

    const list = document.createElement('div');
    list.className = 'dl-list';

    groupPapers.forEach(p => {
      const row = document.createElement('a');
      row.className = 'dl-row';
      row.href = p.file;
      row.target = '_blank';
      row.setAttribute('download', '');
      row.innerHTML =
        '<div class="icon">PDF</div>' +
        '<div class="meta"><div class="yr">' + (p.display || p.year) + '</div><div class="ttl">' + p.title + '</div></div>' +
        '<div class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>';
      list.appendChild(row);
    });

    section.appendChild(list);
    content.appendChild(section);
  });
})();
</script>
</body>
</html>
